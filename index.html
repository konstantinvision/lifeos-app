  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>{
        navigator.serviceWorker.register('./sw.js',{updateViaCache:'none'})
          .then(reg=>{
            // Force check for new SW immediately and every 30s
            reg.update();
            setInterval(()=>reg.update(),30000);
            reg.addEventListener('updatefound',()=>{
              const nw=reg.installing;
              if(!nw) return;
              nw.addEventListener('statechange',()=>{
                if(nw.state==='installed'){
                  // Always activate immediately — whether or not there's a controller
                  nw.postMessage({type:'SKIP_WAITING'});
                }
              });
            });
          })
          .catch(e=>console.warn('SW reg failed:',e));
        // When new SW takes control, reload to get fresh content
        navigator.serviceWorker.addEventListener('controllerchange',()=>{
          window.location.reload(true);
        });
      });
    }
  </script>

  <script>
    // Resilient loader: try jsDelivr, then unpkg, then cloudflare for each library.
    // A single CDN outage can no longer white-screen the app.
    (function(){
      var LIBS=[
        {name:"React",urls:[
          "https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js",
          "https://unpkg.com/react@18.3.1/umd/react.production.min.js",
          "https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"
        ],check:function(){return window.React;}},
        {name:"ReactDOM",urls:[
          "https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js",
          "https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js",
          "https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"
        ],check:function(){return window.ReactDOM;}},
        {name:"Babel",urls:[
          "https://cdn.jsdelivr.net/npm/@babel/standalone@7.25.6/babel.min.js",
          "https://unpkg.com/@babel/standalone@7.25.6/babel.min.js",
          "https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"
        ],check:function(){return window.Babel;}}
      ];
      function loadOne(lib,done){
        var i=0;
        function attempt(){
          if(lib.check()){done(true);return;}
          if(i>=lib.urls.length){done(false);return;}
          var s=document.createElement("script");
          s.src=lib.urls[i++];
          s.onload=function(){lib.check()?done(true):attempt();};
          s.onerror=attempt;
          document.head.appendChild(s);
        }
        attempt();
      }
      function chain(idx){
        if(idx>=LIBS.length){
          // All loaded. Run the babel script block.
          try{ window.Babel.transformScriptTags(); }
          catch(e){ showFail("Babel failed to process the app: "+e.message); }
          return;
        }
        loadOne(LIBS[idx],function(ok){
          if(!ok){ showFail("Could not load "+LIBS[idx].name+" from any source. Check your internet connection and reload."); return; }
          chain(idx+1);
        });
      }
      function showFail(msg){
        document.getElementById("root").innerHTML=
          '<div style="padding:40px 24px;font-family:-apple-system,system-ui,sans-serif;max-width:420px;margin:0 auto">'+
          '<div style="font-size:18px;font-weight:900;color:#2a2118;margin-bottom:8px">Could not start</div>'+
          '<div style="font-size:13px;color:#666;line-height:1.5;margin-bottom:16px">Your data is safe and untouched. This is a network or loading problem, not your information.</div>'+
          '<div style="font-size:11px;color:#b45309;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:10px;margin-bottom:16px">'+msg+'</div>'+
          '<button onclick="location.reload()" style="width:100%;background:#2a2118;color:#fff;border:none;border-radius:10px;padding:14px;font-size:12px;font-weight:800">Reload</button></div>';
      }
      chain(0);
    })();
  </script>

// Copy text to clipboard without visibly selecting on-screen text (no blue highlight).
function copyText(txt){  try{ if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt); return true; } }catch(e){}
  try{
    const t=document.createElement("textarea");
    t.value=txt; t.style.position="fixed"; t.style.top="-9999px"; t.style.opacity="0";
    document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t);
    return true;
  }catch(e){ return false; }
}

// Download text as a .txt file. Falls back to clipboard copy if download is blocked.
function downloadText(filename,text){
  try{
    const blob=new Blob([text],{type:"text/plain;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=filename; document.body.appendChild(a); a.click();
    document.body.removeChild(a); setTimeout(()=>{try{URL.revokeObjectURL(url);}catch(e){}},1000);
    return true;
  }catch(e){ return copyText(text); }
}

const STATES = [null, "x", "box", "back"];
function nextSt(cur) { return STATES[(STATES.indexOf(cur)+1)%STATES.length]; }
function stMark(st, col) {
  if (!st)           return { ch:"·", c:"#ddd", fw:400, fs:10 };
  if (st === "x")    return { ch:"×", c:col,    fw:900, fs:13 };
  if (st === "box")  return { ch:"⊠", c:col,    fw:900, fs:12 };
  if (st === "back") return { ch:"◀", c:col,    fw:900, fs:11 };
  return               { ch:"·", c:"#ddd", fw:400, fs:10 };
}

function initMonth(days) {
  const grid = {};
  ALL_HATS.forEach(h => { grid[h.code]={}; for(let d=1;d<=days;d++) grid[h.code][d]=null; });
  const energy={}, tasks={}, mood={}, notes={}, extraHats={}, libHats={};
  for(let d=1;d<=days;d++) { energy[d]=null; tasks[d]={t1:"",t2:"",t3:""}; mood[d]=null; notes[d]=""; extraHats[d]=[]; libHats[d]=[]; }
  return { grid, energy, tasks, mood, notes, extraHats, libHats };
}
function fmtT(s) { return `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`; }
function ecol(sym) { return ENERGY.find(e=>e.sym===sym)?.color||"#999"; }
// Q3 begins Jul 6, 2026. From Q3 on, the daily % reflects Top 3 TASKS completed
// (T1/T2/T3 checkboxes), out of a fixed denominator of 3. Q2 days keep the original
// HAT-mark logic (PW/PB/PA marked in the grid) so past numbers never change.
function isQ3Day(m,d){ return (m*100+d)>=706; }
function readTaskChecksLS(){ try{const v=localStorage.getItem("lifeos_v8_taskChecks");return v?JSON.parse(v):{};}catch(e){return {};} }
// From Q3 on, the Top 3 are weighted: T1 carries 60%, T2 and T3 carry 20% each.
// T1 is the one that moves the quarter, so finishing it is worth more than the rest combined.
const T_WEIGHTS = {t1:60, t2:20, t3:20};
function top3TasksPct(m,d,tcIn){
  const tc=tcIn||readTaskChecksLS();
  let pct=0;
  ["t1","t2","t3"].forEach(s=>{ if(tc[m+"-"+d+"-"+s+"-c"]) pct+=T_WEIGHTS[s]; });
  return pct;
}
function top3pct(data, day, m) {
  if(!data) return 0;
  // When the caller passes the month and it's a Q3 day, use Top 3 tasks.
  if(m!=null && isQ3Day(m,day)) return top3TasksPct(m,day);
  return Math.round(TOP3.filter(h=>data.grid[h.code]?.[day]).length/TOP3.length*100);
}
function weeklyTop3(allData, wdList) {
  // Q3 days average the WEIGHTED day score (T1 60 / T2 20 / T3 20).
  // Q2 days keep the original HAT math, so past weeks never change.
  const tc=readTaskChecksLS();
  let sum=0, n=0;
  wdList.forEach(({m,d})=>{
    if(isQ3Day(m,d)){ sum+=top3TasksPct(m,d,tc); n++; return; }
    const mi=MONTHS_ARR.findIndex(x=>x.m===m);
    const data=allData[mi]; if(!data) return;
    const done=TOP3.filter(h=>data.grid[h.code]?.[d]).length;
    sum+=Math.round(done/TOP3.length*100); n++;
  });
  return n>0?Math.round(sum/n):0;
}

      }}>
        {state==="x"?"×":state==="box"?"⊠":state==="back"?"◀":""}

}

// Simple tap cell. Fires on tap, like a normal button. A slide during touch (scroll)
// cancels the mark so scrolling the grid won't toggle, but any deliberate tap registers
// instantly with no hold time.
function HoldCell({onHold,style,title,children}){
  const sx=React.useRef(0);const sy=React.useRef(0);const moved=React.useRef(false);const handled=React.useRef(false);
  const slid=(x,y)=>(Math.abs(x-sx.current)>16||Math.abs(y-sy.current)>16);
  return (
    <div style={{...style,userSelect:"none",WebkitUserSelect:"none",WebkitTouchCallout:"none",touchAction:"pan-y",cursor:"pointer"}} title={title}
      onTouchStart={e=>{const c=e.touches[0];sx.current=c.clientX;sy.current=c.clientY;moved.current=false;}}
      onTouchMove={e=>{const c=e.touches[0];if(slid(c.clientX,c.clientY))moved.current=true;}}
      onTouchEnd={e=>{if(!moved.current){e.preventDefault();handled.current=true;onHold();setTimeout(()=>{handled.current=false;},400);}}}
      onTouchCancel={()=>{moved.current=true;}}
      onClick={()=>{if(!handled.current)onHold();}}
      onContextMenu={e=>e.preventDefault()}>
      {children}
    </div>
  );
}

// ── TOP 3 TASKS ─────────────────────────────────────────────────────────────
// One shared component rendered by BOTH the Today tab and the Plan tab.
// All of its state lives in App, so the two tabs are always the same board:
// edit, check, carry or reorder in one and the other shows it immediately.
function Top3Tasks({allData,getMI,viewM,viewDay,setTask,appendTask,taskChecks,saveTaskChecks,taskSlotsMap,saveTaskSlotsMap,escalations,saveEscalations,onAllDone}) {
  const [escOpen,setEscOpen]=useState(false);
  const dragIdxRef=useRef(null);
  const dragOverIdxRef=useRef(null);
  const [draggingSlot,setDraggingSlot]=useState(null);
  const rowRefsArr=useRef([]);

  const getSlotCount=(m,d,tasks)=>{let filled=0;if(tasks){for(let s=1;s<=10;s++){if((tasks["t"+s]||"").trim())filled=s;}}return Math.max(3,filled,taskSlotsMap[m+"-"+d]||3);};
  const addTaskSlot=(m,d)=>{const cur=getSlotCount(m,d);if(cur<10)saveTaskSlotsMap({...taskSlotsMap,[m+"-"+d]:cur+1});};

  const escKey=(text)=>(text||"").replace(/\u200b/g,"").trim().toLowerCase();
  const isEscalated=(text)=>{const k=escKey(text);return !!(k&&escalations[k]);};
  const toggleEscalation=(text)=>{
    const k=escKey(text);if(!k) return;
    const next={...escalations};
    if(next[k]) delete next[k]; else next[k]={text:(text||"").replace(/\u200b/g,"").trim(),since:TODAY_M+"-"+TODAY_D};
    saveEscalations(next);
  };

  const isTaskChecked=(m,d,slot)=>!!(taskChecks[m+"-"+d+"-"+slot+"-c"]);
  const isCarried=(m,d,slot)=>!!(taskChecks[m+"-"+d+"-"+slot+"-r"]);
  const toggleTaskCheck=(m,d,slot)=>{
    const key=m+"-"+d+"-"+slot+"-c";
    const cur=taskChecks[key]||false;
    const next={...taskChecks,[key]:!cur};
    saveTaskChecks(next);
    if(!cur&&m===viewM&&d===viewDay&&onAllDone){
      const allNowDone=["t1","t2","t3"].every(s=>s===slot?true:!!(next[m+"-"+d+"-"+s+"-c"]));
      if(allNowDone) setTimeout(onAllDone,120);
    }
  };
  const toggleCarry=(m,d,slot)=>{
    const key=m+"-"+d+"-"+slot+"-r";
    const carrying=!taskChecks[key];
    const task=(allData[getMI(m)]?.tasks?.[d]?.[slot]||"").replace(/\u200b/g,"").trim();
    if(carrying&&!task) return; // nothing to carry
    saveTaskChecks({...taskChecks,[key]:carrying});
    if(!carrying) return; // un-carry only removes the red flag. NEVER deletes anything on the next day.
    const mI=MONTHS_ARR.find(x=>x.m===m);
    let nm=m,nd=d+1;
    if(mI&&nd>mI.days){const ci=getMI(m);const ni=ci+1;if(ni>=MONTHS_ARR.length) return;nm=MONTHS_ARR[ni].m;nd=1;}
    if(getMI(nm)<0) return;
    const destTasks=allData[getMI(nm)]?.tasks?.[nd]||{};
    const filledCount=Array.from({length:10},(_,i)=>"t"+(i+1)).filter(s=>(destTasks[s]||"").replace(/\u200b/g,"").trim()).length;
    if(filledCount>=10){ alert("Next day already has 10 tasks. Nothing was changed."); return; }
    // appendTask NEVER overwrites: it adds after the last filled slot and skips exact duplicates.
    appendTask(nm,nd,task);
  };
  const carryStreak=(m,d,text)=>{
    const t=(text||"").replace(/\u200b/g,"").trim();
    if(!t) return 0;
    let count=0,cm=m,cd=d;
    for(let back=0;back<14;back++){
      cd--;
      if(cd<1){const pi=MONTHS_ARR.findIndex(x=>x.m===cm)-1;if(pi<0)break;cm=MONTHS_ARR[pi].m;cd=MONTHS_ARR[pi].days;}
      const dayTasks=allData[getMI(cm)]?.tasks?.[cd]||{};
      const found=Object.keys(dayTasks).some(k=>(dayTasks[k]||"").replace(/\u200b/g,"").trim()===t);
      if(found) count++; else break;
    }
    return count;
  };

        const data = allData[getMI(viewM)];
        const tasks = data?.tasks?.[viewDay]||{};
        const totalSlots = getSlotCount(viewM,viewDay,tasks);
        const slots = Array.from({length:totalSlots},(_,i)=>"t"+(i+1));
        const total = slots.filter(s=>(tasks[s]||"").trim()).length;
        const done  = slots.filter(s=>(tasks[s]||"").trim()&&isTaskChecked(viewM,viewDay,s)).length;
        const allDone = total>=3&&done===total;

        const moveSlot=(from,to)=>{
          if(from===to) return;
          // Snapshot every slot of THIS day: text + done + carried move together
          const snap=slots.map(s=>({
            text:tasks[s]||"",
            chk:isTaskChecked(viewM,viewDay,s),
            car:isCarried(viewM,viewDay,s),
          }));
          const arr=[...snap];
          const [moved]=arr.splice(from,1);
          arr.splice(to,0,moved);
          // Write back: texts via setTask (functional updates), checks in one batch
          const next={...taskChecks};
          arr.forEach((st,i)=>{
            const slot=slots[i];
            if((tasks[slot]||"")!==st.text) setTask(viewM,viewDay,slot,st.text);
            const kC=viewM+"-"+viewDay+"-"+slot+"-c";
            const kR=viewM+"-"+viewDay+"-"+slot+"-r";
            if(st.chk) next[kC]=true; else delete next[kC];
            if(st.car) next[kR]=true; else delete next[kR];
          });
          saveTaskChecks(next);

        const onDragStart=(i)=>{dragIdxRef.current=i;setDraggingSlot(i);};
        const onDragEnter=(i)=>{dragOverIdxRef.current=i;};
        const onDragEnd=()=>{

        const onTouchEnd=()=>onDragEnd();

        return (

            </div>
            {slots.map((slot,idx)=>{
              const val=tasks[slot]||"";
              const checked=isTaskChecked(viewM,viewDay,slot);
              const carried=isCarried(viewM,viewDay,slot);
              const isExtra=idx>=3;
              const isDraggingThis=draggingSlot===idx;
              const rowBg=isDraggingThis?"#f0f4ff":checked?"#f0fdf4":carried?"#fff5f5":"#fff";
              return (
                <React.Fragment key={slot}>
                {idx===3&&(
                  <div style={{display:"flex",alignItems:"center",gap:8,padding:"5px 12px",background:"#faf9f7",borderBottom:"1px solid #ece8e2"}}>
                    <span style={{fontSize:7,fontWeight:900,color:"#a89e8e",letterSpacing:2}}>BACKLOG</span>
                    <span style={{flex:1,height:1,background:"#ece8e2"}}/>
                    <span style={{fontSize:6,color:"#c4bcae",fontWeight:700,letterSpacing:1}}>NOT COMMITMENTS</span>
                  </div>
                )}
                <div ref={el=>rowRefsArr.current[idx]=el}
                  draggable onDragStart={()=>onDragStart(idx)} onDragEnter={()=>onDragEnter(idx)}
                  onDragEnd={onDragEnd} onDragOver={e=>e.preventDefault()}
                  style={{display:"flex",alignItems:"flex-start",borderBottom:"1px solid #e8e8e8",padding:"7px 6px",gap:6,background:rowBg,borderLeft:isExtra?"3px solid #7c3aed":"none",minHeight:50,opacity:isDraggingThis?0.5:1}}
                >
                  <div onTouchStart={e=>onTouchStart(idx,e)} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
                    style={{display:"flex",flexDirection:"column",alignItems:"center",cursor:"grab",flexShrink:0,padding:"4px 2px",touchAction:"none",userSelect:"none",WebkitUserSelect:"none"}}>
                    {idx<3&&<span style={{fontSize:7,fontWeight:900,color:"#c9a96e",lineHeight:1,marginBottom:2,letterSpacing:0.3}}>T{idx+1}</span>}
                    <span style={{fontSize:14,color:"#ccc",lineHeight:1}}>⠿</span>
                  </div>
                  <button onClick={()=>toggleTaskCheck(viewM,viewDay,slot)}
                    style={{width:26,height:26,borderRadius:6,border:"2px solid "+(checked?"#16a34a":"#ddd"),background:checked?"#16a34a":"#fff",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",padding:0,touchAction:"manipulation",WebkitTapHighlightColor:"transparent"}}>

                    onKeyDown={ev=>{if(ev.key==="Enter")ev.preventDefault();}}
                    placeholder={isExtra?"Extra task...":"Task "+(idx+1)+"..."}
                    style={{flex:1,background:"none",border:"none",fontSize:13,fontFamily:"inherit",color:checked?"#9ca3af":isExtra?"#7c3aed":"#111",padding:"8px 0",outline:"none",textDecoration:checked?"line-through":"none",minWidth:0,resize:"none",lineHeight:1.3,overflowY:"auto",display:"block"}}
                  />
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      {val.replace(/\u200b/g,"").trim()&&(
                        <button onClick={()=>toggleEscalation(val)}
                          title={isEscalated(val)?"Escalated — flagged":"Flag as escalated"}
                          style={{width:28,height:28,borderRadius:6,border:"1.5px solid "+(isEscalated(val)?"#f59e0b":"#e8e8e8"),background:isEscalated(val)?"#fff7ed":"#fafafa",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0,fontSize:12,touchAction:"manipulation",WebkitTapHighlightColor:"transparent"}}>

                      <button onClick={()=>toggleCarry(viewM,viewDay,slot)}
                        style={{width:32,height:32,borderRadius:6,border:"1.5px solid "+(carried?"#ef4444":"#e0e0e0"),background:carried?"#fee2e2":"#f5f5f5",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",padding:0,fontSize:14,color:carried?"#ef4444":"#bbb",touchAction:"manipulation",WebkitTapHighlightColor:"transparent"}}>→</button>
                    </div>
                    {(()=>{
                      const cs=carryStreak(viewM,viewDay,val);
                      if(cs<2||checked) return null;
                      const isPromotable=idx>0;
                      return (
                        <button onClick={()=>{if(isPromotable) moveSlot(idx,0);}}
                          title={isPromotable?"Promote to T1 (carried "+(cs+1)+" days)":"This is your oldest task"}
                          style={{display:"flex",alignItems:"center",justifyContent:"center",gap:3,background:"#fff7ed",border:"1px solid #f59e0b",borderRadius:10,padding:"2px 6px",cursor:isPromotable?"pointer":"default",fontFamily:"inherit"}}>
                          <span style={{fontSize:7,fontWeight:900,color:"#b45309"}}>{cs+1}d</span>
                          {isPromotable&&<span style={{fontSize:7,fontWeight:900,color:"#f59e0b"}}>↑T1</span>}

                style={{background:"none",border:"1.5px dashed #ccc",borderRadius:6,padding:"6px 16px",fontSize:11,color:"#aaa",cursor:"pointer",fontFamily:"inherit",fontWeight:700,touchAction:"manipulation",WebkitTapHighlightColor:"transparent"}}>+ task</button>
              {total>0&&<span style={{fontSize:10,fontWeight:900,color:allDone?"#16a34a":done>0?"#555":"#ccc"}}>{allDone?"✓✓✓ ALL DONE":`${done}/${total}`}</span>}
            </div>

          {(()=>{
            // ESCALATED — separate collapsible block AFTER Top 3, so the 3 tasks show first.
            const flagged=Object.values(escalations);
            if(!flagged.length) return null;
            const presentToday=new Set(slots.map(s=>(tasks[s]||"").replace(/\u200b/g,"").trim().toLowerCase()));
            const pending=flagged.filter(f=>!presentToday.has((f.text||"").trim().toLowerCase()));
            if(!pending.length) return null;
            const addToTop=(text)=>{
              const t=(text||"").replace(/\u200b/g,"").trim();
              if(!t) return;
              // Snapshot the whole day. Text + done + carried always travel together.
              const snap=slots.map(s=>({text:tasks[s]||"",chk:isTaskChecked(viewM,viewDay,s),car:isCarried(viewM,viewDay,s)}));
              // Trailing EMPTY slots can be reused. Real text is never dropped.
              while(snap.length&&!(snap[snap.length-1].text||"").replace(/\u200b/g,"").trim()) snap.pop();
              if(snap.some(st=>(st.text||"").replace(/\u200b/g,"").trim().toLowerCase()===t.toLowerCase())) return; // already on this day
              const arr=[{text:t,chk:false,car:false},...snap];
              if(arr.length>10){ alert("This day already has 10 tasks. Finish or remove one first — nothing was changed."); return; }
              const next={...taskChecks};
              // Write EVERY item back, including the one pushed off the bottom.
              arr.forEach((st,i)=>{
                const slot="t"+(i+1);
                if((tasks[slot]||"")!==st.text) setTask(viewM,viewDay,slot,st.text);
                const kC=viewM+"-"+viewDay+"-"+slot+"-c",kR=viewM+"-"+viewDay+"-"+slot+"-r";
                if(st.chk) next[kC]=true; else delete next[kC];
                if(st.car) next[kR]=true; else delete next[kR];
              });
              saveTaskChecks(next);
              // Make sure the day shows enough rows to hold what we just wrote.
              if(arr.length>slots.length) saveTaskSlotsMap({...taskSlotsMap,[viewM+"-"+viewDay]:arr.length});
            };

                      <button onClick={()=>{if(confirm("Remove \""+f.text+"\" from escalated?"))toggleEscalation(f.text);}} title="Remove flag" style={{flexShrink:0,width:24,height:24,borderRadius:"50%",background:"#ffe4e6",border:"none",fontSize:11,color:"#d98a99",cursor:"pointer",padding:0,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",touchAction:"manipulation"}}>✕</button>
                    </div>
                  ))}
                  </div>
                )}
              </div>
            );
          })()}
          </React.Fragment>
        );
}

function TodayPanel({allData,getMI,viewDay,viewM,setViewDay,setViewM,weekIdx,setWeekIdx,weekDays,cycleCell,cycleEnergy,cycleMood,setTask,appendTask,setNote,setHighlight,setMoodNote,setWins,weekAssess,setAssess,setPriority,toggleExtraHat,toggleLibHat,winsLogged,toggleWinsLogged,hlChecked,toggleHlChecked,taskChecks,saveTaskChecks,taskSlotsMap,saveTaskSlotsMap,escalations,saveEscalations,planData}) {

  // with the Plan tab. Drag state lives inside Top3Tasks.

  const [priChecks,setPriChecks]=useState(()=>{try{const v=localStorage.getItem("lifeos_v8_priChecks");return v?JSON.parse(v):{}}catch(e){return {};}});
  // Week Priorities drag-to-reorder — same pattern as Top 3 Tasks

  const toggleCheck=(wn,i)=>{const key="w"+wn;const cur=priChecks[key]||[];const next=cur.includes(i)?cur.filter(x=>x!==i):[...cur,i];savePriChecks({...priChecks,[key]:next});};
  const isChecked=(wn,i)=>(priChecks["w"+wn]||[]).includes(i);

  // Key format: "m-d-slot-c" for check, "m-d-slot-r" for carry
  // slot = "t1","t2","t3"... — stays with the slot, not the visual position
  // 🐝 BEE CELEBRATION — canvas overlay when all 3 tasks done

    const canvas=beeCanvasRef.current;

    }));
    const origins=[{x:W*0.5,y:H*0.62},{x:W*0.18,y:H*0.72},{x:W*0.82,y:H*0.72}];
    const CONFETTI=[];
    origins.forEach((o,oi)=>{
      for(let i=0;i<30;i++){
        const ang=-Math.PI/2+(Math.random()-0.5)*2.0;
        const spd=5.5+Math.random()*7.5;
        CONFETTI.push({
          x:o.x,y:o.y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
          w:5+Math.random()*6,h:8+Math.random()*7,
          color:CONFETTI_COLORS[(Math.random()*CONFETTI_COLORS.length)|0],
          rot:Math.random()*Math.PI*2, vr:(Math.random()-0.5)*0.28,
          born:oi*90, // bursts cascade left to right
        });
      }
    });
    const SPARKLES=Array.from({length:18},()=>({
      x:Math.random()*W, y:H*0.18+Math.random()*H*0.6,
      size:9+Math.random()*14,
      phase:Math.random()*Math.PI*2, speed:0.0045+Math.random()*0.004,
    }));
    const t0=performance.now();
    let last=t0;
    const draw=(now)=>{
      const elapsed=now-t0;
      const dt=Math.min((now-last)/16.667,3); last=now; // 60fps-normalized, capped
      const prog=Math.min(elapsed/DURATION,1);
      ctx.clearRect(0,0,W,H);
      // Confetti — physics scaled by dt, gentle fade in last third
      CONFETTI.forEach(c=>{
        if(elapsed<c.born) return;
        c.x+=c.vx*dt; c.y+=c.vy*dt; c.vy+=0.18*dt; c.vx*=Math.pow(0.995,dt); c.rot+=c.vr*dt;
        const a=prog<0.6?1:Math.max(0,1-easeOutCubic((prog-0.6)/0.4));
        ctx.save();ctx.globalAlpha=a;ctx.translate(c.x,c.y);ctx.rotate(c.rot);
        ctx.fillStyle=c.color;ctx.fillRect(-c.w/2,-c.h/2,c.w,c.h);ctx.restore();
      });
      // Sparkles — time-based twinkle
      SPARKLES.forEach(s=>{
        const tw=(Math.sin(s.phase+elapsed*s.speed)+1)/2;
        let a=tw*0.9; if(prog>0.55)a*=Math.max(0,1-(prog-0.55)/0.45);
        ctx.globalAlpha=a;ctx.font=`${s.size}px serif`;ctx.textAlign="center";
        ctx.fillText("✨",s.x,s.y);
      });
      // Bees — staggered entrance, smooth sway, soft fade
      BEES.forEach(b=>{
        if(elapsed<b.born) return;
        b.x+=(b.vx+Math.sin(b.wobble)*1.25)*dt;
        b.y+=b.vy*dt;
        b.wobble+=b.wobbleSpeed*dt;
        b.vy+=0.03*dt;
        const a=prog<0.55?1:Math.max(0,1-easeOutCubic((prog-0.55)/0.45));
        ctx.save();ctx.globalAlpha=a;ctx.translate(b.x,b.y);
        ctx.rotate(Math.sin(b.wobble*0.7)*0.28);
        ctx.font=`${b.size}px serif`;ctx.textAlign="center";
        ctx.fillText("🐝",0,0);ctx.restore();
      });
      // ALL DONE — soft gold glow, ease-out-back pop, gentle float, smooth fade
      if(prog<0.62){
        const inP=Math.min(1,elapsed/420);
        const scale=0.7+easeOutBack(inP)*0.4;
        const floatY=Math.sin(elapsed*0.0022)*5;
        const ta=prog<0.42?1:Math.max(0,1-easeOutCubic((prog-0.42)/0.2));
        const cx=W/2, cy=H*0.4+floatY;
        ctx.save();ctx.globalAlpha=ta;
        const glow=ctx.createRadialGradient(cx,cy,0,cx,cy,150);
        glow.addColorStop(0,"rgba(201,169,110,0.32)");
        glow.addColorStop(1,"rgba(201,169,110,0)");
        ctx.fillStyle=glow;ctx.fillRect(cx-160,cy-160,320,320);
        ctx.translate(cx,cy);ctx.scale(scale,scale);ctx.textAlign="center";
        ctx.font="900 34px -apple-system,system-ui,sans-serif";
        ctx.shadowColor="rgba(201,169,110,0.5)";ctx.shadowBlur=18;
        ctx.fillStyle="#c9a96e";ctx.fillText("ALL DONE",0,0);
        ctx.shadowBlur=0;
        ctx.font="22px serif";ctx.fillText("🎉",0,34);
        ctx.restore();
      }
      ctx.globalAlpha=1;
      if(elapsed<DURATION) beeAnimRef.current=requestAnimationFrame(draw);
      else { ctx.clearRect(0,0,W,H); canvas.style.display="none"; }
    };
    if(beeAnimRef.current) cancelAnimationFrame(beeAnimRef.current);
    beeAnimRef.current=requestAnimationFrame(draw);

              <div style={{background:dayPct===100?"linear-gradient(90deg,#4ade80,#bbf7d0)":"linear-gradient(90deg,#c9a96e,#e8c98f)",height:"100%",width:dayPct+"%",borderRadius:20,transition:"width .45s cubic-bezier(.4,0,.2,1)",boxShadow:dayPct>0?"0 0 8px rgba(201,169,110,0.4)":"none"}}/>

      </div>
      {/* HAT MINI GRID — same columns, same order, same colors as the Month tab grid */}
      {(()=>{
        const isQ3v=isQ3Day(viewM,viewDay);
        const mGroups=isQ3v?Q3_GROUPS:GROUPS;
        const mMeta=isQ3v?Q3_SECTION_META:SECTION_META;
        const mFlat=isQ3v?Q3_FLAT_HATS:FLAT_HATS;

        return (
      <div style={{background:"#fff",borderRadius:16,border:"1px solid #f0ebe2",marginBottom:12,overflow:"hidden",boxShadow:"0 3px 16px rgba(42,33,24,0.06)"}}>

          {(isQ3v?mGroups.map(g=>({label:g.label,cols:g.end-g.start+1,color:g.color,bg:g.bg,bdr:g.bdr})):[

            {label:"TOP 3", cols:3, color:"#1b5e20", bg:"#e8f5e9", bdr:"#66bb6a"},

            const sec=isQ3v?(mMeta.find(mm=>mm.h.code===h.code)?.sec):MONTH_SECTIONS.find(s=>s.hats.some(x=>x.code===h.code));

              <div key={h.code} style={{width:18,height:16,flexShrink:0,boxSizing:"border-box",display:"flex",alignItems:"center",justifyContent:"center",background:sec?.bg||"#fff",borderLeft:isFirstInGrp?`2px solid ${sec?.bdr||"#ccc"}`:`1px solid ${(sec?.bdr||"#ccc")+"88"}`,borderBottom:"2px solid #ccc",fontSize:(h.disp||h.code).length>2?5:6,fontWeight:800,color:sec?.color||"#555"}}>{h.disp?h.disp:(h.code==="RJ2"?"R2":h.code)}</div>

          {!isQ3v&&<div style={{width:24,flexShrink:0,height:16,background:"#f0f0f0",borderLeft:"2px solid #ccc",borderBottom:"2px solid #ccc",display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:900,color:"#1b5e20",boxSizing:"border-box"}}>%</div>}
        </div>
        {/* Data rows — full current week (7 days, crosses month boundaries) */}
        {(()=>{

                <div style={{width:36,flexShrink:0,height:20,background:isSel?"#f3ede2":"#fafafa",borderRight:"1px solid #e0e0e0",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                  <span style={{fontSize:7,fontWeight:900,color:isSel?"#2a2118":isToday?"#c9a96e":"#666",lineHeight:1}}>{rday.d}</span>
                  <span style={{fontSize:5,fontWeight:700,color:isToday?"#c9a96e":"#aaa",lineHeight:1,letterSpacing:.3}}>{weekdayShort(rday.m,rday.d)}</span>
                </div>
                {isQ3Day(rday.m,rday.d)&&<Q3TaskCells m={rday.m} d={rday.d} taskChecks={taskChecks} colW={18} colH={20}/>}

                {(()=>{

                    <HoldCell onHold={()=>{const idx=curE?ENERGY.findIndex(e=>e.sym===curE):-1;const next=ENERGY[(idx+1)%ENERGY.length];cycleEnergy(rday.m,rday.d,idx===ENERGY.length-1?null:next.sym);}} style={{width:18,height:20,flexShrink:0,boxSizing:"border-box",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",background:en?en.color:"#fafafa",borderLeft:`2px solid ${PULSE_C.bdr}`,borderTop:"1px solid #e0e0e0",borderBottom:"1px solid #e0e0e0"}}>
                      <span style={{fontSize:8,fontWeight:900,color:en?"#fff":"#ddd",lineHeight:1}}>{curE||"·"}</span>
                    </HoldCell>
                  );
                })()}
                {/* Mood cell — tap cycles 1-10 */}
                {(()=>{
                  const mv=rData?.mood?.[rday.d];
                  return (
                    <HoldCell onHold={()=>cycleMood(rday.m,rday.d,mv>=10?0:(mv||0)+1)} style={{width:18,height:20,flexShrink:0,boxSizing:"border-box",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",background:mv?moodColor(mv)+"22":"#fafafa",borderLeft:"1px solid #ddd",borderTop:"1px solid #e0e0e0",borderBottom:"1px solid #e0e0e0"}}>

          {(()=>{

              if(from===to) return;
              const checkedSet=new Set(priChecks["w"+w.n]||[]);
              const snap=priorities.map((text,i)=>({text,chk:checkedSet.has(i)}));
              const arr=[...snap];
              const [moved]=arr.splice(from,1);
              arr.splice(to,0,moved);
              setAssess("w"+w.n,{...(weekAssess?.["w"+w.n]||{}),priorities:arr.map(x=>x.text)});
              const nextChecked=[];
              arr.forEach((x,i)=>{ if(x.chk) nextChecked.push(i); });
              savePriChecks({...priChecks,["w"+w.n]:nextChecked});
            };
            const onDragStart=(i)=>{prioDragIdxRef.current=i;setDraggingPrio(i);};
            const onDragEnter=(i)=>{prioDragOverIdxRef.current=i;};
            const onDragEnd=()=>{
              if(prioDragIdxRef.current!==null&&prioDragOverIdxRef.current!==null&&prioDragIdxRef.current!==prioDragOverIdxRef.current){
                movePriority(prioDragIdxRef.current,prioDragOverIdxRef.current);
              }
              prioDragIdxRef.current=null;prioDragOverIdxRef.current=null;setDraggingPrio(null);
            };
            const onTouchStart=(i)=>{prioDragIdxRef.current=i;setDraggingPrio(i);};
            const onTouchMove=(e)=>{
              if(prioDragIdxRef.current===null) return;
              e.preventDefault();
              const y=e.touches[0].clientY;
              let closest=prioDragIdxRef.current,minDist=Infinity;
              prioRowRefsArr.current.forEach((ref,ri)=>{
                if(!ref) return;
                const rect=ref.getBoundingClientRect();
                const dist=Math.abs(y-(rect.top+rect.height/2));
                if(dist<minDist){minDist=dist;closest=ri;}
              });
              prioDragOverIdxRef.current=closest;
            };
            const onTouchEnd=()=>onDragEnd();
            return priorities.map((p,i)=>{
              const checked=isChecked(w.n,i);

function getWeekForDay(m,d) {
  return Q2_WEEKS.find(w=>{
    const [sm,sd]=w.start,[em,ed]=w.end;
    return m*100+d>=sm*100+sd && m*100+d<=em*100+ed;
  });

  const [em,ed]=w.end;

}

function ChallengePanel() {
  const [challData, setChallData] = useState(()=>{
    try{const v=localStorage.getItem("lifeos_chall26");return v?JSON.parse(v):{}}catch(e){return {};}
  });
  const saveChall=(next)=>{setChallData(next);try{localStorage.setItem("lifeos_chall26",JSON.stringify(next));}catch(e){}};

  const scrollRef = useRef(null);
  useEffect(()=>{
    const todayOffset = (TODAY_M===5)?(TODAY_D-1):0;
    if(scrollRef.current && todayOffset>0){
      
    }
  },[]);

  // Toggle a cell (day × item)
  function getChallState(day, itemId){
    const key=`d${day}`;
    const cur=challData[key]||[];
    const entry=cur.find(e=>e===itemId||e.startsWith(itemId+":"));
    if(!entry) return null;
    if(entry===itemId) return "x";
    return entry.split(":")[1]||"x";
  }
  function cycleChallCell(day, itemId){
    const key=`d${day}`;
    const cur=challData[key]||[];
    const st=getChallState(day,itemId);
    // cycle: null → x → back → null
    const nextSt=st===null?"x":st==="x"?"back":null;
    const filtered=cur.filter(e=>e!==itemId&&!e.startsWith(itemId+":"));
    const next=nextSt?[...filtered,itemId+":"+nextSt]:filtered;
    saveChall({...challData,[key]:next});
  }

// ── EXTRA PANEL ───────────────────────────────────────────────────────────────
const EXTRA_ALL_HATS = [...EXTRA_ACTIVE, ...LIB_TAGS];
const EX_C = 22;
const EX_COL_DAY = 28;

// Grey palette for Extra panel
const EX_ACTIVE_GRP = {label:"ACTIVE", color:"#555", bg:"#f5f5f5", bdr:"#bbb"};
const EX_LIB_GRP    = {label:"LIBRARY", color:"#888", bg:"#fafafa", bdr:"#ccc"};

function ExtraPanel({monthIdx, setMonthIdx, allData, toggleExtraHat, toggleLibHat}) {
  const month = MONTHS_ARR[monthIdx];
  const data = allData[monthIdx];
  const DAYS = Array.from({length:month.days},(_,i)=>i+1);
  const isCur = month.m === TODAY_M;
  const scrollRef = useRef(null);

  useEffect(()=>{
    if(isCur&&scrollRef.current){
      const offset = (EX_C+EX_C)+((TODAY_D-1)*(EX_C+1))-80;
      
    }
  },[monthIdx]);

  function getWeekDaysAll(day){
    const w=getWeekForDay(month.m,day); if(!w) return [];
    const pairs=[]; let[cm,cd]=[...w.start]; const[em,ed]=w.end;
    for(let i=0;i<7;i++){
      pairs.push({m:cm,d:cd});
      if(cm===em&&cd===ed) break;
      const mI=MONTHS_ARR.find(x=>x.m===cm);
      if(mI&&cd>=mI.days){cm++;cd=1;}else cd++;
    }
    return pairs;
  }
  function getWeekDaysInMonth(day){
    return getWeekDaysAll(day).filter(p=>p.m===month.m).map(p=>p.d);
  }

  function goalMet(code, day){
    const wdays=getWeekDaysAll(day);
    const isExtraA=EXTRA_ACTIVE.some(h=>h.code===code);
    return wdays.some(({m:wm,d:wd})=>{
      const mi=MONTHS_ARR.findIndex(x=>x.m===wm);
      const wdata=allData[mi];
      const ex=(wdata?.extraHats||{})[wd]||[];
      const lb=(wdata?.libHats||{})[wd]||[];
      const arr=isExtraA?ex:lb;
      return arr.some(e=>e===code||e.startsWith(code+":"));
    });
  }

  function getState(code, day){
    // We repurpose extraHats to store the state string for extra panel
    // Format stored: code+":" + state
    const ex=(data.extraHats||{})[day]||[];
    const lb=(data.libHats||{})[day]||[];
    const isExtraA=EXTRA_ACTIVE.some(h=>h.code===code);
    const arr=isExtraA?ex:lb;
    // Check if arr has state entry like "PM:box" or just "PM" (legacy = "x")
    const entry=arr.find(e=>e===code||e.startsWith(code+":"));
    if(!entry) return null;
    if(entry===code) return "x"; // legacy
    return entry.split(":")[1]||"x";
  }

  function cycleExtraState(code, day){
    const isExtraA=EXTRA_ACTIVE.some(h=>h.code===code);
    const cur=getState(code,day);
    const next=nextSt(cur); // null → x → box → back → null
    // Store as "code:state" or remove if null
    const mutFn=(arr)=>{
      const filtered=arr.filter(e=>e!==code&&!e.startsWith(code+":"));
      return next?[...filtered,code+":"+next]:filtered;
    };
    if(isExtraA){
      // use toggleExtraHat logic but we need direct mutation — call parent
      // Since we can't mutData directly, we rebuild using toggleExtraHat trick:
      // Remove old entry first by toggling off if on, then set new
      // Simplest: just call toggleExtraHat which does includes check
      // We need a smarter approach — store state in the code string
      toggleExtraHat(month.m, day, code, next);
    } else {
      toggleLibHat(month.m, day, code, next);
    }
  }

  const totalW = EX_COL_DAY + EXTRA_ALL_HATS.length*EX_C + 2;
  const HDR_GRP=14, HDR_CODE=20;

  return (
    <div style={{position:"relative"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <NBtn onClick={()=>setMonthIdx(x=>Math.max(0,x-1))} on={monthIdx>0}>‹</NBtn>
        <span style={{fontSize:16,fontWeight:900,color:"#111"}}>{month.name} <span style={{fontSize:9,color:"#aaa",fontWeight:400,letterSpacing:2}}>EXTRA</span></span>
        <NBtn onClick={()=>setMonthIdx(x=>Math.min(MONTHS_ARR.length-1,x+1))} on={monthIdx<MONTHS_ARR.length-1}>›</NBtn>
      </div>

      <div style={{borderRadius:8,border:"1px solid #ddd",overflow:"hidden"}}>
        <div data-hscroll="true" ref={scrollRef} style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          <div style={{minWidth:totalW,position:"relative"}}>

            {/* STICKY HEADER */}
            <div style={{position:"sticky",top:0,zIndex:12,background:"#fff",borderBottom:"2px solid #ccc"}}>
              {/* ROW 1: group labels */}
              <div style={{display:"flex",height:HDR_GRP}}>
                <div style={{width:EX_COL_DAY,flexShrink:0}}/>
                <div style={{width:EXTRA_ACTIVE.length*EX_C,flexShrink:0,background:EX_ACTIVE_GRP.bg,borderTop:`1px solid ${EX_ACTIVE_GRP.bdr}`,borderLeft:`2px solid ${EX_ACTIVE_GRP.bdr}`,borderRight:`1px solid ${EX_ACTIVE_GRP.bdr}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:900,color:EX_ACTIVE_GRP.color,letterSpacing:1}}>ACTIVE</div>
                <div style={{width:LIB_TAGS.length*EX_C,flexShrink:0,background:EX_LIB_GRP.bg,borderTop:`1px solid ${EX_LIB_GRP.bdr}`,borderLeft:`2px solid ${EX_LIB_GRP.bdr}`,borderRight:`1px solid ${EX_LIB_GRP.bdr}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:900,color:EX_LIB_GRP.color,letterSpacing:1}}>LIBRARY</div>
              </div>
              {/* ROW 2: emoji + code */}
              <div style={{display:"flex",height:HDR_CODE}}>
                <div style={{width:EX_COL_DAY,flexShrink:0}}/>
                {EXTRA_ALL_HATS.map((h,hi)=>{
                  const isFirstLib=hi===EXTRA_ACTIVE.length;
                  const isFirst=hi===0||isFirstLib;
                  const grp=hi<EXTRA_ACTIVE.length?EX_ACTIVE_GRP:EX_LIB_GRP;
                  return (
                    <div key={h.code} style={{
                      width:EX_C,flexShrink:0,height:HDR_CODE,
                      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                      background:grp.bg,
                      borderLeft:`${isFirst?"2":"1"}px solid ${grp.bdr}${isFirst?"":"88"}`,
                      borderBottom:`1px solid ${grp.bdr}`,
                      gap:1,
                    }}>
                      <span style={{fontSize:8,lineHeight:1}}>{h.emoji}</span>
                      <span style={{fontSize:5.5,fontWeight:800,color:grp.color,lineHeight:1}}>{h.code}</span>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* DATA ROWS */}
            {DAYS.map(day=>{
              const isT=isCur&&day===TODAY_D;
              const wk=getWeekForDay(month.m,day);
              const wkStartW=(()=>{
                if(!wk) return null;
                const[sm,sd]=wk.start;
                return (sm===month.m&&sd===day)?wk:null;
              })();
              const rowBg=isT?"#dbeafe":day%2===0?"#f9f9f9":"#fff";
              return (
                <div key={day}>
                  {wkStartW&&(
                    <div style={{display:"flex",alignItems:"center",height:14,background:"#ebebeb",borderTop:"2px solid #333",borderBottom:"1px solid #aaa"}}>
                      <div style={{paddingLeft:4,fontSize:7,fontWeight:900,color:"#222",letterSpacing:1}}>{wkLabel(wkStartW)}</div>
                    </div>
                  )}
                  <div style={{display:"flex",alignItems:"stretch",background:rowBg,borderLeft:isT?"3px solid #1976d2":"3px solid transparent",borderBottom:"1px solid #ebebeb",height:EX_C}}>
                    <div style={{width:EX_COL_DAY-3,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:4,fontSize:10,fontWeight:isT?900:500,color:isT?"#1565c0":"#555"}}>{day}</div>
                    {EXTRA_ALL_HATS.map((h,hi)=>{
                      const isFirstLib=hi===EXTRA_ACTIVE.length;
                      const isFirst=hi===0||isFirstLib;
                      const grp=hi<EXTRA_ACTIVE.length?EX_ACTIVE_GRP:EX_LIB_GRP;
                      const st=getState(h.code,day);
                      const gm=!st&&goalMet(h.code,day);
                      const mk=stMark(st,grp.color);
                      let bg=gm?"#e0e0e0":st?grp.bg:"transparent";
                      return (
                        <div key={h.code} onClick={()=>cycleExtraState(h.code,day)} style={{
                          width:EX_C,height:EX_C,flexShrink:0,
                          display:"flex",alignItems:"center",justifyContent:"center",
                          cursor:"pointer",background:bg,
                          borderLeft:`${isFirst?"2":"1"}px solid ${gm?"#b0b0b0":isFirst?grp.bdr:"#ccc"}`,
                          borderRight:"1px solid #ccc",
                          borderTop:"1px solid #ccc",
                          borderBottom:"1px solid #ccc",
                          boxSizing:"border-box",
                        }}>
                          <span style={{fontSize:mk.fs,fontWeight:mk.fw,lineHeight:1,color:st?grp.color:gm?"#aaa":"#e0e0e0"}}>{mk.ch}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Legend */}
      <div style={{marginTop:6,background:"#f9f9f9",borderRadius:8,border:"1px solid #e8e8e8",padding:"5px 10px"}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          {[["·","empty","#ccc"],["×","done","#555"],["⊠","boxing","#555"],["◀","back","#888"]].map(([s,l,c])=>(
            <div key={s} style={{textAlign:"center"}}>
              <div style={{fontSize:11,color:c,fontWeight:900}}>{s}</div>
              <div style={{fontSize:6,color:"#bbb"}}>{l}</div>
            </div>
          ))}
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:9,height:9,borderRadius:2,background:"#e0e0e0",border:"1px solid #bbb"}}/>
            <span style={{fontSize:6,color:"#bbb"}}>week goal met</span>
          </div>
          <span style={{fontSize:6,color:"#ccc",marginLeft:"auto"}}>ACTIVE 5 + LIBRARY 19 · 1x/week</span>
        </div>
      </div>
    </div>
  );
}

  });

      out+=`${mo.short} ${d}`;

      if(ev) out+=`  energy:${ev}`;
      out+="\n";
      if(hl) out+=`  "${hl}"\n`;
      if(mn) out+=`  mood shift: ${mn}\n`;
      out+="\n";

          {showExp?"✓ COPIED":"⧉ EXPORT HIGHLIGHTS"}

      {(()=>{

        const ELAB={"▲▲":"PEAK","▲":"EXC","■":"OK","▼":"UND","●":"REST"};
        const moodAll=entries.filter(e=>e.mv).map(e=>({v:e.mv,m:e.mo.m,key:e.mo.m+"-"+e.d,label:e.mo.short+" "+e.d}));
        const enAll=entries.filter(e=>e.ev).map(e=>({sym:e.ev,m:e.mo.m,key:e.mo.m+"-"+e.d,label:e.mo.short+" "+e.d}));
        const monthAvgs=MONTHS_ARR.map(mo=>{
          const mp=moodAll.filter(p=>p.m===mo.m);
          return mp.length?{short:mo.short,avg:(mp.reduce((s,p)=>s+p.v,0)/mp.length)}:null;
        }).filter(Boolean);
        // ---- MOOD CHART (area + line + dots) ----
        const moodChart=(()=>{
          if(moodAll.length<2) return null;
          const W=320,H=104,padX=20,padTop=10,padBot=14;
          const n=moodAll.length;
          const xOf=i=>padX+(n===1?0:i*(W-padX-8)/(n-1));
          const yOf=v=>padTop+(10-v)/9*(H-padTop-padBot);
          const pts=moodAll.map((p,i)=>({x:xOf(i),y:yOf(p.v),v:p.v,key:p.key}));
          const lineD=pts.map((p,i)=>(i?"L":"M")+p.x.toFixed(1)+" "+p.y.toFixed(1)).join(" ");
          const areaD=lineD+" L "+pts[n-1].x.toFixed(1)+" "+(H-padBot)+" L "+pts[0].x.toFixed(1)+" "+(H-padBot)+" Z";
          return (
            <div style={{background:"#fff",borderRadius:14,padding:"12px 12px 10px",marginBottom:12,boxShadow:"0 2px 10px rgba(0,0,0,0.06)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:8,fontWeight:800,color:"#7c3aed",letterSpacing:1.5}}>● MOOD</span>
                <span style={{fontSize:7,color:"#b0a898",fontWeight:700}}>1–10 daily</span>
              </div>
              <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"auto",display:"block"}}>
                <defs>
                  <linearGradient id="moodFill" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor="#7c3aed" stopOpacity="0.22"/>
                    <stop offset="100%" stopColor="#7c3aed" stopOpacity="0"/>
                  </linearGradient>
                </defs>
                {[2,4,6,8,10].map(g=>(
                  <g key={g}>
                    <line x1={padX} y1={yOf(g)} x2={W-8} y2={yOf(g)} stroke="#f2efe9" strokeWidth="1"/>
                    <text x={padX-5} y={yOf(g)+3} textAnchor="end" fontSize="7" fill="#c4bcae" fontWeight="700">{g}</text>
                  </g>
                ))}
                <path d={areaD} fill="url(#moodFill)"/>
                <path d={lineD} fill="none" stroke="#7c3aed" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" opacity="0.55"/>
                {pts.map(p=>(
                  <circle key={p.key} cx={p.x} cy={p.y} r="3.4" fill={moodBand(p.v)} stroke="#fff" strokeWidth="1.4"/>
                ))}
              </svg>
              <div style={{display:"flex",gap:9,justifyContent:"center",margin:"4px 0 6px",flexWrap:"wrap"}}>
                {[["#7c3aed","9-10"],["#16a34a","7-8"],["#eab308","5-6"],["#ef4444","1-4"]].map(([c,r])=>(
                  <span key={r} style={{display:"flex",alignItems:"center",gap:3,fontSize:7,color:"#999",fontWeight:700}}><span style={{width:7,height:7,borderRadius:"50%",background:c}}/>{r}</span>
                ))}
              </div>
              {monthAvgs.length>0&&(
                <div style={{display:"flex",gap:6,borderTop:"1px solid #f2efe9",paddingTop:8}}>
                  {monthAvgs.map(ma=>(
                    <div key={ma.short} style={{flex:1,textAlign:"center"}}>
                      <div style={{fontSize:6,color:"#b0a898",fontWeight:700,letterSpacing:1}}>{ma.short} AVG</div>
                      <div style={{fontSize:13,fontWeight:900,color:moodBand(ma.avg),marginTop:1}}>{ma.avg.toFixed(1)}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })();
        // ---- ENERGY CHART (color bars per level) ----
        const energyChart=(()=>{
          if(enAll.length<1) return null;
          const W=320,H=92,padX=8,padTop=8,padBot=16;
          const n=enAll.length;
          const slot=(W-padX*2)/n;
          const bw=Math.min(slot*0.66,16);
          const maxH=H-padTop-padBot;
          return (
            <div style={{background:"#fff",borderRadius:14,padding:"12px 12px 10px",marginBottom:14,boxShadow:"0 2px 10px rgba(0,0,0,0.06)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:8,fontWeight:800,color:"#6d28d9",letterSpacing:1.5}}>▲ ENERGY</span>
                <span style={{fontSize:7,color:"#b0a898",fontWeight:700}}>{n} days</span>
              </div>
              <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"auto",display:"block"}}>
                <line x1={padX} y1={H-padBot} x2={W-padX} y2={H-padBot} stroke="#ece8e2" strokeWidth="1"/>
                {enAll.map((p,i)=>{
                  const h=EH[p.sym]/5*maxH;
                  const x=padX+slot*i+(slot-bw)/2;
                  const y=(H-padBot)-h;
                  return <rect key={p.key} x={x.toFixed(1)} y={y.toFixed(1)} width={bw.toFixed(1)} height={h.toFixed(1)} rx="2" fill={ECOL[p.sym]||"#ccc"}/>;
                })}
              </svg>
              <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:6,flexWrap:"wrap"}}>
                {["▲▲","▲","■","▼","●"].map(s=>(
                  <span key={s} style={{display:"flex",alignItems:"center",gap:3,fontSize:7,color:"#777",fontWeight:700}}>
                    <span style={{width:8,height:8,borderRadius:2,background:ECOL[s]}}/>{ELAB[s]}
                  </span>
                ))}
              </div>
            </div>
          );
        })();
        if(!moodChart&&!energyChart) return null;
        return <React.Fragment>{moodChart}{energyChart}</React.Fragment>;
      })()}
      {entries.length===0
        ?<EmptyState icon="✨" line="One line a day: your mood, energy, and the moment that mattered. It becomes your emotional arc each quarter."/>
        :<div style={{display:"flex",flexDirection:"column",gap:8}}>
          {[...entries].reverse().map((entry,i,dispEntries)=>{
            const {mo,d,hl,mn,mv,ev}=entry;
            const en=ENERGY.find(e=>e.sym===ev);
            const isEditing=editIdx===i;
            const showDivider=i===0||dispEntries[i-1].mo.m!==mo.m;
            const wkN=(()=>{const wi=weekIdxForDay(mo.m,d);return wi>=0?wkLabel(Q2_WEEKS[wi]):null;})();
            const prevWkN=i>0?(()=>{const wi=weekIdxForDay(dispEntries[i-1].mo.m,dispEntries[i-1].d);return wi>=0?wkLabel(Q2_WEEKS[wi]):null;})():null;
            const showWeek=!showDivider&&i>0&&wkN!==prevWkN;
            return (
              <React.Fragment key={i}>
              {showDivider&&(
                <div style={{display:"flex",alignItems:"center",gap:8,margin:i===0?"0 0 4px":"12px 0 4px"}}>
                  <span style={{fontSize:10,fontWeight:900,color:"#c9a96e",letterSpacing:2}}>{mo.name.toUpperCase()}</span>
                  {wkN&&<span style={{fontSize:7,fontWeight:800,color:"#cbb896",letterSpacing:1}}>{wkN}</span>}
                  <span style={{flex:1,height:1,background:"linear-gradient(90deg,#e8dcc8,transparent)"}}/>
                </div>
              )}
              {showWeek&&(
                <div style={{display:"flex",alignItems:"center",gap:6,margin:"8px 0 3px"}}>
                  <span style={{fontSize:7,fontWeight:800,color:"#cbb896",letterSpacing:1.5}}>{wkN}</span>
                  <span style={{flex:1,height:1,background:"repeating-linear-gradient(90deg,#ece4d6 0 5px,transparent 5px 10px)"}}/>
                </div>
              )}
              <div style={{background:"#fff",borderRadius:12,padding:"10px 14px",boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
                <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  {/* Date + mood + energy controls */}
                  <div style={{flexShrink:0,textAlign:"center",minWidth:36}}>
                    <div onClick={()=>goToDay&&goToDay(mo.m,d)} style={{cursor:"pointer"}} title="open this day">
                      <div style={{fontSize:7,color:"#c9a96e",fontWeight:800,letterSpacing:1}}>{weekdayShort(mo.m,d)}</div>
                      <div style={{fontSize:18,fontWeight:900,color:"#1a1a1a",lineHeight:1}}>{d}</div>
                      <div style={{fontSize:6,color:"#c9a96e",fontWeight:800,letterSpacing:1,marginTop:1}}>OPEN ›</div>
                    </div>
                    {/* Mood (display only) */}
                    <div style={{marginTop:3,fontSize:9,fontWeight:900,color:mv?moodColor(mv):"#ddd",lineHeight:1}}>
                      {mv||"·"}
                    </div>
                    {/* Energy (display only) */}
                    <div style={{marginTop:2,fontSize:9,fontWeight:900,color:en?en.color:"#ddd",lineHeight:1}}>
                      {ev||"·"}
                    </div>
                  </div>
                  {/* Highlight text / edit */}
                  <div style={{flex:1,borderLeft:"2px solid #f5ede0",paddingLeft:10}}>
                    {isEditing
                      ?<div>
                        <div style={{fontSize:7,fontWeight:800,color:"#b8860b",letterSpacing:1,marginBottom:3}}>⭐ HIGHLIGHT (gratitude)</div>
                        <textarea value={editVal} onChange={e=>setEditVal(e.target.value)} autoFocus placeholder="Best moment / gratitude..." style={{width:"100%",border:"1px solid #c9a96e",borderRadius:8,padding:"6px 8px",fontSize:11,fontFamily:"Georgia,serif",resize:"vertical",minHeight:54,outline:"none",color:"#3a2e24",lineHeight:1.5}}/>
                        <div style={{fontSize:7,fontWeight:800,color:"#475569",letterSpacing:1,margin:"6px 0 3px"}}>〰️ MOOD NOTE — why it shifted (optional)</div>
                        <textarea value={editMood} onChange={e=>setEditMood(e.target.value)} placeholder="Only if mood moved a lot..." style={{width:"100%",border:"1px solid #cbd5e1",borderRadius:8,padding:"6px 8px",fontSize:11,fontFamily:"Georgia,serif",resize:"vertical",minHeight:40,outline:"none",color:"#334155",lineHeight:1.5,background:"#f8fafc"}}/>
                        <div style={{display:"flex",gap:6,marginTop:6}}>
                          <button onClick={()=>saveEdit(entry)} style={{background:"#c9a96e",color:"#fff",border:"none",borderRadius:12,padding:"4px 10px",fontSize:8,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>SAVE</button>
                          <button onClick={()=>setEditIdx(null)} style={{background:"#eee",color:"#666",border:"none",borderRadius:12,padding:"4px 10px",fontSize:8,cursor:"pointer",fontFamily:"inherit"}}>CANCEL</button>
                        </div>
                      </div>
                      :<div onClick={()=>startEdit(i,entry)} style={{cursor:"pointer"}}>
                        {hl
                          ?<div style={{fontSize:11,color:"#3a2e24",lineHeight:1.5,fontStyle:"italic",fontFamily:"Georgia,serif"}}>"{hl}"</div>
                          :<div style={{fontSize:9,color:"#ccc"}}>tap to add highlight</div>
                        }
                        {mn&&<div style={{display:"flex",gap:5,marginTop:5,background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:8,padding:"5px 8px"}}>
                          <span style={{fontSize:9,lineHeight:1.4,flexShrink:0}}>〰️</span>
                          <span style={{fontSize:10,color:"#475569",lineHeight:1.4}}>{mn}</span>
                        </div>}
                        <div style={{fontSize:7,color:"#c9a96e",marginTop:4,letterSpacing:1}}>✏ edit</div>
                      </div>
                    }
                  </div>
                </div>
              </div>
              </React.Fragment>
            );
          })}
        </div>
      }
    </div>
  );
}

function EmptyState({icon,line,onAdd,addLabel}){
  return (
    <div style={{textAlign:"center",padding:"44px 24px",display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>
      <div style={{fontSize:38,opacity:0.55}}>{icon}</div>
      <div style={{fontSize:12,color:"#9a9286",lineHeight:1.5,maxWidth:220}}>{line}</div>
      {onAdd&&<button onClick={onAdd} style={{background:"#2a2118",color:"#fff",border:"none",borderRadius:20,padding:"9px 18px",fontSize:10,fontWeight:800,letterSpacing:1,cursor:"pointer",fontFamily:"inherit"}}>{addLabel}</button>}
    </div>
  );
}
function fmtMoney(n,dec){
  const v=parseFloat(n)||0;
  return "$"+v.toLocaleString("en-US",{minimumFractionDigits:dec===0?0:2,maximumFractionDigits:dec===0?0:2});
}

// Timebox slots: 6:00 AM → 2:00 AM next day, 30-min steps
const TIMEBOX_SLOTS=(()=>{const a=[];for(let t=6*60;t<=26*60;t+=30){const hr=Math.floor(t/60);const mm=t%60;const h24=hr%24;const ap=h24<12?"AM":"PM";let h12=h24%12;if(h12===0)h12=12;a.push({key:String(hr).padStart(2,"0")+":"+String(mm).padStart(2,"0"),label:h12+":"+String(mm).padStart(2,"0")+" "+ap,hour:mm===0});}return a;})();

// Auto-growing textarea — expands to fit content, never scrolls internally
function AutoTextarea({value,onChange,placeholder,style,onKeyDown,dataBid}){
  const ref=React.useRef(null);
  const resize=()=>{const el=ref.current;if(el){el.style.height="auto";el.style.height=(el.scrollHeight)+"px";}};
  React.useLayoutEffect(()=>{resize();},[value]);
  return <textarea ref={ref} data-bid={dataBid} value={value} onChange={onChange} onInput={resize} onKeyDown={onKeyDown} placeholder={placeholder} rows={1} style={{...style,overflow:"hidden",resize:"none"}}/>;
}

function buildPlanText(m,d,planData){
  const dk=m+"-"+d; const day=planData[dk]||{};
  const M={4:"APR",5:"MAY",6:"JUN",7:"JUL",8:"AUG",9:"SEP",10:"OCT"};
  let out="DAY PLAN — "+weekdayShort(m,d)+" "+(M[m]||m)+" "+d+", 2026\n"+"=".repeat(36)+"\n\n";
  const items=day.brainstormItems||(day.brainstorm?[{text:day.brainstorm,done:false}]:[]);
  const filledItems=items.filter(it=>(it.text||"").trim());
  if(filledItems.length){ out+="BRAINSTORM:\n"; filledItems.forEach(it=>{out+="  ["+(it.done?"x":" ")+"] "+it.text.trim()+"\n";}); out+="\n"; }
  const slots=TIMEBOX_SLOTS.filter(s=>(day[s.key]||"").trim());
  if(slots.length){ out+="TIMEBOX:\n"; slots.forEach(s=>{out+="  "+s.label+"  "+day[s.key].trim()+"\n";}); }
  if(!filledItems.length&&!slots.length) out+="(empty)";
  return out.trim();
}

function PlanPanel({viewM,viewDay,setViewDay,setViewM,planData,setPlanField,clearPlanDay,allData,getMI,setTask,appendTask,taskChecks,saveTaskChecks,taskSlotsMap,saveTaskSlotsMap,escalations,saveEscalations}){
  const dk=viewM+"-"+viewDay;
  const day=planData[dk]||{};
  const gotoDay=(delta)=>{
    const m=MONTHS_ARR.find(x=>x.m===viewM); if(!m) return;
    let nd=viewDay+delta, nm=viewM;
    if(nd<1){ const pm=MONTHS_ARR.find(x=>x.m===viewM-1); if(pm){nm=pm.m; nd=pm.days;} else nd=1; }
    else if(nd>m.days){ const nx=MONTHS_ARR.find(x=>x.m===viewM+1); if(nx){nm=nx.m; nd=1;} else nd=m.days; }
    setViewM(nm); setViewDay(nd);
  };
  const filled=TIMEBOX_SLOTS.filter(s=>(day[s.key]||"").trim()).length;
  const items=day.brainstormItems||(day.brainstorm&&day.brainstorm.trim()?[{id:1,text:day.brainstorm,done:false}]:[]);
  const setItems=(next)=>setPlanField(viewM,viewDay,"brainstormItems",next);
  const addItem=()=>setItems([...items,{id:Date.now()+Math.random(),text:"",done:false}]);
  const updItem=(id,patch)=>setItems(items.map(it=>it.id===id?{...it,...patch}:it));
  // Reminders-style keyboard: Enter makes a NEW idea below (not a newline inside one).
  // Enter on an empty idea exits the field. Backspace at the very start of an empty idea
  // deletes it and moves focus to the previous idea's end.
  const bFocusId=useRef(null);
  const bHandleKey=(e,it,idx)=>{
    if(e.key==="Enter"&&!e.shiftKey){
      e.preventDefault();
      if(!(it.text||"").trim()){ e.target.blur(); return; }
      const nid=Date.now()+Math.random();
      const arr=[...items];
      arr.splice(idx+1,0,{id:nid,text:"",done:false});
      bFocusId.current=nid;
      setItems(arr);
    } else if(e.key==="Backspace" && !(it.text||"").length){
      e.preventDefault();
      if(items.length<=1) return;
      const prev=items[idx-1];
      setItems(items.filter(x=>x.id!==it.id));
      if(prev) bFocusId.current="end:"+prev.id;
    }
  };
  useEffect(()=>{
    if(!bFocusId.current) return;
    const raw=String(bFocusId.current);
    const toEnd=raw.indexOf("end:")===0;
    const fid=toEnd?raw.slice(4):raw;
    const el=document.querySelector('[data-bid="'+fid+'"]');
    if(el){ el.focus(); if(toEnd){const L=el.value.length; try{el.setSelectionRange(L,L);}catch(_){}} }
    bFocusId.current=null;
  });
  const delItem=(id)=>setItems(items.filter(it=>it.id!==id));
  const pinItem=(id)=>{const it=items.find(x=>x.id===id);if(!it)return;if(it.pin){setItems(items.map(x=>x.id===id?{...x,pin:false}:x));}else{setItems([{...it,pin:true},...items.filter(x=>x.id!==id)]);}};
  const doneCount=items.filter(it=>it.done).length;
  const [copied,setCopied]=useState(false);
  const isTodayView=viewM===TODAY_M&&viewDay===TODAY_D;
  const moveToToday=(id)=>{
    if(isTodayView)return;
    const it=items.find(x=>x.id===id); if(!it)return;
    const tdk=TODAY_M+"-"+TODAY_D;
    const tday=planData[tdk]||{};
    const tItems=tday.brainstormItems||(tday.brainstorm&&tday.brainstorm.trim()?[{id:1,text:tday.brainstorm,done:false}]:[]);
    setPlanField(TODAY_M,TODAY_D,"brainstormItems",[...tItems,{id:Date.now()+Math.random(),text:it.text,done:it.done||false,pin:false}]);
    setPlanField(viewM,viewDay,"brainstormItems",items.filter(x=>x.id!==id));
  };
  // Drag-to-reorder (same interaction as Top 3 tasks in Today)
  const bDragIdx=useRef(null), bOverIdx=useRef(null), bRowRefs=useRef([]);
  const [bDragging,setBDragging]=useState(null);
  const reorderItems=(from,to)=>{if(from===to||from==null||to==null)return;const a=items.slice();const[m]=a.splice(from,1);a.splice(to,0,m);setItems(a);};
  const bStart=(i)=>{bDragIdx.current=i;bOverIdx.current=i;setBDragging(i);};
  const bMove=(e)=>{if(bDragIdx.current===null)return;e.preventDefault();const y=e.touches[0].clientY;let closest=bDragIdx.current,md=Infinity;bRowRefs.current.forEach((ref,ri)=>{if(!ref||ri>=items.length)return;const r=ref.getBoundingClientRect();const d=Math.abs(y-(r.top+r.height/2));if(d<md){md=d;closest=ri;}});bOverIdx.current=closest;};
  const bEnd=()=>{if(bDragIdx.current!==null&&bOverIdx.current!==null)reorderItems(bDragIdx.current,bOverIdx.current);bDragIdx.current=null;bOverIdx.current=null;setBDragging(null);};
  return (
    <div>
      <div style={{background:"linear-gradient(135deg,#332817,#241c12)",borderRadius:18,padding:"14px 16px",marginBottom:14,boxShadow:"0 5px 18px rgba(42,33,24,0.2)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <button onClick={()=>gotoDay(-1)} style={{background:"rgba(255,255,255,0.08)",border:"none",color:"#c9a96e",borderRadius:14,width:28,height:28,fontSize:15,cursor:"pointer",fontFamily:"inherit"}}>‹</button>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:8,fontWeight:800,letterSpacing:3,color:"#c9a96e",textTransform:"uppercase"}}>Day Plan</div>
            <div style={{fontSize:17,fontWeight:900,color:"#fff",lineHeight:1.2}}>{weekdayShort(viewM,viewDay)} {M_LABEL[viewM]} {viewDay}</div>
          </div>
          <button onClick={()=>gotoDay(1)} style={{background:"rgba(255,255,255,0.08)",border:"none",color:"#c9a96e",borderRadius:14,width:28,height:28,fontSize:15,cursor:"pointer",fontFamily:"inherit"}}>›</button>
        </div>
        <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:8,alignItems:"center",flexWrap:"wrap"}}>
          <button onClick={()=>{setViewM(TODAY_M);setViewDay(TODAY_D);}} style={{background:"none",border:"1px solid rgba(201,169,110,0.4)",color:"#c9a96e",borderRadius:12,padding:"3px 12px",fontSize:8,fontWeight:800,letterSpacing:1,cursor:"pointer",fontFamily:"inherit"}}>TODAY</button>
          <button onClick={()=>{copyText(buildDayText(viewM,viewDay,allData,planData));setCopied(true);setTimeout(()=>setCopied(false),1800);}} title="Copies everything for this day: Top 3, grid, notes, wins, brainstorm and timebox" style={{background:copied?"#16a34a":"rgba(201,169,110,0.15)",border:"1px solid rgba(201,169,110,0.4)",color:copied?"#fff":"#c9a96e",borderRadius:12,padding:"3px 12px",fontSize:8,fontWeight:800,letterSpacing:1,cursor:"pointer",fontFamily:"inherit"}}>{copied?"✓ COPIED":(viewM===TODAY_M&&viewDay===TODAY_D?"⧉ COPY TODAY":"⧉ COPY DAY")}</button>
          <span style={{fontSize:8,color:"#a89e8c",fontWeight:700}}>{doneCount}/{items.length} ideas · {filled} slots</span>
        </div>
      </div>

      {/* TOP 3 TASKS — the very same board as the Today tab, not a copy */}
      <Top3Tasks allData={allData} getMI={getMI} viewM={viewM} viewDay={viewDay}
        setTask={setTask} appendTask={appendTask}
        taskChecks={taskChecks} saveTaskChecks={saveTaskChecks}
        taskSlotsMap={taskSlotsMap} saveTaskSlotsMap={saveTaskSlotsMap}
        escalations={escalations} saveEscalations={saveEscalations}/>

      <div style={{background:"#fff",borderRadius:16,border:"1px solid #f0ebe2",marginBottom:12,overflow:"hidden",boxShadow:"0 3px 16px rgba(42,33,24,0.06)"}}>
        <div style={{padding:"8px 14px",background:"#fffdf8",borderBottom:"1px solid #f0e9da",display:"flex",alignItems:"center",gap:8}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:"#c9a96e"}}/>
          <span style={{fontSize:8,fontWeight:800,letterSpacing:2,color:"#8a6d3b"}}>BRAINSTORM — ONE IDEA PER LINE</span>
        </div>
        {items.length===0&&(
          <div style={{padding:"16px 14px",fontSize:11,color:"#b0a594",lineHeight:1.5}}>Dump everything on your mind, one idea per line. Check them off, then pull the timebox + Top 3 out of them.</div>
        )}

function AtlasBudget({onBack}) {

    {q:2,label:"26Q2",sub:"APR–JUN 2026",months:[4,5,6],goal:3000},
    {q:3,label:"26Q3",sub:"JUL–OCT 2026",months:[7,8,9,10],goal:4000},
  ];
  const defaultQ=TODAY_M>=7?3:2;

  const QC=QUARTERS.find(x=>x.q===qView)||QUARTERS[0];

  const OTHER_CATS=["Rent","OW/Gov"];

  const load=()=>{
    try{
      const raw=localStorage.getItem(BK);

      const entries=[];
      Object.entries(parsed).forEach(([m,cats])=>{
        if(typeof cats==="object"&&!Array.isArray(cats)){
          Object.entries(cats).forEach(([cat,val])=>{
            const num=parseFloat(val)||0;
            if(num>0) entries.push({id:Date.now()+Math.random(),month:parseInt(m),amount:num,cat,note:"(migrated)",date:""});
          });
        }
      });
      const migrated={entries};
      try{localStorage.setItem(BK,JSON.stringify(migrated));}catch(e){}
      return migrated;
    }catch(e){return {entries:[]};}
  };
  const [data,setDataRaw]=useState(load);

  const entries=data.entries||[];

  const recurringRaw=data.recurring||[];
  const inferQ=(r)=>{
    if(r.q) return r.q;
    const ms=(r.months&&r.months.length)?r.months:[];
    if(ms.some(m=>m>=7)) return 3;

  };
  const recurring=recurringRaw.map(r=>({...r,q:inferQ(r)}));
  const REC_PRESETS=[{name:"Rent",emoji:"🏠"},{name:"AI / Software",emoji:"🤖"},{name:"Phone",emoji:"📱"},{name:"Internet",emoji:"🌐"},{name:"Transport",emoji:"🚇"},{name:"Subscription",emoji:"📺"}];

  // Swap two entries' positions in the flat array (used by up/down within a month).

            <div style={{fontSize:7,fontWeight:800,color:"#9a8478",letterSpacing:1,marginBottom:5}}>APPLIES TO ({QC.label})</div>

                <button key={mo.m} onClick={()=>toggleRecMonth(mo.m)} style={{flex:1,padding:"7px 0",borderRadius:8,border:on?"none":"1px solid #eaddd5",background:on?"#b45309":"#fff",color:on?"#fff":"#9a8478",fontSize:9,fontWeight:800,letterSpacing:.5,cursor:"pointer",fontFamily:"inherit"}}>{mo.short}</button>

            </div>

          :<div>
            {qRecurring.length===0&&prevQRecurring.length>0&&(

            )}
            <button onClick={()=>{setRecEditId(null);setRecForm({name:"",amount:"",emoji:"",months:[]});setShowRec(true);}} style={{width:"100%",padding:"9px 0",background:"#fffaf7",border:"none",borderTop:"1px solid #f5efe9",color:"#b45309",fontSize:9,fontWeight:800,letterSpacing:1,cursor:"pointer",fontFamily:"inherit"}}>+ ADD RECURRING PAYMENT</button>
          </div>
        }
        </React.Fragment>)}
      </div>
      <div style={{fontSize:8,fontWeight:800,letterSpacing:2,color:"#4a9d6f",margin:"0 2px 7px",display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:11}}>＋</span>WHAT I EARNED · MONEY IN</div>
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {MONTHS_ARR.filter(mo=>inQuarter(mo.m)).map(mo=>(
          <div key={mo.m} style={{flex:1,background:"#fff",borderRadius:10,padding:"8px 8px",textAlign:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>

            <div style={{fontSize:13,fontWeight:900,color:"#4a9d6f",marginTop:2}}>{fmtMoney(totalMonth(mo.m),0)}</div>

      {/* Category breakdown */}
      {totalAll>0&&(
        <div style={{background:"#fff",borderRadius:12,padding:"12px 14px",marginBottom:12,boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <span style={{fontSize:7,fontWeight:700,color:"#888",letterSpacing:1.5}}>BY CATEGORY</span>
            {selCat&&<button onClick={()=>setSelCat(null)} style={{background:"none",border:"none",fontSize:8,color:"#c9a96e",fontWeight:700,cursor:"pointer",fontFamily:"inherit",letterSpacing:1}}>✕ CLEAR FILTER</button>}
          </div>
          <div style={{display:"flex",height:10,borderRadius:6,overflow:"hidden",marginBottom:10}}>
            {INCOME_CATS.map(c=>{
              const ct=entries.filter(e=>e.cat===c).reduce((s,e)=>s+parseFloat(e.amount||0),0);
              const pct=totalAll?ct/totalAll*100:0;
              if(pct<=0) return null;
              return <div key={c} style={{width:pct+"%",background:CAT_COLOR[c]||"#ccc",opacity:selCat&&selCat!==c?0.3:1}}/>;
            })}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {INCOME_CATS.map(c=>{
              const ct=entries.filter(e=>e.cat===c).reduce((s,e)=>s+parseFloat(e.amount||0),0);
              if(ct<=0) return null;
              const pct=totalAll?Math.round(ct/totalAll*100):0;
              const isSel=selCat===c;
              return (
                <div key={c} onClick={()=>setSelCat(isSel?null:c)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",background:isSel?(CAT_COLOR[c]||"#ccc")+"14":"transparent",borderRadius:8,padding:"3px 6px",margin:"0 -6px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{width:8,height:8,borderRadius:2,background:CAT_COLOR[c]||"#ccc"}}/>
                    <span style={{fontSize:9,fontWeight:isSel?900:700,color:"#3a2e24"}}>{catLabel(c)}</span>
                    <span style={{fontSize:8,color:"#b0a898"}}>{pct}%</span>
                  </div>
                  <span style={{fontSize:10,fontWeight:900,color:"#1a1a1a"}}>{fmtMoney(ct)}</span>
                </div>
              );
            })}
          </div>
        </div>

      {showAdd&&(
        <div style={{background:"#fff",borderRadius:12,padding:"14px",marginBottom:16,boxShadow:"0 2px 10px rgba(0,0,0,0.08)"}}>
          <div style={{fontSize:9,fontWeight:800,color:"#2a2118",letterSpacing:2,marginBottom:12}}>{editId?"EDIT ENTRY":"NEW ENTRY"}</div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:7,fontWeight:700,color:"#888",letterSpacing:1.5,marginBottom:3}}>AMOUNT ($)</div>
            <input type="number" min="0" step="0.01" value={form.amount} onChange={e=>{setForm(f=>({...f,amount:e.target.value}));setAmtErr(false);}} placeholder="0.00"

          <div style={{marginBottom:8}}>
            <div style={{fontSize:7,fontWeight:700,color:"#888",letterSpacing:1.5,marginBottom:3}}>CATEGORY</div>

            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:7}}>

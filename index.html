            </div>
            <div style={{fontSize:7,fontWeight:700,color:"#9ca3af",letterSpacing:1,marginBottom:4}}>OTHER — tracked, not counted</div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {OTHER_CATS.map(c=>(
                <button key={c} onClick={()=>setForm(f=>({...f,cat:c}))} style={{padding:"5px 10px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:9,fontWeight:700,background:form.cat===c?(CAT_COLOR[c]||"#555"):"#f0f0f0",color:form.cat===c?"#fff":"#666"}}>{catLabel(c)}</button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:7,fontWeight:700,color:"#888",letterSpacing:1.5,marginBottom:3}}>CLIENT (optional)</div>
            <input list="budgetClients" value={form.client} onChange={e=>setForm(f=>({...f,client:e.target.value}))} placeholder="e.g. Ace / Elina, Baxter, Brian..."
              style={{width:"100%",boxSizing:"border-box",border:"1px solid #e0e0e0",borderRadius:8,padding:"7px 10px",fontSize:13,fontFamily:"inherit",outline:"none",background:"#fafafa"}}/>
            <datalist id="budgetClients">
              {[...new Set(entries.map(x=>x.client).filter(Boolean))].map(c=><option key={c} value={c}/>)}
            </datalist>
            {(()=>{
              const recent=[...new Set(entries.map(x=>x.client).filter(Boolean))].slice(0,6);
              if(!recent.length) return null;
              return (
                <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:6}}>
                  {recent.map(c=>(
                    <button key={c} onClick={()=>setForm(f=>({...f,client:c}))} style={{padding:"3px 9px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:9,fontWeight:700,background:form.client===c?"#2a2118":"#f0f0f0",color:form.client===c?"#fff":"#666"}}>{c}</button>
                  ))}
                </div>
              );
            })()}
          </div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:7,fontWeight:700,color:"#888",letterSpacing:1.5,marginBottom:3}}>MONTH</div>
            <div style={{display:"flex",gap:5}}>
              {MONTHS_ARR.map(mo=>(
                <button key={mo.m} onClick={()=>setForm(f=>({...f,month:mo.m}))} style={{flex:1,padding:"5px 0",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:9,fontWeight:700,background:form.month===mo.m?"#2a2118":"#f0f0f0",color:form.month===mo.m?"#fff":"#666"}}>{mo.short}</button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:7,fontWeight:700,color:"#888",letterSpacing:1.5,marginBottom:3}}>NOTE (optional)</div>
            <AutoTextarea value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="e.g. Paul house sitting, Ace visits..."
              style={{width:"100%",boxSizing:"border-box",border:"1px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontSize:13,fontFamily:"inherit",outline:"none",background:"#fafafa",minHeight:48,lineHeight:1.5}}/>
          </div>
          <button onClick={addEntry} onMouseDown={e=>e.preventDefault()} style={{width:"100%",background:"#2a2118",color:"#fff",border:"none",borderRadius:10,padding:"12px",fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"inherit",letterSpacing:1}}>{editId?"SAVE CHANGES":"ADD INCOME"}</button>
          {editId&&(
            <button onClick={()=>{if(window.confirm("Delete this entry?")){deleteEntry(editId);setShowAdd(false);setEditId(null);setForm({month:TODAY_M,amount:"",cat:"Rover",client:"",note:"",date:""});}}} onMouseDown={e=>e.preventDefault()} style={{width:"100%",marginTop:8,background:"#fff0f0",color:"#ef4444",border:"1.5px solid #f5c2c2",borderRadius:10,padding:"10px",fontSize:10,fontWeight:800,cursor:"pointer",fontFamily:"inherit",letterSpacing:1}}>DELETE ENTRY</button>
          )}
        </div>
      )}
      {entries.length===0
        ?<EmptyState icon="💰" line="Track every dollar you earn this quarter. Start with your last Rover or photography payment." onAdd={()=>{setShowAdd(true);setEditId(null);}} addLabel="+ ADD INCOME"/>
        :[...MONTHS_ARR].filter(mo=>inQuarter(mo.m)).reverse().map(mo=>{
          const mes=entries.filter(e=>e.month===mo.m&&(!selCat||e.cat===selCat));
          if(!mes.length) return null;
          return (
            <div key={mo.m} style={{marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div style={{fontSize:10,fontWeight:900,color:"#1a1a1a",letterSpacing:1}}>{mo.name.toUpperCase()}</div>
                <div style={{display:"flex",alignItems:"baseline",gap:8}}>
                  <span style={{fontSize:8,fontWeight:800,color:"#c9a96e",letterSpacing:0.3}}>earn {fmtMoney(earnedMonth(mo.m))}</span>
                  <span style={{fontSize:12,fontWeight:900,color:"#4a9d6f"}}>{fmtMoney(totalMonth(mo.m))}</span>
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                {mes.map((e,mi2)=>(
                  <div key={e.id} style={{background:e.pending?"#fffdf7":"#fff",borderRadius:10,padding:"10px 10px",boxShadow:"0 1px 6px rgba(0,0,0,0.06)",display:"flex",alignItems:"stretch",gap:8,border:e.pending?"1.5px dashed #d4a574":"1.5px solid transparent"}}>
                    <div style={{display:"flex",flexDirection:"column",justifyContent:"center",gap:2,flexShrink:0}}>
                      <button onClick={()=>{if(mi2>0)swapById(e.id,mes[mi2-1].id);}} disabled={mi2===0} title="move up" style={{width:22,height:20,borderRadius:5,border:"1px solid #ece6dc",background:mi2===0?"#f6f4f0":"#fff",color:mi2===0?"#d8d2c8":"#8a7f6d",cursor:mi2===0?"default":"pointer",fontSize:10,fontWeight:900,padding:0,lineHeight:1,touchAction:"manipulation",WebkitTapHighlightColor:"transparent"}}>▲</button>
                      <button onClick={()=>{if(mi2<mes.length-1)swapById(e.id,mes[mi2+1].id);}} disabled={mi2===mes.length-1} title="move down" style={{width:22,height:20,borderRadius:5,border:"1px solid #ece6dc",background:mi2===mes.length-1?"#f6f4f0":"#fff",color:mi2===mes.length-1?"#d8d2c8":"#8a7f6d",cursor:mi2===mes.length-1?"default":"pointer",fontSize:10,fontWeight:900,padding:0,lineHeight:1,touchAction:"manipulation",WebkitTapHighlightColor:"transparent"}}>▼</button>
                    </div>
                    <div style={{width:4,borderRadius:2,background:CAT_COLOR[e.cat]||"#ccc",flexShrink:0,minHeight:36,opacity:e.pending?0.5:1}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:1,flexWrap:"wrap"}}>
                        <span style={{fontSize:8,fontWeight:800,color:CAT_COLOR[e.cat]||"#555"}}>{catLabel(e.cat)}</span>
                        {e.client&&<span style={{fontSize:9,fontWeight:800,color:"#2a2118"}}>{e.client}</span>}
                        {e.date&&<span style={{fontSize:7,color:"#b0a898"}}>{e.date}</span>}
                        {e.pending&&<span style={{fontSize:7,fontWeight:900,color:"#b8860b",background:"#fdf3dc",borderRadius:8,padding:"1px 6px",letterSpacing:0.5}}>⏳ PENDING</span>}
                      </div>
                      {e.note&&<div style={{fontSize:11,color:"#3a2e24",lineHeight:1.45,marginTop:2,wordBreak:"break-word"}}>{e.note}</div>}
                    </div>
                    <div style={{fontSize:14,fontWeight:900,color:e.pending?"#b8860b":"#1a1a1a",flexShrink:0}}>{fmtMoney(e.amount)}</div>
                    <div style={{display:"flex",flexDirection:"column",gap:3,flexShrink:0}}>
                      <button onClick={()=>togglePending(e.id)} title={e.pending?"Mark as paid":"Mark as pending"} style={{background:e.pending?"#fdf3dc":"#f0f9f0",border:"none",borderRadius:6,padding:"3px 6px",fontSize:8,cursor:"pointer",fontWeight:800,color:e.pending?"#b8860b":"#16a34a",letterSpacing:0.3}}>{e.pending?"mark paid":"pending"}</button>
                      <button onClick={()=>startEdit(e)} style={{background:"#f5f5f5",border:"none",borderRadius:6,padding:"3px 6px",fontSize:9,cursor:"pointer"}}>edit</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        })
      }
    </div>
  );
}

// ── ATLAS JOBS ────────────────────────────────────────────────────────────────
function AtlasJobs({onBack}) {
  const JOBS_KEY="lifeos_jobs26";
  const JOB_STATUSES=["Resume dropped","Applied online","Interview","Trial shift","Offer","Closed"];
  const STATUS_COLOR={"Resume dropped":"#6b7280","Applied online":"#3b82f6","Interview":"#f59e0b","Trial shift":"#8b5cf6","Offer":"#16a34a","Closed":"#9ca3af"};
  const load=()=>{try{const v=localStorage.getItem(JOBS_KEY);return v?JSON.parse(v):[];}catch(e){return [];}};
  const [jobs,setJobsRaw]=useState(load);
  const [showAdd,setShowAdd]=useState(false);
  const [showExp,setShowExp]=useState(false);
  const [form,setForm]=useState({date:"",company:"",status:"Resume dropped",contact:"",note:""});
  const [editId,setEditId]=useState(null);
  const save=(arr)=>{setJobsRaw(arr);localStorage.setItem(JOBS_KEY,JSON.stringify(arr));};
  const addJob=()=>{
    if(!form.company.trim()) return;
    const entry={id:Date.now(),...form,date:form.date||(TODAY_M+"/"+TODAY_D)};
    const updated=editId?jobs.map(j=>j.id===editId?entry:j):[entry,...jobs];
    save(updated);setShowAdd(false);setForm({date:"",company:"",status:"Resume dropped",contact:"",note:""});setEditId(null);
  };
  const deleteJob=(id)=>save(jobs.filter(j=>j.id!==id));
  const startEdit=(j)=>{setForm({date:j.date,company:j.company,status:j.status,contact:j.contact||"",note:j.note||""});setEditId(j.id);setShowAdd(true);};
  const buildExp=()=>{
    let out="JOB APPLICATIONS — Q2 2026\n"+"=".repeat(36)+"\n\n";
    jobs.forEach(j=>{
      out+=`${j.date}  ${j.company}\n`;
      out+=`  Status: ${j.status}\n`;
      if(j.contact) out+=`  Contact: ${j.contact}\n`;
      if(j.note) out+=`  Note: ${j.note}\n`;
      out+="\n";
    });
    return out.trim()||"No applications yet.";
  };
  const fld=(label,key,type="text",placeholder="")=>(
    <div style={{marginBottom:8}}>
      <div style={{fontSize:7,fontWeight:700,color:"#888",letterSpacing:1.5,marginBottom:3}}>{label}</div>
      <input type={type} value={form[key]} onChange={e=>setForm(f=>({...f,[key]:e.target.value}))} placeholder={placeholder}
        style={{width:"100%",boxSizing:"border-box",border:"1px solid #e0e0e0",borderRadius:8,padding:"7px 10px",fontSize:12,fontFamily:"inherit",outline:"none",background:"#fafafa"}}/>
    </div>
  );
  return (
    <div>
      <button onClick={onBack} style={{display:"flex",alignItems:"center",gap:8,background:"#f2ede6",border:"none",borderRadius:20,padding:"8px 16px 8px 12px",cursor:"pointer",fontFamily:"inherit",marginBottom:16,boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}}>
        <span style={{fontSize:18,color:"#c9a96e",fontWeight:900,lineHeight:1}}>‹</span>
        <span style={{fontSize:10,fontWeight:800,color:"#2a2118",letterSpacing:2}}>ATLAS</span>
      </button>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:16}}>
        <div>
          <div style={{fontSize:18,fontWeight:900,color:"#b8860b",letterSpacing:-0.5}}>💼 Job Applications</div>
          <div style={{fontSize:8,color:"#b0a898",letterSpacing:2,marginTop:2}}>{jobs.length} ENTRIES</div>
        </div>
        <div style={{display:"flex",gap:6}}>

// ── ATLAS EXPORTS (week · month · all) ───────────────────────────────────────
function _exGMI(m){return MONTHS_ARR.findIndex(x=>x.m===m);}
function _exReadLS(key){try{const v=localStorage.getItem(key);return v?JSON.parse(v):null;}catch(e){return null;}}
function _exWeekDays(wk){
  const days=[];let m=wk.start[0],d=wk.start[1];
  for(let i=0;i<14;i++){
    days.push({m,d});
    if(m===wk.end[0]&&d===wk.end[1]) break;
    d++;const mi=_exGMI(m);
    if(mi>=0&&d>MONTHS_ARR[mi].days){const ni=mi+1;if(ni>=MONTHS_ARR.length)break;m=MONTHS_ARR[ni].m;d=1;}
  }
  return days;
}
function buildWeekText(wk, allData){
  const M_NAME={4:"APR",5:"MAY",6:"JUN",7:"JUL",8:"AUG",9:"SEP",10:"OCT"};
  const wdays=_exWeekDays(wk);
  const tc=_exReadLS("lifeos_v8_taskChecks")||{};
  const pc=_exReadLS("lifeos_v8_priChecks")||{};
  const wa=_exReadLS("weekAssess")||{};
  let out=`LIFE OS · 26Q${wk.q||2} WEEK ${wk.wn||wk.n} EXPORT (${wk.sm} ${wk.start[1]} to ${wk.em} ${wk.end[1]})\n`;
  out+=`Generated: ${M_NAME[TODAY_M]||TODAY_M} ${TODAY_D}\n\n`;
  const finalWins=readWeeklyWins()["w"+wk.n];
  if(finalWins&&finalWins.trim()){
    out+=`⭐ Q${wk.q||2} WEEK ${wk.wn||wk.n} WINS (FINAL, after review):\n`;
    finalWins.trim().split("\n").forEach(l=>{if(l.trim())out+=`  ${l.trim()}\n`;});
    out+=`\n`;
  }
  out+=`TOP 3 (PW·PB·PA) DAILY:\n`;
  let t3FullDays=0;
  wdays.forEach(({m,d})=>{
    const mi=_exGMI(m); const data=allData[mi]; if(!data) return;
    const pct=top3pct(data,d,m);
    const en=data.energy?.[d]||"·";
    const mood=data.mood?.[d]||"·";
    const _pil=isQ3Day(m,d)?Q3_PILLARS:TOP3;
    const marks=_pil.map(h=>(h.disp||h.code)+(data.grid?.[h.code]?.[d]?"✓":"✗")).join(" ");
    const allChecked=["t1","t2","t3"].every(slot=>!!tc[m+"-"+d+"-"+slot+"-c"]);
    if(allChecked) t3FullDays++;
    out+=`  ${M_NAME[m]||m} ${d}: ${marks} [${pct}%] energy:${en} mood:${mood}${allChecked?" ✓✓✓":""}\n`;
    const note=data?.notes?.[d];
    if(note?.trim()) out+=`    NOTE: ${note.trim()}\n`;
    const hl=data?.highlights?.[d];
    if(hl?.trim()){const _hc=(_exReadLS("lifeos_v8_hlChecked")||{})[m+"-"+d];out+=`    ✨ HIGHLIGHT${_hc?" ✓":""}: ${hl.trim()}\n`;}
    const wns=data?.wins?.[d];
    if(wns?.trim()){
      out+=`    WINS (raw):\n`;
      wns.trim().split("\n").forEach(line=>{if(line.trim()) out+=`      ${line.trim()}\n`;});
    }
    const t=data.tasks?.[d]||{};
    for(let s=1;s<=10;s++){
      const slot="t"+s;
      if(!(t[slot]||"").replace(/\u200b/g,"").trim()) break;
      const chk=!!tc[m+"-"+d+"-"+slot+"-c"];
      out+=`    T${s} [${chk?"✓":"·"}]: ${t[slot].replace(/\u200b/g,"").trim()}\n`;
    }
  });
  out+=`  TOP 3 TASKS FULLY DONE: ${t3FullDays}/${wdays.length} days\n`;
  out+=`\nHAT WEEK SUMMARY:\n`;
  ALL_HATS.forEach(h=>{
    const filled=wdays.filter(({m,d})=>{
      const mi=_exGMI(m); return allData[mi]?.grid?.[h.code]?.[d];
    }).length;
    if(filled>0) out+=`  ${h.code}: ${filled}/${wdays.length} days\n`;
  });
  const wkPriChecks=pc["w"+wk.n]||[];
  const pris=(wa?.["w"+wk.n]?.priorities||[]);
  if(pris.some(p=>(p||"").trim())){
    out+=`\nWEEK PRIORITIES (Q${wk.q||2} W${wk.wn||wk.n}):\n`;
    pris.forEach((p,i)=>{
      if((p||"").trim()) out+=`  ${i+1}. [${wkPriChecks.includes(i)?"✓":"·"}] ${p}\n`;
    });
  }
  out+=`\nend of Q${wk.q||2} Week ${wk.wn||wk.n} export`;
  return out;
}
function buildMonthStats(mo, allData){
  const mi=_exGMI(mo.m);
  const data=allData[mi];
  const elapsed=(mo.m<TODAY_M)?mo.days:(mo.m===TODAY_M?TODAY_D:0);
  if(!data||elapsed===0) return `${mo.name.toUpperCase()} — no data yet.`;
  const tc=_exReadLS("lifeos_v8_taskChecks")||{};
  let out=`LIFE OS — ${mo.name.toUpperCase()} 2026 STATS\n`;
  out+=`Days elapsed: ${elapsed}/${mo.days}\n\n`;
  out+=`HAT COMPLETION (days marked / days elapsed):\n`;
  ALL_HATS.forEach(h=>{
    let n=0;for(let d=1;d<=elapsed;d++){if(data.grid?.[h.code]?.[d])n++;}
    if(n>0) out+=`  ${h.code}: ${n}/${elapsed} (${Math.round(n/elapsed*100)}%)\n`;
  });
  const moods=[];for(let d=1;d<=elapsed;d++){const v=data.mood?.[d];if(v)moods.push(v);}
  if(moods.length){
    const avg=(moods.reduce((a,b)=>a+b,0)/moods.length).toFixed(1);
    out+=`\nMOOD: avg ${avg} · min ${Math.min(...moods)} · max ${Math.max(...moods)} · logged ${moods.length}/${elapsed} days\n`;
  }
  const eCounts={};for(let d=1;d<=elapsed;d++){const e=data.energy?.[d];if(e)eCounts[e]=(eCounts[e]||0)+1;}
  const eKeys=Object.keys(eCounts);
  if(eKeys.length){
    out+=`ENERGY: `+eKeys.map(k=>`${k}×${eCounts[k]}`).join("  ")+`\n`;
  }
  let t3Full=0;for(let d=1;d<=elapsed;d++){if(["t1","t2","t3"].every(s=>!!tc[mo.m+"-"+d+"-"+s+"-c"]))t3Full++;}
  out+=`TOP 3 TASKS FULLY DONE: ${t3Full}/${elapsed} days\n`;
  let hlN=0,winN=0;for(let d=1;d<=elapsed;d++){if(data.highlights?.[d]?.trim())hlN++;if(data.wins?.[d]?.trim())winN++;}
  out+=`HIGHLIGHTS LOGGED: ${hlN} days · WINS LOGGED: ${winN} days\n`;
  out+=`\n(Full notes + highlights + wins text lives in the Month tab export)\nend of ${mo.name} stats`;
  return out;
}
// One export for the whole day: everything from the Today tab AND the Plan tab.
// Both COPY buttons (Today + Plan) call this, so they always produce the same text.
function buildDayText(m,d,allData,planData){
  const mi=_exGMI(m);
  const data=allData[mi];
  const M={4:"APR",5:"MAY",6:"JUN",7:"JUL",8:"AUG",9:"SEP",10:"OCT"};
  let out=`LIFE OS — DAY EXPORT · ${weekdayShort(m,d)} ${M[m]||m} ${d}, 2026\n`;
  out+="=".repeat(40)+"\n";
  if(!data){ out+="\nNo data for this day.\n"; return out; }
  const en=data.energy?.[d], mv=data.mood?.[d];
  out+=`Energy: ${en||"—"}   Mood: ${mv?mv+"/10":"—"}\n\n`;
  const tc=_exReadLS("lifeos_v8_taskChecks")||{};
  const t=data.tasks?.[d]||{};
  out+="TOP 3 TASKS:\n";
  let any=false;
  for(let s=1;s<=10;s++){
    const slot="t"+s; const val=(t[slot]||"").replace(/\u200b/g,"").trim();
    if(!val){ if(s<=3) continue; else break; }
    const chk=!!tc[m+"-"+d+"-"+slot+"-c"];
    out+=`  ${s<=3?"T"+s:"  "} [${chk?"✓":"·"}] ${val}\n`; any=true;
  }
  if(!any) out+="  (none set)\n";
  const marks=ALL_HATS.filter(h=>data.grid?.[h.code]?.[d]).map(h=>h.code+(data.grid[h.code][d]==="box"?"⊠":"✓"));
  out+=`\nHATS MARKED: ${marks.length?marks.join("  "):"—"}\n`;
  const note=data.notes?.[d]; if(note?.trim()) out+=`\nNOTE:\n  ${note.trim().split("\n").join("\n  ")}\n`;
  const hl=data.highlights?.[d]; if(hl?.trim()){const _hc=(_exReadLS("lifeos_v8_hlChecked")||{})[m+"-"+d];out+=`\n✨ HIGHLIGHT${_hc?" ✓":""}:\n  ${hl.trim()}\n`;}
  const mn=data.moodNotes?.[d]; if(mn?.trim()) out+=`\n〰️ MOOD SHIFT:\n  ${mn.trim()}\n`;
  const wns=data.wins?.[d]; if(wns?.trim()){ out+=`\nWINS:\n`; wns.trim().split("\n").forEach(l=>{if(l.trim())out+=`  ${l.trim()}\n`;}); }
  // ── PLAN TAB — same day only ──
  const pd=planData||_exReadLS("lifeos_v8_plan")||{};
  const pday=pd[m+"-"+d]||{};
  const bItems=(pday.brainstormItems||(pday.brainstorm?[{text:pday.brainstorm,done:false}]:[])).filter(it=>(it.text||"").trim());
  if(bItems.length){
    out+=`\nBRAINSTORM:\n`;
    bItems.forEach(it=>{ out+=`  [${it.done?"x":" "}] ${it.text.trim()}\n`; });
  }
  const tbSlots=TIMEBOX_SLOTS.filter(s=>(pday[s.key]||"").trim());
  if(tbSlots.length){
    out+=`\nTIMEBOX:\n`;
    tbSlots.forEach(s=>{ out+=`  ${s.label}  ${pday[s.key].trim()}\n`; });
  }
  out+=`\nend of day export`;
  return out;
}

function buildFullGridText(allData){
  const tc=_exReadLS("lifeos_v8_taskChecks")||{};
  const MNAME={4:"APRIL",5:"MAY",6:"JUNE",7:"JULY",8:"AUGUST",9:"SEPTEMBER",10:"OCTOBER"};
  const MSHORT={4:"APR",5:"MAY",6:"JUN",7:"JUL",8:"AUG",9:"SEP",10:"OCT"};
  let out=`LIFE OS — FULL QUARTER GRID · APR 1 – ${MSHORT[TODAY_M]||TODAY_M} ${TODAY_D}, 2026\n`;
  out+=`Legend: ✓ done · ⊠ boxing (counts 2) · ◀ back · % = Top3 day · T3 = tasks checked · E energy · M mood\n`;
  MONTHS_ARR.forEach((mo,mi)=>{
    const elapsed=(mo.m<TODAY_M)?mo.days:(mo.m===TODAY_M?TODAY_D:0);
    if(!elapsed) return;
    const data=allData[mi];
    if(!data) return;
    out+=`\n${MNAME[mo.m]||mo.name} 2026\n`;
    for(let d=1;d<=elapsed;d++){
      const pct=top3pct(data,d,mo.m);
      const en=data.energy?.[d]||"·";
      const mood=data.mood?.[d]||"·";
      const t3n=["t1","t2","t3"].filter(s=>!!tc[mo.m+"-"+d+"-"+s+"-c"]).length;
      const marks=ALL_HATS.map(h=>{
        const st=data.grid?.[h.code]?.[d];
        if(!st) return null;
        return h.code+(st==="box"?"⊠":st==="back"?"◀":"✓");
      }).filter(Boolean).join(" ");
      out+=`  ${String(d).padStart(2," ")} ${weekdayShort(mo.m,d)} | ${String(pct).padStart(3," ")}% T3:${t3n}/3 E:${en} M:${mood} | ${marks||"—"}\n`;
      const hl=data.highlights?.[d];
      if(hl&&hl.trim()){const _hc=(_exReadLS("lifeos_v8_hlChecked")||{})[mo.m+"-"+d];out+=`       ✨${_hc?"✓":""} ${hl.trim()}\n`;}
    }
    const tot=ALL_HATS.map(h=>{
      let n=0;
      for(let d=1;d<=elapsed;d++){const st=data.grid?.[h.code]?.[d];if(st==="box")n+=2;else if(st)n++;}
      return n?`${h.code}:${n}`:null;
    }).filter(Boolean).join("  ");
    out+=`  ${mo.short} TOTALS (${elapsed}d): ${tot||"—"}\n`;
  });
  out+=`\nend of full quarter grid`;
  return out;
}

          </div>

              const lines=text.split("\n");

                const line=raw.replace(/\u200b/g,"");
                const t=line.trim();
                if(t===""){ out.push(<div key={i} style={{height:10}}/>); return; }
                const letters=t.replace(/[^A-Za-zА-Яа-я]/g,"");
                const isUpper=letters.length>=2 && letters===letters.toUpperCase() && t.length<=48;
                const _cp0=t.codePointAt(0);
                const startsEmoji=(_cp0>=0x1F000&&_cp0<=0x1FAFF)||(_cp0>=0x2600&&_cp0<=0x27BF)||"✦✧★☆▲■".indexOf(t[0])>=0;
                const isHeading=isUpper||(startsEmoji&&t.length<=48)||(/[:：]$/.test(t)&&t.length<=42);
                const isBullet=/^[-•·*–—]\s+/.test(t);
                const isQuote=/^["“«].*["”»]$/.test(t);
                const isNumbered=/^\d+[.)]\s+/.test(t);
                if(isHeading){
                  out.push(<div key={i} style={{fontSize:11,fontWeight:900,color:"#b8860b",letterSpacing:1.5,textTransform:"none",marginTop:out.length?14:0,marginBottom:4,fontFamily:"inherit"}}>{t.replace(/[:：]$/,"")}</div>);
                } else if(isQuote){
                  out.push(<div key={i} style={{fontSize:13,fontFamily:"Georgia,serif",fontStyle:"italic",color:"#7a5c2e",lineHeight:1.55,margin:"6px 0",paddingLeft:10,borderLeft:"2px solid #e6d3a8"}}>{t}</div>);
                } else if(isBullet){
                  out.push(
                    <div key={i} style={{display:"flex",gap:8,margin:"3px 0",paddingLeft:4}}>
                      <span style={{color:"#c9a96e",fontWeight:900,flexShrink:0,lineHeight:1.6}}>•</span>
                      <span style={{fontSize:12.5,fontFamily:"Georgia,serif",color:"#3a2e24",lineHeight:1.6}}>{t.replace(/^[-•·*–—]\s+/,"")}</span>
                    </div>
                  );
                } else if(isNumbered){
                  const m=t.match(/^(\d+)[.)]\s+(.*)$/);
                  out.push(
                    <div key={i} style={{display:"flex",gap:8,margin:"3px 0",paddingLeft:4}}>
                      <span style={{color:"#c9a96e",fontWeight:900,flexShrink:0,lineHeight:1.6,minWidth:16}}>{m[1]}.</span>
                      <span style={{fontSize:12.5,fontFamily:"Georgia,serif",color:"#3a2e24",lineHeight:1.6}}>{m[2]}</span>
                    </div>
                  );
                } else {
                  out.push(<div key={i} style={{fontSize:12.5,fontFamily:"Georgia,serif",color:"#3a2e24",lineHeight:1.7,margin:"2px 0",wordBreak:"break-word"}}>{t}</div>);
                }
              });
              return out;
            })()}
          </div>
          :<div style={{textAlign:"center",padding:"36px 20px",color:"#b0a898",fontSize:11,lineHeight:1.6}}>
            Your Vision lives here.<br/>Tap ✏ EDIT and paste the latest version<br/>from Notion. It saves on this device.
          </div>
      }
    </div>
  );
}

function AtlasRoutines({onBack}) {
  const RK="lifeos_routines26";
  const SEED=[
    {id:"w1",period:"week",text:"Water the flowers"},
    {id:"w2",period:"week",text:"Floss my teeth"},
    {id:"m1",period:"month",text:"Change the bedspread on the bed"},
    {id:"q1",period:"quarter",text:"Create the Vision for the next quarter"},
  ];
  const load=()=>{try{const v=localStorage.getItem(RK);const st=v?JSON.parse(v):null;if(st&&Array.isArray(st.items))return st;}catch(e){}return {items:SEED,checks:{}};};
  const [state,setState]=useState(load);
  const save=(next)=>{setState(next);try{localStorage.setItem(RK,JSON.stringify(next));}catch(e){}};
  // Period keys: when the week / month / quarter rolls over, the key changes and
  // every check in that group resets automatically.
  const curWeek=Q2_WEEKS.find(w=>TODAY_M*100+TODAY_D>=w.start[0]*100+w.start[1]&&TODAY_M*100+TODAY_D<=w.end[0]*100+w.end[1]);
  const periodKey=(period)=>{
    if(period==="week") return curWeek?("26Q"+(curWeek.q||2)+"-W"+(curWeek.wn||curWeek.n)):("wk-"+TODAY_M+"-"+TODAY_D);
    if(period==="month") return "2026-"+TODAY_M;
    return curWeek?("26Q"+(curWeek.q||2)):(TODAY_M>=7?"26Q3":"26Q2");
  };
  const isDone=(it)=>state.checks[it.id]===periodKey(it.period);
  const toggle=(it)=>{
    const checks={...state.checks};
    if(isDone(it)) delete checks[it.id]; else checks[it.id]=periodKey(it.period);
    save({...state,checks});
  };
  const [drafts,setDrafts]=useState({week:"",month:"",quarter:""});
  const addItem=(period)=>{
    const t=(drafts[period]||"").trim(); if(!t) return;
    save({...state,items:[...state.items,{id:"u"+Date.now(),period,text:t}]});
    setDrafts(d=>({...d,[period]:""}));
  };
  const delItem=(it)=>{
    if(!confirm('Remove "'+it.text+'" from routines?')) return;
    const checks={...state.checks}; delete checks[it.id];
    save({items:state.items.filter(x=>x.id!==it.id),checks});
  };
  const GROUPS_R=[
    {period:"week",   label:"ONCE A WEEK",    sub:"resets every week",    cur:curWeek?wkLabel(curWeek):"", color:"#0369a1", bg:"#f0f9ff", bdr:"#bae0f5"},
    {period:"month",  label:"ONCE A MONTH",   sub:"resets every month",   cur:M_LABEL[TODAY_M]||"", color:"#b8860b", bg:"#fffbeb", bdr:"#f0dfb0"},
    {period:"quarter",label:"ONCE A QUARTER", sub:"resets every quarter", cur:periodKey("quarter"), color:"#7c3aed", bg:"#f5f3ff", bdr:"#ddd3f5"},
  ];
  return (
    <div>
      <button onClick={onBack} style={{display:"flex",alignItems:"center",gap:8,background:"#f2ede6",border:"none",borderRadius:20,padding:"8px 16px 8px 12px",cursor:"pointer",fontFamily:"inherit",marginBottom:16,boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}}>
        <span style={{fontSize:18,color:"#c9a96e",fontWeight:900,lineHeight:1}}>‹</span>
        <span style={{fontSize:10,fontWeight:800,color:"#2a2118",letterSpacing:2}}>ATLAS</span>
      </button>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:18,fontWeight:900,color:"#0369a1",letterSpacing:-0.5}}>🔁 Routines</div>
        <div style={{fontSize:8,color:"#b0a898",letterSpacing:2,marginTop:2}}>ONCE A WEEK · ONCE A MONTH · ONCE A QUARTER</div>
      </div>
      {GROUPS_R.map(grp=>{
        const items=state.items.filter(it=>it.period===grp.period);
        const doneN=items.filter(isDone).length;
        return (
          <div key={grp.period} style={{background:"#fff",borderRadius:16,border:"1px solid #f0ebe2",marginBottom:12,overflow:"hidden",boxShadow:"0 3px 16px rgba(42,33,24,0.06)"}}>
            <div style={{padding:"9px 14px",background:grp.bg,borderBottom:"1px solid "+grp.bdr,display:"flex",alignItems:"center",gap:8}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:grp.color}}/>
              <span style={{fontSize:9,fontWeight:900,letterSpacing:2,color:grp.color}}>{grp.label}</span>
              <span style={{fontSize:7,color:"#a89e8c",fontWeight:700,letterSpacing:0.5}}>{grp.cur} · {grp.sub}</span>
              <span style={{flex:1}}/>
              <span style={{fontSize:9,fontWeight:900,color:doneN===items.length&&items.length>0?"#16a34a":"#b0a594"}}>{doneN}/{items.length}</span>
            </div>
            {items.map(it=>{
              const done=isDone(it);
              return (
                <div key={it.id} style={{display:"flex",alignItems:"center",gap:9,padding:"10px 12px",borderTop:"1px solid #f3efe7"}}>
                  <button onClick={()=>toggle(it)} style={{flexShrink:0,width:22,height:22,borderRadius:"50%",border:"2px solid "+(done?"#16a34a":"#d8cdb8"),background:done?"#16a34a":"#fff",cursor:"pointer",padding:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",lineHeight:1,touchAction:"manipulation"}}>{done?"✓":""}</button>
                  <span style={{flex:1,fontSize:12,color:done?"#c8bfaf":"#241c12",fontWeight:done?400:600,textDecoration:done?"line-through":"none",textDecorationColor:"rgba(170,158,138,0.45)",textDecorationThickness:"1px",lineHeight:1.4}}>{it.text}</span>
                  <button onClick={()=>delItem(it)} title="Remove" style={{flexShrink:0,width:22,height:22,borderRadius:6,background:"none",border:"none",color:"#cfc6b6",fontSize:12,cursor:"pointer",padding:0,touchAction:"manipulation"}}>✕</button>
                </div>
              );
            })}
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderTop:"1px solid #f3efe7",background:"#fffdf8"}}>
              <input value={drafts[grp.period]} onChange={e=>setDrafts(d=>({...d,[grp.period]:e.target.value}))}
                onKeyDown={e=>{if(e.key==="Enter")addItem(grp.period);}} placeholder="Add routine..."
                style={{flex:1,border:"none",outline:"none",background:"none",fontSize:11,fontFamily:"inherit",color:"#3a2e24",minWidth:0}}/>
              <button onClick={()=>addItem(grp.period)} style={{flexShrink:0,background:grp.color,color:"#fff",border:"none",borderRadius:14,padding:"4px 12px",fontSize:8,fontWeight:900,letterSpacing:1,cursor:"pointer",fontFamily:"inherit",touchAction:"manipulation"}}>+ ADD</button>
            </div>
          </div>
        );
      })}
      <div style={{fontSize:8,color:"#b0a594",textAlign:"center",padding:"4px 0 14px",lineHeight:1.5}}>Checks reset automatically when a new week, month, or quarter starts.</div>
    </div>
  );
}

  return (
    <div>
      <div style={{background:"linear-gradient(135deg,#332817,#241c12)",borderRadius:20,padding:"18px 20px",marginBottom:18,boxShadow:"0 6px 22px rgba(42,33,24,0.22)"}}>
        <div style={{fontSize:8,fontWeight:800,letterSpacing:3,color:"#c9a96e",textTransform:"uppercase"}}>2026 · Overview</div>
        <div style={{fontSize:26,fontWeight:900,color:"#fff",letterSpacing:-0.5,marginTop:4,lineHeight:1}}>ATLAS</div>
        <div style={{fontSize:8,color:"#a89e8c",marginTop:7,letterSpacing:1}}>Charts · exports · budget · vision</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {tiles.map(tile=>(
          <button key={tile.id} onClick={()=>setSection(tile.id)} style={{
            background:"#fff",border:"1px solid #efe9df",borderRadius:16,padding:"13px",
            cursor:"pointer",textAlign:"left",fontFamily:"inherit",
            boxShadow:"0 2px 10px rgba(42,33,24,0.05)",
            WebkitTapHighlightColor:"transparent",display:"flex",flexDirection:"column",gap:8,
          }}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{width:34,height:34,borderRadius:10,background:tile.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,border:`1px solid ${tile.color}33`}}>{tile.icon}</div>
              <div style={{width:18,height:18,borderRadius:"50%",background:tile.color+"14",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:tile.color,fontWeight:900,lineHeight:1}}>›</div>
            </div>
            <div>
              <div style={{fontSize:12,fontWeight:900,color:"#2a2118",lineHeight:1.15,whiteSpace:"pre-line"}}>{tile.label}</div>
              <div style={{fontSize:7.5,color:"#a89e8c",letterSpacing:.3,fontWeight:500,marginTop:3}}>{tile.desc}</div>
            </div>

        ))}
      </div>
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [tabIdx,setTabIdx]=useState(0);
  const [dragX,setDragX]=useState(0);
  const [isDrag,setIsDrag]=useState(false);
  const tsX=useRef(null),tsY=useRef(null),wRef=useRef(390);

  // Rotating mantra
  const [mantraIdx,setMantraIdx]=useState(()=>Math.floor(Math.random()*ALL_QUOTES.length));
  const nextMantra=()=>setMantraIdx(i=>(i+1)%ALL_QUOTES.length);

  const [monthIdx,setMonthIdx]=useState(()=>Math.max(0,MONTHS_ARR.findIndex(m=>m.m===TODAY_M)));
  const [weekIdx,setWeekIdx]=useState(()=>{
    const i=Q2_WEEKS.findIndex(w=>TODAY_M*100+TODAY_D>=w.start[0]*100+w.start[1]&&TODAY_M*100+TODAY_D<=w.end[0]*100+w.end[1]);
    return i>=0?i:0;
  });
  const [viewDay,setViewDay]=useState(TODAY_D);
  const [viewM,setViewM]=useState(TODAY_M);

  // Day rollover: if the app was left open past midnight, refresh once when it becomes
  // visible again so "today" (and Move-to-today) points at the real current date.
  useEffect(()=>{
    const check=()=>{if(document.visibilityState==="visible"){const n=new Date();if(n.getDate()!==TODAY_D||n.getMonth()+1!==TODAY_M){location.reload();}}};
    document.addEventListener("visibilitychange",check);
    window.addEventListener("focus",check);
    return ()=>{document.removeEventListener("visibilitychange",check);window.removeEventListener("focus",check);};
  },[]);

  // localStorage helpers
  const LS_VERSION = "lifeos_v8";
  function lsGet(key, fallback) {
    try { const v=localStorage.getItem(LS_VERSION+"_"+key); return v?JSON.parse(v):fallback; } catch(e){ return fallback; }
  }
  function lsSet(key, val) {
    try { localStorage.setItem(LS_VERSION+"_"+key, JSON.stringify(val)); } catch(e){}
  }

  // Persisted state: allData, hatCounts, weekAssess
  const [allData,setAllData]=useState(()=>{
    const d=lsGet("allData", MONTHS_ARR.map(m=>initMonth(m.days)));
    if(Array.isArray(d)&&d.length<MONTHS_ARR.length){
      for(let i=d.length;i<MONTHS_ARR.length;i++) d.push(initMonth(MONTHS_ARR[i].days));
    }
    // Append-only migration: months saved by an older version have no column for
    // codes added later (PB1/PB2). Add the missing columns, never touch existing ones.
    if(Array.isArray(d)){
      d.forEach((mo,i)=>{
        if(!mo||typeof mo!=="object") return;
        if(!mo.grid) mo.grid={};
        const days=MONTHS_ARR[i]?.days||31;
        ALL_HATS.forEach(h=>{
          if(!mo.grid[h.code]){
            const col={}; for(let dd=1;dd<=days;dd++) col[dd]=null;
            mo.grid[h.code]=col;
          }
        });
      });
    }
    return d;
  });
  const [hatCounts,setHatCounts]=useState(()=>lsGet("hatCounts", (()=>{const o={};ALL_HATS.forEach(h=>{o[h.code]=0;});return o;})()));
  const [weekAssess,setWeekAssess]=useState(()=>lsGet("weekAssess",{}));
  const [winsLogged,setWinsLogged]=useState(()=>lsGet("winsLogged",{}));
  const [timers_unused]=useState([]);
  const ivsRef=useRef([]);

  // Auto-save to localStorage whenever data changes
  useEffect(()=>lsSet("allData",allData),[allData]);
  useEffect(()=>lsSet("hatCounts",hatCounts),[hatCounts]);
  useEffect(()=>lsSet("weekAssess",weekAssess),[weekAssess]);
  useEffect(()=>lsSet("winsLogged",winsLogged),[winsLogged]);
  const toggleWinsLogged=(m,day)=>setWinsLogged(p=>{const k=m+"-"+day;return{...p,[k]:!p[k]};});
  const [hlChecked,setHlChecked]=useState(()=>lsGet("hlChecked",{}));
  useEffect(()=>lsSet("hlChecked",hlChecked),[hlChecked]);
  const toggleHlChecked=(m,day)=>setHlChecked(p=>{const k=m+"-"+day;return{...p,[k]:!p[k]};});

  // ── TOP 3 TASKS — shared state for the Today tab and the Plan tab ──
  // Extra task slots — stored per-day so each day is independent
  const [taskSlotsMap,setTaskSlotsMap]=useState(()=>{
    try{const v=localStorage.getItem("lifeos_v8_taskSlots");return v?JSON.parse(v):{}}catch(e){return {};}
  });
  const saveTaskSlotsMap=(next)=>{setTaskSlotsMap(next);try{localStorage.setItem("lifeos_v8_taskSlots",JSON.stringify(next));}catch(e){};};
  // ESCALATION — isolated store, keyed by task text.
  const [escalations,setEscalations]=useState(()=>{
    try{const v=localStorage.getItem("lifeos_escalations26");return v?JSON.parse(v):{}}catch(e){return {};}
  });
  const saveEscalations=(next)=>{setEscalations(next);try{localStorage.setItem("lifeos_escalations26",JSON.stringify(next));}catch(e){}};
  const [taskChecks,setTaskChecks]=useState(()=>{
    try{
      const raw=localStorage.getItem("lifeos_v8_taskChecks");
      if(!raw) return {};
      const old=JSON.parse(raw);
      // Migrate: detect old format keys like "5-4-c" (array of indices) → new "5-4-t1-c" (boolean)
      let migrated=false;
      const next={...old};
      Object.keys(old).forEach(key=>{
        // Old check key pattern: "m-d-c" with array value
        const checkMatch=key.match(/^(\d+)-(\d+)-c$/);
        if(checkMatch&&Array.isArray(old[key])){
          const [,m,d]=checkMatch;
          old[key].forEach(idx=>{
            const slot="t"+(idx+1);
            next[m+"-"+d+"-"+slot+"-c"]=true;
          });
          delete next[key];
          migrated=true;
        }
        // Old carry key pattern: "m-d-r" with array value
        const carryMatch=key.match(/^(\d+)-(\d+)-r$/);
        if(carryMatch&&Array.isArray(old[key])){
          const [,m,d]=carryMatch;
          old[key].forEach(idx=>{
            const slot="t"+(idx+1);
            next[m+"-"+d+"-"+slot+"-r"]=true;
          });
          delete next[key];
          migrated=true;
        }
      });
      if(migrated){
        localStorage.setItem("lifeos_v8_taskChecks",JSON.stringify(next));
      }
      return next;
    }catch(e){return {};}
  });
  const saveTaskChecks=(next)=>{setTaskChecks(next);try{localStorage.setItem("lifeos_v8_taskChecks",JSON.stringify(next));}catch(e){}};

  // Day Plan (brainstorm + timeboxing) — scratch planning, persisted per day
  const [planData,setPlanData]=useState(()=>lsGet("plan",{}));
  useEffect(()=>lsSet("plan",planData),[planData]);
  const setPlanField=(m,day,key,val)=>setPlanData(p=>{const dk=m+"-"+day;return{...p,[dk]:{...(p[dk]||{}),[key]:val}};});
  const clearPlanDay=(m,day)=>setPlanData(p=>{const dk=m+"-"+day;const n={...p};delete n[dk];return n;});

  const setAssess=(field,val)=>setWeekAssess(p=>({...p,[field]:val}));
  // Priorities are stored per week number: weekAssess["w4"] = {priorities:[...]}
  const setPriority=(wn,i,val)=>setWeekAssess(p=>{
    const key="w"+wn;
    const cur=(p[key]?.priorities||["","","","",""]);
    const next=[...cur];next[i]=val;
    return {...p,[key]:{...(p[key]||{}),priorities:next}};
  });
  const setHighlight=(m,day,v)=>mutData(m,d=>({...d,highlights:{...(d.highlights||{}),[day]:v}}));
  const setMoodNote=(m,day,v)=>mutData(m,d=>({...d,moodNotes:{...(d.moodNotes||{}),[day]:v}}));

  const beep=useCallback(()=>{
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      [[880,0],[1100,.22],[1320,.44]].forEach(([f,t])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=f;o.type="sine";
        g.gain.setValueAtTime(.5,ctx.currentTime+t);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.3);
        o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.35);
      });
    }catch(e){}
  },[]);



  const onTS=e=>{
    const tag=(e.target.tagName||"").toLowerCase();
    if(["input","textarea","button","label","select"].includes(tag)){tsX.current=null;return;}
    // Block tab swipe if touch is inside a horizontal-scroll container
    if(e.target.closest&&e.target.closest('[data-hscroll]')){tsX.current=null;return;}
    tsX.current=e.touches[0].clientX;tsY.current=e.touches[0].clientY;wRef.current=e.currentTarget.offsetWidth||390;
  };
  const onTM=e=>{
    if(tsX.current===null)return;
    const dx=e.touches[0].clientX-tsX.current,dy=e.touches[0].clientY-tsY.current;
    if(Math.abs(dx)>Math.abs(dy)){e.preventDefault();setIsDrag(true);setDragX(dx);}
  };
  const onTE=e=>{
    if(!isDrag){tsX.current=null;return;}
    const dx=e.changedTouches[0].clientX-tsX.current;
    if(Math.abs(dx)>55){if(dx<0&&tabIdx<TABS.length-1)setTabIdx(x=>x+1);if(dx>0&&tabIdx>0)setTabIdx(x=>x-1);}
    setIsDrag(false);setDragX(0);tsX.current=null;
  };
  const slideX=i=>(i-tabIdx)*100+(isDrag?(dragX/wRef.current)*100:0);

  const getMI=m=>MONTHS_ARR.findIndex(x=>x.m===m);
  const mutData=(m,fn)=>setAllData(p=>{const c=[...p];c[getMI(m)]=fn(p[getMI(m)]);return c;});
  // Defensive: a HAT code added in a later quarter (PB1/PB2) has no entry in data
  // saved by an older version. Reading d.grid[code][day] directly would throw and
  // white-screen the app, so build the column if it is missing.
  const cycleCell=(code,m,day)=>mutData(m,d=>{
    const col=(d.grid&&d.grid[code])||{};
    return {...d,grid:{...d.grid,[code]:{...col,[day]:nextSt(col[day])}}};
  });
  const cycleEnergy=(m,day,directVal)=>{
    if(directVal!==undefined){
      mutData(m,d=>({...d,energy:{...d.energy,[day]:directVal}}));
    } else {
      const cur=allData[getMI(m)]?.energy?.[day];
      const idx=cur?ENERGY.findIndex(e=>e.sym===cur):-1;
      mutData(m,d=>({...d,energy:{...d.energy,[day]:idx>=ENERGY.length-1?null:ENERGY[idx+1].sym}}));
    }
  };
  const cycleMood=(m,day,directVal)=>{
    if(directVal!==undefined){
      mutData(m,d=>({...d,mood:{...(d.mood||{}),[day]:directVal===0?null:directVal}}));
    } else {
      const cur=allData[getMI(m)]?.mood?.[day];
      const next=cur===null||cur===undefined?1:cur>=10?null:cur+1;
      mutData(m,d=>({...d,mood:{...(d.mood||{}),[day]:next}}));
    }
  };
  const setTask=(m,day,f,v)=>mutData(m,d=>({...d,tasks:{...d.tasks,[day]:{...d.tasks[day],[f]:v}}}));
  // appendTask: safely ADD a task to a day. Free-slot search happens INSIDE the
  // functional updater on fresh state, so it can never overwrite or delete an
  // existing task, even with rapid taps. Appends AFTER the last filled slot.
  // If the same text is already on that day, does nothing (no duplicates).
  const appendTask=(m,day,text)=>{
    const t=(text||"").replace(/\u200b/g,"").trim();
    if(!t) return;
    mutData(m,d=>{
      const cur=(d.tasks&&d.tasks[day])||{};
      let last=0;
      for(let s=1;s<=10;s++){
        const v=(cur["t"+s]||"").replace(/\u200b/g,"").trim();
        if(v===t) return d; // already there — never duplicate, never touch anything
        if(v) last=s;
      }
      if(last>=10) return d; // day is full
      return {...d,tasks:{...d.tasks,[day]:{...cur,["t"+(last+1)]:t}}};
    });
  };
  const setNote=(m,day,v)=>mutData(m,d=>({...d,notes:{...(d.notes||{}),[day]:v}}));
  const setWins=(m,day,v)=>mutData(m,d=>({...d,wins:{...(d.wins||{}),[day]:v}}));
  // toggleExtraHat/toggleLibHat support both simple toggle (Today panel) and state strings (Extra panel)
  const toggleExtraHat=(m,day,code,stateVal)=>mutData(m,d=>{
    const cur=(d.extraHats||{})[day]||[];
    let next;
    if(stateVal!==undefined){
      // Extra panel: set state string "code:state" or remove if null
      const filtered=cur.filter(e=>e!==code&&!e.startsWith(code+":"));
      next=stateVal?[...filtered,code+":"+stateVal]:filtered;
    } else {
      // Today panel: simple toggle presence
      next=cur.some(e=>e===code||e.startsWith(code+":"))?cur.filter(e=>e!==code&&!e.startsWith(code+":")):([...cur,code]);
    }
    return {...d,extraHats:{...(d.extraHats||{}),[day]:next}};
  });
  const toggleLibHat=(m,day,code,stateVal)=>mutData(m,d=>{
    const cur=(d.libHats||{})[day]||[];
    let next;
    if(stateVal!==undefined){
      const filtered=cur.filter(e=>e!==code&&!e.startsWith(code+":"));
      next=stateVal?[...filtered,code+":"+stateVal]:filtered;
    } else {
      next=cur.some(e=>e===code||e.startsWith(code+":"))?cur.filter(e=>e!==code&&!e.startsWith(code+":")):([...cur,code]);
    }
    return {...d,libHats:{...(d.libHats||{}),[day]:next}};
  });

  const hatPlus=code=>{
    const nc=(hatCounts[code]||0)+1;
    setHatCounts(p=>({...p,[code]:nc}));
    const mi=getMI(TODAY_M);
    setAllData(prev=>{const c=[...prev];const ns=nc===1?"x":"box";c[mi]={...c[mi],grid:{...c[mi].grid,[code]:{...c[mi].grid[code],[TODAY_D]:ns}}};return c;});
  };
  const hatMinus=code=>{
    const nc=Math.max(0,(hatCounts[code]||0)-1);
    setHatCounts(p=>({...p,[code]:nc}));
    const mi=getMI(TODAY_M);
    setAllData(prev=>{const c=[...prev];const ns=nc===0?null:nc===1?"x":"box";c[mi]={...c[mi],grid:{...c[mi].grid,[code]:{...c[mi].grid[code],[TODAY_D]:ns}}};return c;});
  };

  // JSON backup/restore
  // FULL backup: every localStorage key starting with "lifeos" (present and future keys included automatically)
  const [lastBackup,setLastBackup]=useState(()=>{try{return localStorage.getItem("lifeos_lastBackupAt")||"";}catch(e){return "";}});
  const saveJSON=()=>{
    const keys={};
    try{
      for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        if(k&&k.indexOf("lifeos")===0) keys[k]=localStorage.getItem(k);
      }
    }catch(e){}
    const payload={format:"lifeos-full-v2",savedAt:new Date().toISOString(),keyCount:Object.keys(keys).length,keys};
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    const d=new Date();const ds=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    a.href=url;a.download="lifeos-backup-"+ds+".json";
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    const now=new Date().toISOString();
    try{localStorage.setItem("lifeos_lastBackupAt",now);}catch(e){}
    setLastBackup(now);
  };
  const backupDaysAgo=(()=>{
    if(!lastBackup) return null;
    const ms=Date.now()-new Date(lastBackup).getTime();
    return Math.floor(ms/86400000);
  })();
  const loadJSON=(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.format==="lifeos-full-v2"&&d.keys){
          const ks=Object.keys(d.keys);
          if(!ks.length){alert("Backup file has no data.");return;}
          if(!window.confirm("Restore FULL backup ("+ks.length+" keys, saved "+(d.savedAt||"unknown date")+")? This overwrites current data in those keys.")) return;
          ks.forEach(k=>{try{localStorage.setItem(k,d.keys[k]);}catch(err){}});
          alert("Full data restored from "+file.name+". Reloading now.");
          window.location.reload();
          return;
        }
        if(d.allData){setAllData(d.allData);lsSet("allData",d.allData);}
        if(d.weekAssess){setWeekAssess(d.weekAssess);lsSet("weekAssess",d.weekAssess);}
        if(d.hatCounts){setHatCounts(d.hatCounts);lsSet("hatCounts",d.hatCounts);}
        alert("Legacy backup restored (grid, assessments, HAT counts only) from "+file.name);
      }catch(err){alert("Error reading file: "+err.message);}
    };
    reader.readAsText(file);
    e.target.value="";
  };

  const weekDays=()=>{
    const w=Q2_WEEKS[weekIdx];const days=[];let[cm,cd]=[...w.start];const[em,ed]=w.end;
    for(let i=0;i<7;i++){
      days.push({m:cm,d:cd});
      if(cm===em&&cd===ed)break;
      const mI=MONTHS_ARR.find(x=>x.m===cm);
      if(mI&&cd>=mI.days){cm++;cd=1;}else cd++;
    }
    return days;
  };

  // Export week data for Claude
  const [showExport,setShowExport]=useState(false);
  const buildExport=()=>{
    const wk=Q2_WEEKS[weekIdx];
    const wdays=weekDays();
    const M_NAME={4:"APR",5:"MAY",6:"JUN",7:"JUL",8:"AUG",9:"SEP",10:"OCT"};
    let out=`LIFE OS · 26Q${wk.q||2} WEEK ${wk.wn||wk.n} EXPORT (${wk.sm} ${wk.start[1]} to ${wk.em} ${wk.end[1]})\n`;
    out+=`Generated: ${M_NAME[TODAY_M]||TODAY_M} ${TODAY_D}\n\n`;

    // TOP 3 per day + tasks
    out+=`TOP 3 (PW·PB·PA) DAILY:\n`;
    let t3FullDays=0;
    wdays.forEach(({m,d})=>{
      const mi=getMI(m); const data=allData[mi]; if(!data) return;
      const pct=top3pct(data,d,m);
      const en=data.energy?.[d]||"·";
      const mood=data.mood?.[d]||"·";
      const _pil=isQ3Day(m,d)?Q3_PILLARS:TOP3;
      const marks=_pil.map(h=>(h.disp||h.code)+(data.grid[h.code]?.[d]?"✓":"✗")).join(" ");
      // count days where all 3 tasks were checked
      let t3checks_legacy=[];try{const v=localStorage.getItem("lifeos_v8_taskChecks");if(v){const tc=JSON.parse(v);t3checks_legacy=tc[m+"-"+d+"-c"]||[];}}catch(e){}
      const allChecked=["t1","t2","t3"].every(slot=>{
        // New format: "m-d-slot-c" key with boolean value
        const newKey=m+"-"+d+"-"+slot+"-c";
        try{const v=localStorage.getItem("lifeos_v8_taskChecks");if(v){const tc=JSON.parse(v);return !!tc[newKey];}}catch(e){}
        return false;
      });
      if(allChecked) t3FullDays++;
      const t3marker=allChecked?" ✓✓✓":"";
      out+=`  ${M_NAME[m]||m} ${d}: ${marks} [${pct}%] energy:${en} mood:${mood}${t3marker}\n`;
      const note=data?.notes?.[d];
      if(note?.trim()) out+=`    NOTE: ${note.trim()}\n`;
      const hl=data?.highlights?.[d];
      if(hl?.trim()){const _hc=(_exReadLS("lifeos_v8_hlChecked")||{})[m+"-"+d];out+=`    ⭐ HIGHLIGHT${_hc?" ✓":""}: ${hl.trim()}\n`;}
      const wns=data?.wins?.[d];
      if(wns?.trim()){
        out+=`    WINS:\n`;
        wns.trim().split("\n").forEach(line=>{if(line.trim()) out+=`      ${line.trim()}\n`;});
      }
      const t=data.tasks?.[d]||{};
      for(let s=1;s<=10;s++){
        const slot="t"+s;
        if(!(t[slot]||"").replace(/\u200b/g,"").trim()) break;
        const newKey=m+"-"+d+"-"+slot+"-c";
        let chk=false;try{const v=localStorage.getItem("lifeos_v8_taskChecks");if(v){const tc=JSON.parse(v);chk=!!tc[newKey];}}catch(e){}
        out+=`    T${s} [${chk?"✓":"·"}]: ${t[slot].replace(/\u200b/g,"").trim()}\n`;
      }
    });
    out+=`  TOP 3 TASKS FULLY DONE: ${t3FullDays}/${wdays.length} days\n`;

    // HAT grid summary per week
    out+=`\nHAT WEEK SUMMARY:\n`;
    ALL_HATS.forEach(h=>{
      const filled=wdays.filter(({m,d})=>{
        const mi=getMI(m); return allData[mi]?.grid?.[h.code]?.[d];
      }).length;
      if(filled>0) out+=`  ${h.code}: ${filled}/${wdays.length} days\n`;
    });

    // Week priorities with check status
    const priChecksRaw=()=>{try{const v=localStorage.getItem("lifeos_v8_priChecks");return v?JSON.parse(v):{}}catch(e){return {};}};
    const pc=priChecksRaw();
    const wkPriChecks=pc["w"+wk.n]||[];
    const pris=(weekAssess?.["w"+wk.n]?.priorities||[]);
    const hasPris=pris.some(p=>p.trim());
    if(hasPris){
      out+=`\nWEEK PRIORITIES (Q${wk.q||2} W${wk.wn||wk.n}):\n`;
      pris.forEach((p,i)=>{
        const chk=wkPriChecks.includes(i)?"✓":"·";
        if(p.trim()) out+=`  ${i+1}. [${chk}] ${p}\n`;
      });
    }

    out+=`\nend of Q${wk.q||2} Week ${wk.wn||wk.n} export`;

    // Photo Challenge data for this week (if any)
    try {
      const challRaw=localStorage.getItem("lifeos_chall26");
      if(challRaw){
        const challData=JSON.parse(challRaw);
        const challLines=[];
        wdays.forEach(({m,d})=>{
          if(m!==5) return;
          const entries=challData[`d${d}`]||[];
          if(entries.length){
            const labels=entries.map(e=>{
              const id=e.includes(":")?e.split(":")[0]:e;
              const st=e.includes(":")?e.split(":")[1]:"x";
              const item=CHALLENGE_ITEMS.find(i=>i.id===id);
              if(!item) return null;
              return (st==="back"?"◀ ":"× ")+item.text;
            }).filter(Boolean);
            if(labels.length) challLines.push(`  MAY ${d}: ${labels.join(" | ")}`);
          }
        });
        if(challLines.length){
          out+=`\n\n📸 PHOTO CHALLENGE · W${wk.n}:\n${challLines.join("\n")}`;
        }
      }
    } catch(e){}

    // Extra + Library HATs for the week
    const exLines=[], lbLines=[];
    wdays.forEach(({m,d})=>{
      const mi=getMI(m); const dd=allData[mi]; if(!dd) return;
      const ex=(dd.extraHats||{})[d]||[];
      const lb=(dd.libHats||{})[d]||[];
      if(ex.length) exLines.push(`  ${M_NAME[m]||m} ${d}: ${ex.join(", ")}`);
      if(lb.length) lbLines.push(`  ${M_NAME[m]||m} ${d}: ${lb.join(", ")}`);
    });
    if(exLines.length){out=out.replace('— end of Week',`EXTRA ACTIVE HATS:\n${exLines.join('\n')}\n\n— end of Week`);}
    if(lbLines.length){out=out.replace('— end of Week',`LIBRARY TAGS:\n${lbLines.join('\n')}\n\n— end of Week`);}

    return out;
  };

  return (
    <div style={{minHeight:"100vh",background:"#f2ede6",fontFamily:"'SF Mono','Courier New',monospace",maxWidth:430,margin:"0 auto",overflow:"hidden"}}>
      <div style={{background:"#fff",borderBottom:"1px solid #e8e0d5",padding:"12px 16px 0",position:"sticky",top:0,zIndex:30,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:20,fontWeight:900,color:"#1a1a1a",letterSpacing:-1}}>26Q3 <span style={{fontSize:9,color:"#b0a898",fontWeight:400,letterSpacing:3}}>LIFE OS</span><span style={{fontSize:7,color:"#ccc",fontWeight:400,marginLeft:4}}>v10.15</span></div>
          <div style={{fontSize:10,color:"#8a7f74",fontWeight:700}}>{["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"][TODAY_M-1]} {TODAY_D} · {wkLabel(Q2_WEEKS.find(w=>TODAY_M*100+TODAY_D>=w.start[0]*100+w.start[1]&&TODAY_M*100+TODAY_D<=w.end[0]*100+w.end[1]))||"W?"}</div>
        </div>
        {/* Rotating mantra — tap for next */}
        <div onClick={nextMantra} style={{
          margin:"7px 0 0",padding:"6px 10px",
          background:"#faf7f3",borderRadius:8,cursor:"pointer",
          borderLeft:"3px solid #c9a96e",
          display:"flex",alignItems:"flex-start",gap:6,
        }}>
          {ALL_QUOTES[mantraIdx]?.hat&&(()=>{
            const cat=ALL_QUOTES[mantraIdx].hat[0]; // P, M, R, D, S, L, C
            const tagColors={
              P:{bg:"#ede7f6",color:"#5e1b8b"},
              M:{bg:"#e3f2fd",color:"#1565c0"},
              R:{bg:"#fff3e0",color:"#bf5000"},
              D:{bg:"#efebe9",color:"#4e342e"},
              S:{bg:"#fffde7",color:"#f57f17"},
              L:{bg:"#f5f5f5",color:"#546e7a"},
              C:{bg:"#e8f5e9",color:"#2e7d32"},
            };
            const tc=tagColors[cat]||{bg:"#f0f0f0",color:"#555"};
            return <span style={{fontSize:7,fontWeight:900,color:tc.color,background:tc.bg,borderRadius:3,padding:"1px 5px",flexShrink:0,marginTop:2,fontFamily:"'SF Mono','Courier New',monospace"}}>{ALL_QUOTES[mantraIdx].hat}</span>;
          })()}
          <span style={{fontSize:8.5,color:"#5a5048",fontStyle:"italic",fontWeight:500,lineHeight:1.4,fontFamily:"Georgia,serif",flex:1}}>
            "{ALL_QUOTES[mantraIdx]?.text}"
          </span>
          <span style={{fontSize:6,color:"#ccc",flexShrink:0,marginTop:2}}>tap›</span>
        </div>
        <div style={{display:"flex",marginTop:8}}>
          {TABS.map((t,i)=>(
            <button key={t} onClick={()=>setTabIdx(i)} style={{flex:1,background:"none",border:"none",borderBottom:tabIdx===i?"3px solid #c9a96e":"3px solid transparent",color:tabIdx===i?"#1a1a1a":"#b0a898",fontSize:10,letterSpacing:1.5,padding:"7px 0 9px",cursor:"pointer",fontFamily:"inherit",fontWeight:tabIdx===i?800:500,textTransform:"uppercase"}}>{t}</button>
          ))}
        </div>
      </div>

      <div style={{position:"relative",overflow:"hidden",touchAction:"pan-y",overscrollBehaviorX:"none"}} onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}>
        {TABS.map((t,i)=>(
          <div key={t} data-tab={t} style={{position:i===tabIdx?"relative":"absolute",top:0,left:0,width:"100%",transform:`translateX(${slideX(i)}%)`,transition:isDrag?"none":"transform .28s cubic-bezier(.4,0,.2,1)",willChange:"transform",padding:"16px 14px 48px",boxSizing:"border-box",minHeight:"80vh"}}>
            {t==="today"&&<TodayPanel allData={allData} getMI={getMI} viewDay={viewDay} viewM={viewM} setViewDay={setViewDay} setViewM={setViewM} weekIdx={weekIdx} setWeekIdx={setWeekIdx} weekDays={weekDays} cycleCell={cycleCell} cycleEnergy={cycleEnergy} cycleMood={cycleMood} setTask={setTask} appendTask={appendTask} setNote={setNote} setHighlight={setHighlight} setMoodNote={setMoodNote} setWins={setWins} weekAssess={weekAssess} setAssess={setAssess} setPriority={setPriority} toggleExtraHat={toggleExtraHat} toggleLibHat={toggleLibHat} winsLogged={winsLogged} toggleWinsLogged={toggleWinsLogged} hlChecked={hlChecked} toggleHlChecked={toggleHlChecked} taskChecks={taskChecks} saveTaskChecks={saveTaskChecks} taskSlotsMap={taskSlotsMap} saveTaskSlotsMap={saveTaskSlotsMap} escalations={escalations} saveEscalations={saveEscalations} planData={planData}/> }
            {t==="month"&&<MonthPanel monthIdx={monthIdx} setMonthIdx={setMonthIdx} allData={allData} cycleCell={cycleCell} cycleEnergy={cycleEnergy} cycleMood={cycleMood} setTabIdx={setTabIdx} setViewDay={setViewDay} setViewM={setViewM} setWeekIdx={setWeekIdx} toggleExtraHat={toggleExtraHat} toggleLibHat={toggleLibHat} taskChecks={taskChecks}/>}
            {t==="plan"&&<PlanPanel viewM={viewM} viewDay={viewDay} setViewDay={setViewDay} setViewM={setViewM} planData={planData} setPlanField={setPlanField} clearPlanDay={clearPlanDay} allData={allData} getMI={getMI} setTask={setTask} appendTask={appendTask} taskChecks={taskChecks} saveTaskChecks={saveTaskChecks} taskSlotsMap={taskSlotsMap} saveTaskSlotsMap={saveTaskSlotsMap} escalations={escalations} saveEscalations={saveEscalations}/>}
            {t==="challenge"&&<ChallengePanel/>}
            {t==="atlas"&&<AtlasPanel allData={allData} winsLogged={winsLogged} monthIdx={monthIdx} setMonthIdx={setMonthIdx} toggleExtraHat={toggleExtraHat} toggleLibHat={toggleLibHat} cycleEnergy={cycleEnergy} cycleMood={cycleMood} setHighlight={setHighlight} setMoodNote={setMoodNote} setViewDay={setViewDay} setViewM={setViewM} setWeekIdx={setWeekIdx} setTabIdx={setTabIdx}/>}
          </div>
        ))}
      </div>

      <div style={{padding:"8px 12px calc(16px + env(safe-area-inset-bottom))",display:"flex",gap:5,justifyContent:"center",flexWrap:"nowrap",alignItems:"center"}}>
        <button onClick={()=>setShowExport(x=>!x)} style={{
          background:"#111",color:"#fff",border:"none",borderRadius:20,
          padding:"7px 12px",fontSize:8,letterSpacing:1.5,cursor:"pointer",
          fontFamily:"'SF Mono','Courier New',monospace",fontWeight:700,whiteSpace:"nowrap",
        }}>↗ EXPORT {wkLabel(Q2_WEEKS[weekIdx])}</button>
        <button onClick={saveJSON} style={{
          background:(backupDaysAgo==null||backupDaysAgo>7)?"#b91c1c":"#1b5e20",color:"#fff",border:"none",borderRadius:20,
          padding:"7px 12px",fontSize:8,letterSpacing:1.5,cursor:"pointer",
          fontFamily:"'SF Mono','Courier New',monospace",fontWeight:700,whiteSpace:"nowrap",
        }}>⬇ SAVE{backupDaysAgo==null?" · NEVER":backupDaysAgo===0?" · TODAY":" · "+backupDaysAgo+"D AGO"}</button>
        <label style={{
          background:"#1565c0",color:"#fff",border:"none",borderRadius:20,
          padding:"7px 12px",fontSize:8,letterSpacing:1.5,cursor:"pointer",
          fontFamily:"'SF Mono','Courier New',monospace",fontWeight:700,display:"inline-block",whiteSpace:"nowrap",
        }}>
          ⬆ LOAD
          <input type="file" accept=".json" onChange={loadJSON} style={{display:"none"}}/>
        </label>
        <button onClick={()=>{
          if('serviceWorker' in navigator){
            navigator.serviceWorker.getRegistrations().then(regs=>{
              const updates=regs.map(r=>r.update().catch(()=>{}));
              Promise.all(updates).then(()=>{
                caches.keys().then(keys=>Promise.all(keys.map(k=>caches.delete(k)))).then(()=>{
                  window.location.reload(true);
                });
              });
            });
          } else { window.location.reload(true); }
        }} style={{
          background:"#7c3aed",color:"#fff",border:"none",borderRadius:20,
          padding:"7px 12px",fontSize:8,letterSpacing:1.5,cursor:"pointer",
          fontFamily:"'SF Mono','Courier New',monospace",fontWeight:700,whiteSpace:"nowrap",
        }}>⟳ UPDATE</button>
      </div>

      {showExport&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:100,display:"flex",alignItems:"flex-end"}}>
          <div style={{width:"100%",background:"#fff",borderRadius:"16px 16px 0 0",padding:"16px",maxHeight:"70vh",display:"flex",flexDirection:"column"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontSize:11,fontWeight:900,letterSpacing:2}}>EXPORT — PASTE INTO CLAUDE</span>
              <button onClick={()=>setShowExport(false)} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#999"}}>×</button>
            </div>
            <textarea
              readOnly
              value={buildExport()}
              style={{flex:1,border:"1px solid #e0e0e0",borderRadius:8,padding:"10px",fontSize:9,fontFamily:"'SF Mono','Courier New',monospace",color:"#333",resize:"none",lineHeight:1.6,background:"#fafafa"}}
              onFocus={e=>e.target.select()}
            />
            <button onClick={()=>{
              const txt=buildExport();
              if(navigator.clipboard){navigator.clipboard.writeText(txt);}
              else{const t=document.createElement("textarea");t.value=txt;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);}
              setShowExport(false);
            }} style={{
              marginTop:10,background:"#111",color:"#fff",border:"none",borderRadius:10,
              padding:"12px",fontSize:10,letterSpacing:2,cursor:"pointer",fontWeight:700,
              fontFamily:"'SF Mono','Courier New',monospace",
            }}>COPY TO CLIPBOARD</button>
          </div>
        </div>
      )}

      <div style={{textAlign:"center",padding:"0 0 16px",fontSize:8.5,color:"#9a7b3c",fontWeight:800,letterSpacing:3}}>BE KONSTANTIN · ONE MOVE = FULL PRESENCE</div>
    </div>
  );
}

    class ErrorBoundary extends React.Component {
      constructor(p){super(p);this.state={err:null};}
      static getDerivedStateFromError(err){return {err};}
      render(){
        if(this.state.err){
          const msg=(this.state.err&&this.state.err.message)||String(this.state.err);
          return React.createElement("div",{style:{padding:"40px 20px",fontFamily:"-apple-system,system-ui,sans-serif",maxWidth:420,margin:"0 auto"}},
            React.createElement("div",{style:{fontSize:18,fontWeight:900,color:"#2a2118",marginBottom:8}},"App hit an error"),
            React.createElement("div",{style:{fontSize:12,color:"#666",lineHeight:1.5,marginBottom:6}},"Your data is safe. The buttons below fix the most common causes without losing your tasks, wins, budget, or grid."),
            React.createElement("div",{style:{fontSize:10,color:"#b45309",background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:8,padding:"8px 10px",marginBottom:16,wordBreak:"break-word",fontFamily:"monospace"}},msg),
            React.createElement("button",{onClick:()=>{try{localStorage.removeItem("lifeos_vision26");}catch(e){}location.reload();},style:{display:"block",width:"100%",background:"#2a2118",color:"#fff",border:"none",borderRadius:10,padding:"14px",fontSize:12,fontWeight:800,marginBottom:10,cursor:"pointer"}},"Clear Vision text & reload"),
            React.createElement("button",{onClick:()=>{try{localStorage.removeItem("lifeos_escalations26");}catch(e){}location.reload();},style:{display:"block",width:"100%",background:"#6b5d4f",color:"#fff",border:"none",borderRadius:10,padding:"14px",fontSize:12,fontWeight:800,marginBottom:10,cursor:"pointer"}},"Clear escalation flags & reload"),
            React.createElement("button",{onClick:()=>location.reload(),style:{display:"block",width:"100%",background:"#eee",color:"#444",border:"none",borderRadius:10,padding:"14px",fontSize:12,fontWeight:800,cursor:"pointer"}},"Just reload")
          );
        }
        return this.props.children;
      }
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(ErrorBoundary,null,React.createElement(App)));
    // Remove the boot splash on the next frame, once React has painted the app.
    requestAnimationFrame(()=>{requestAnimationFrame(()=>{var s=document.getElementById("boot-splash");if(s&&s.parentNode)s.parentNode.removeChild(s);});});
  </script>
</body>
</html>

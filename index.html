  const CAT_COLOR={"Rover":"#2f8f5b","Photography":"#7c6aad","Gig":"#e07b54","Business":"#9333ea","Rent":"#5b8def","OW/Gov":"#9ca3af","Sales":"#0d9488","Gig work":"#e07b54","Other":"#9ca3af"};
  const CAT_EMOJI={"Rover":"🐾","Sales":"📦"};
  const catLabel=(c)=>(CAT_EMOJI[c]?CAT_EMOJI[c]+" ":"")+c;
  const isEarned=(cat)=>EARNED_CATS.includes(cat)||cat==="Gig work";
  const load=()=>{
    try{
      const raw=localStorage.getItem(BK);
      if(!raw) return {entries:[]};
      const parsed=JSON.parse(raw);
      if(Array.isArray(parsed.entries)) return parsed;
      const entries=[];
      Object.entries(parsed).forEach(([m,cats])=>{
        if(typeof cats==="object"&&!Array.isArray(cats)){
          Object.entries(cats).forEach(([cat,val])=>{
            const num=parseFloat(val)||0;
            if(num>0) entries.push({id:Date.now()+Math.random(),month:parseInt(m),amount:num,cat,note:"(migrated)",date:""});
          });
        }
      });
      const migrated={entries};
      try{localStorage.setItem(BK,JSON.stringify(migrated));}catch(e){}
      return migrated;
    }catch(e){return {entries:[]};}
  };
  const [data,setDataRaw]=useState(load);
  const [showAdd,setShowAdd]=useState(false);
  const [showExp,setShowExp]=useState(false);
  const [form,setForm]=useState({month:TODAY_M,amount:"",cat:"Rover",client:"",note:"",date:""});
  const [editId,setEditId]=useState(null);
  const [selCat,setSelCat]=useState(null);
  const [amtErr,setAmtErr]=useState(false);
  const [showRec,setShowRec]=useState(false);
  const [recOpen,setRecOpen]=useState(false);
  const [recEditId,setRecEditId]=useState(null);
  const [recForm,setRecForm]=useState({name:"",amount:"",emoji:"",months:[TODAY_M]});
  const save=(next)=>{setDataRaw(next);try{localStorage.setItem(BK,JSON.stringify(next));}catch(e){}};
  const entries=data.entries||[];
  const recurring=data.recurring||[];
  const REC_PRESETS=[{name:"Rent",emoji:"🏠"},{name:"AI / Software",emoji:"🤖"},{name:"Phone",emoji:"📱"},{name:"Internet",emoji:"🌐"},{name:"Transport",emoji:"🚇"},{name:"Subscription",emoji:"📺"}];
  const recMonths=(r)=>(r.months&&r.months.length)?r.months:MONTHS_ARR.map(x=>x.m);
  const recMonthTotal=(m)=>recurring.filter(r=>recMonths(r).includes(m)).reduce((s,r)=>s+parseFloat(r.amount||0),0);
  const resetRecForm=()=>{setRecForm({name:"",amount:"",emoji:"",months:[TODAY_M]});setRecEditId(null);setShowRec(false);};
  const saveRecurring=()=>{
    const num=parseFloat(String(recForm.amount).replace(",",".").trim());
    if(!num||num<=0)return;
    const months=(recForm.months&&recForm.months.length)?recForm.months.slice().sort((a,b)=>a-b):[TODAY_M];
    const item={id:recEditId||(Date.now()+Math.random()),name:(recForm.name||"").trim()||"Payment",emoji:(recForm.emoji||"").trim(),amount:num,months};
    const next=recEditId?recurring.map(r=>r.id===recEditId?item:r):[...recurring,item];
    save({...data,recurring:next});
    resetRecForm();
  };
  const startEditRec=(r)=>{setRecForm({name:r.name||"",amount:String(r.amount),emoji:r.emoji||"",months:((r.months&&r.months.length)?r.months.slice():MONTHS_ARR.map(x=>x.m))});setRecEditId(r.id);setShowRec(true);};
  const toggleRecMonth=(m)=>setRecForm(f=>{const has=(f.months||[]).includes(m);return{...f,months:has?f.months.filter(x=>x!==m):[...(f.months||[]),m]};});
  const deleteRecurring=(id)=>{save({...data,recurring:recurring.filter(r=>r.id!==id)});if(recEditId===id)resetRecForm();};
  const totalAll=entries.reduce((s,e)=>s+parseFloat(e.amount||0),0);
  const totalEarned=entries.filter(e=>isEarned(e.cat)).reduce((s,e)=>s+parseFloat(e.amount||0),0);
  const totalOther=totalAll-totalEarned;
  const pendingTotal=entries.filter(e=>e.pending).reduce((s,e)=>s+parseFloat(e.amount||0),0);
  const totalMonth=(m)=>entries.filter(e=>e.month===m).reduce((s,e)=>s+parseFloat(e.amount||0),0);
  const addEntry=()=>{
    const num=parseFloat(String(form.amount).replace(",",".").trim());
    if(!num||num<=0){setAmtErr(true);return;}
    setAmtErr(false);
    const entry={id:editId||(Date.now()+Math.random()),month:parseInt(form.month),amount:num,cat:form.cat,client:(form.client||"").trim(),note:form.note,date:form.date,pending:editId?(entries.find(e=>e.id===editId)?.pending||false):false};
    const updated=editId?entries.map(e=>e.id===editId?entry:e):[entry,...entries];
    save({...data,entries:updated});setShowAdd(false);setForm({month:TODAY_M,amount:"",cat:"Rover",client:"",note:"",date:""});setEditId(null);
  };
  const deleteEntry=(id)=>save({...data,entries:entries.filter(e=>e.id!==id)});
  const togglePending=(id)=>save({...data,entries:entries.map(e=>e.id===id?{...e,pending:!e.pending}:e)});
  const startEdit=(e)=>{setForm({month:e.month,amount:String(e.amount),cat:e.cat,client:e.client||"",note:e.note||"",date:e.date||""});setEditId(e.id);setShowAdd(true);};
  // Swap two entries' positions in the flat array (used by up/down within a month).
  const swapById=(idA,idB)=>{
    if(!idA||!idB) return;
    const arr=[...entries];
    const a=arr.findIndex(e=>e.id===idA), b=arr.findIndex(e=>e.id===idB);
    if(a<0||b<0) return;
    const t=arr[a]; arr[a]=arr[b]; arr[b]=t;
    save({...data,entries:arr});
  };
  const buildExp=()=>{
    let out="BUDGET Q2 2026\n"+"=".repeat(36)+"\n\n";
    MONTHS_ARR.forEach(mo=>{
      const mes=entries.filter(e=>e.month===mo.m);
      if(!mes.length) return;
      out+=mo.name.toUpperCase()+" -- $"+totalMonth(mo.m).toFixed(2)+"\n";
      mes.forEach(e=>{out+="  "+(e.date?e.date+" ":"")+e.cat+(e.client?" ("+e.client+")":"")+": $"+parseFloat(e.amount).toFixed(2)+(e.pending?" [PENDING]":"")+(e.note?" - "+e.note:"")+"\n";});
      out+="\n";
    });
    out+="Q2 TOTAL: $"+totalAll.toFixed(2);
    if(recurring.length){
      out+="\n\nRECURRING FIXED COSTS:\n";
      recurring.forEach(r=>{const ms=recMonths(r).map(m=>({4:"Apr",5:"May",6:"Jun",7:"Jul"}[m]||m)).join(",");out+="  "+(r.emoji?r.emoji+" ":"")+r.name+": $"+parseFloat(r.amount).toFixed(2)+(ms?" ["+ms+"]":"")+"\n";});
    }
    return out;
  };
  return (
    <div>
      <button onClick={onBack} style={{display:"flex",alignItems:"center",gap:8,background:"#f2ede6",border:"none",borderRadius:20,padding:"8px 16px 8px 12px",cursor:"pointer",fontFamily:"inherit",marginBottom:16,boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}}>
        <span style={{fontSize:18,color:"#c9a96e",fontWeight:900,lineHeight:1}}>{"<"}</span>
        <span style={{fontSize:10,fontWeight:800,color:"#2a2118",letterSpacing:2}}>ATLAS</span>
      </button>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:16}}>
        <div>
          <div style={{fontSize:18,fontWeight:900,color:"#b8860b",letterSpacing:-0.5}}>Budget Q2</div>
          <div style={{fontSize:8,color:"#b0a898",letterSpacing:2,marginTop:2}}>APR-JUN 2026</div>
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>{copyText(buildExp());setShowExp(true);setTimeout(()=>setShowExp(false),1800);}} style={{background:showExp?"#16a34a":"#2a2118",color:showExp?"#fff":"#c9a96e",border:"none",borderRadius:20,padding:"7px 14px",fontSize:8.5,letterSpacing:1,cursor:"pointer",fontFamily:"inherit",fontWeight:800,boxShadow:"0 2px 8px rgba(42,33,24,0.18)",whiteSpace:"nowrap"}}>{showExp?"✓ COPIED":"⧉ EXPORT BUDGET"}</button>
          <button onClick={()=>{setShowAdd(x=>!x);setEditId(null);setForm({month:TODAY_M,amount:"",cat:"Rover",client:"",note:"",date:""});}} style={{background:"#c9a96e",color:"#fff",border:"none",borderRadius:20,padding:"5px 10px",fontSize:8,letterSpacing:1.5,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>{showAdd?"CANCEL":"+ ADD"}</button>
        </div>
      </div>
      <div style={{background:"#2a2118",borderRadius:14,padding:"16px 18px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
          <span style={{fontSize:9,color:"#b0a898",letterSpacing:2,fontWeight:700}}>EARNED TOWARD GOAL</span>
          <span style={{fontSize:9,color:"#b0a898",fontWeight:700}}>{Math.round(totalEarned/GOAL*100)}%</span>
        </div>
        <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:10}}>
          <span style={{fontSize:24,fontWeight:900,color:"#c9a96e",letterSpacing:-1}}>{fmtMoney(totalEarned,0)}</span>
          <span style={{fontSize:12,color:"#7a7266",fontWeight:700}}>/ {fmtMoney(GOAL,0)}</span>
        </div>
        <div style={{height:8,borderRadius:6,background:"#3d3329",overflow:"hidden"}}>
          <div style={{height:"100%",width:Math.min(100,totalEarned/GOAL*100)+"%",background:"linear-gradient(90deg,#c9a96e,#f4c430)",borderRadius:6,transition:"width .4s ease"}}/>
        </div>
        {pendingTotal>0&&<div style={{fontSize:8,color:"#d4a574",marginTop:6,fontWeight:700,letterSpacing:0.5}}>⏳ includes {fmtMoney(pendingTotal,0)} pending (not paid yet)</div>}
        <div style={{display:"flex",justifyContent:"space-between",marginTop:12,paddingTop:10,borderTop:"1px solid #3d3329"}}>
          <div>
            <div style={{fontSize:7,color:"#7a7266",letterSpacing:1,fontWeight:700}}>TOTAL CASH IN</div>
            <div style={{fontSize:14,fontWeight:900,color:"#fff",marginTop:1}}>{fmtMoney(totalAll,0)}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:7,color:"#7a7266",letterSpacing:1,fontWeight:700}}>OTHER (RENT · OW)</div>
            <div style={{fontSize:14,fontWeight:900,color:"#9ca3af",marginTop:1}}>{fmtMoney(totalOther,0)}</div>
          </div>
        </div>
      </div>
      {/* Recurring monthly expenses — fixed costs (money out), collapsible */}
      <div style={{background:"#fff",borderRadius:14,border:"1px solid #f3e0d8",marginBottom:12,overflow:"hidden",boxShadow:"0 2px 10px rgba(180,60,40,0.06)"}}>
        <div onClick={()=>setRecOpen(o=>!o)} style={{padding:"10px 14px",background:"linear-gradient(135deg,#3a241c,#2a1a14)",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:11}}>🔻</span>
            <div>
              <div style={{fontSize:9,fontWeight:900,letterSpacing:1.5,color:"#f0c9b8"}}>RECURRING · MONEY OUT</div>
              <div style={{fontSize:7,color:"#b89a8c",letterSpacing:1,marginTop:1}}>Fixed costs · tap to {recOpen?"hide":"manage"}</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:11}}>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:16,fontWeight:900,color:"#fca5a5",lineHeight:1}}>{recMonthTotal(TODAY_M)>0?"−":""}{fmtMoney(recMonthTotal(TODAY_M),0)}</div>
              <div style={{fontSize:6,color:"#b89a8c",letterSpacing:1,fontWeight:700}}>{M_LABEL[TODAY_M]}</div>
            </div>
            <span style={{fontSize:13,color:"#c9a96e",transform:recOpen?"rotate(90deg)":"none",transition:"transform .2s",display:"inline-block"}}>▸</span>
          </div>
        </div>
        {recOpen&&(<React.Fragment>
        {recurring.length>0&&(
          <div style={{display:"flex",flexDirection:"column"}}>
            {recurring.map((r,i)=>(
              <div key={r.id} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 14px",borderTop:i>0?"1px solid #f5efe9":"none"}}>
                {r.emoji?<span style={{fontSize:14,flexShrink:0,width:18,textAlign:"center"}}>{r.emoji}</span>:<span style={{flexShrink:0,width:18}}/>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600,color:"#3a2e24",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.name}</div>
                  <div style={{display:"flex",gap:3,marginTop:2,flexWrap:"wrap"}}>
                    {recMonths(r).map(m=>(<span key={m} style={{fontSize:6,fontWeight:800,letterSpacing:.5,color:"#b45309",background:"#fbeee4",borderRadius:4,padding:"1px 4px"}}>{M_LABEL[m]}</span>))}
                  </div>
                </div>
                <span style={{fontSize:12,fontWeight:900,color:"#b45309",flexShrink:0}}>{fmtMoney(r.amount,0)}</span>
                <button onClick={()=>startEditRec(r)} style={{flexShrink:0,width:24,height:24,borderRadius:"50%",background:"#fbeee4",border:"none",fontSize:11,color:"#b45309",cursor:"pointer",padding:0,fontFamily:"inherit"}}>✎</button>
                <button onClick={()=>{if(confirm("Remove "+r.name+"?"))deleteRecurring(r.id);}} style={{flexShrink:0,width:24,height:24,borderRadius:"50%",background:"#faf0ec",border:"none",fontSize:11,color:"#c4906a",cursor:"pointer",padding:0,fontFamily:"inherit"}}>✕</button>
              </div>
            ))}
          </div>
        )}
        {showRec
          ?<div style={{padding:"12px 14px",borderTop:"1px solid #f5efe9",background:"#fffaf7"}}>
            <div style={{fontSize:7,fontWeight:800,color:"#9a8478",letterSpacing:1,marginBottom:5}}>QUICK PICK</div>
            <div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>
              {REC_PRESETS.map(p=>(
                <button key={p.name} onClick={()=>setRecForm(f=>({...f,name:p.name,emoji:p.emoji}))} style={{display:"flex",alignItems:"center",gap:4,background:"#fff",border:"1px solid #eaddd5",borderRadius:14,padding:"4px 9px",fontSize:9,fontWeight:700,color:"#7a6253",cursor:"pointer",fontFamily:"inherit"}}>{p.emoji} {p.name}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <input value={recForm.emoji} onChange={e=>setRecForm(f=>({...f,emoji:e.target.value}))} placeholder="🙂" maxLength={2} style={{width:46,textAlign:"center",border:"1px solid #eaddd5",borderRadius:8,padding:"8px 0",fontSize:16,fontFamily:"inherit",outline:"none",flexShrink:0}}/>
              <input value={recForm.name} onChange={e=>setRecForm(f=>({...f,name:e.target.value}))} placeholder="Name (Rent, Claude, Phone...)" style={{flex:1,border:"1px solid #eaddd5",borderRadius:8,padding:"8px 10px",fontSize:12,fontFamily:"inherit",outline:"none",minWidth:0}}/>
            </div>
            <input value={recForm.amount} onChange={e=>setRecForm(f=>({...f,amount:e.target.value}))} placeholder="$ amount" inputMode="decimal" style={{width:"100%",border:"1px solid #eaddd5",borderRadius:8,padding:"8px 10px",fontSize:12,fontFamily:"inherit",outline:"none",marginBottom:10,boxSizing:"border-box"}}/>
            <div style={{fontSize:7,fontWeight:800,color:"#9a8478",letterSpacing:1,marginBottom:5}}>APPLIES TO</div>
            <div style={{display:"flex",gap:6,marginBottom:12}}>
              {MONTHS_ARR.map(mo=>{const on=(recForm.months||[]).includes(mo.m);return (
                <button key={mo.m} onClick={()=>toggleRecMonth(mo.m)} style={{flex:1,padding:"7px 0",borderRadius:8,border:on?"none":"1px solid #eaddd5",background:on?"#b45309":"#fff",color:on?"#fff":"#9a8478",fontSize:9,fontWeight:800,letterSpacing:.5,cursor:"pointer",fontFamily:"inherit"}}>{mo.short}</button>
              );})}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={saveRecurring} style={{flex:1,background:"#b45309",color:"#fff",border:"none",borderRadius:8,padding:"9px 0",fontSize:10,fontWeight:800,letterSpacing:1,cursor:"pointer",fontFamily:"inherit"}}>{recEditId?"SAVE":"ADD"}</button>
              <button onClick={resetRecForm} style={{background:"#f2ede6",color:"#8a7f74",border:"none",borderRadius:8,padding:"9px 16px",fontSize:10,fontWeight:800,letterSpacing:1,cursor:"pointer",fontFamily:"inherit"}}>CANCEL</button>
            </div>
          </div>
          :<button onClick={()=>{setRecEditId(null);setRecForm({name:"",amount:"",emoji:"",months:[TODAY_M]});setShowRec(true);}} style={{width:"100%",padding:"9px 0",background:"#fffaf7",border:"none",borderTop:"1px solid #f5efe9",color:"#b45309",fontSize:9,fontWeight:800,letterSpacing:1,cursor:"pointer",fontFamily:"inherit"}}>+ ADD RECURRING PAYMENT</button>
        }
        </React.Fragment>)}
      </div>
      <div style={{fontSize:8,fontWeight:800,letterSpacing:2,color:"#4a9d6f",margin:"0 2px 7px",display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:11}}>＋</span>WHAT I EARNED · MONEY IN</div>
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {MONTHS_ARR.map(mo=>(
          <div key={mo.m} style={{flex:1,background:"#fff",borderRadius:10,padding:"8px 10px",textAlign:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
            <div style={{fontSize:7,color:"#b0a898",fontWeight:700,letterSpacing:1}}>{mo.short}</div>
            <div style={{fontSize:13,fontWeight:900,color:"#4a9d6f",marginTop:2}}>{fmtMoney(totalMonth(mo.m),0)}</div>
          </div>
        ))}
      </div>
      {/* Category breakdown */}
      {totalAll>0&&(
        <div style={{background:"#fff",borderRadius:12,padding:"12px 14px",marginBottom:12,boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <span style={{fontSize:7,fontWeight:700,color:"#888",letterSpacing:1.5}}>BY CATEGORY</span>
            {selCat&&<button onClick={()=>setSelCat(null)} style={{background:"none",border:"none",fontSize:8,color:"#c9a96e",fontWeight:700,cursor:"pointer",fontFamily:"inherit",letterSpacing:1}}>✕ CLEAR FILTER</button>}
          </div>
          <div style={{display:"flex",height:10,borderRadius:6,overflow:"hidden",marginBottom:10}}>
            {INCOME_CATS.map(c=>{
              const ct=entries.filter(e=>e.cat===c).reduce((s,e)=>s+parseFloat(e.amount||0),0);
              const pct=totalAll?ct/totalAll*100:0;
              if(pct<=0) return null;
              return <div key={c} style={{width:pct+"%",background:CAT_COLOR[c]||"#ccc",opacity:selCat&&selCat!==c?0.3:1}}/>;
            })}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {INCOME_CATS.map(c=>{
              const ct=entries.filter(e=>e.cat===c).reduce((s,e)=>s+parseFloat(e.amount||0),0);
              if(ct<=0) return null;
              const pct=totalAll?Math.round(ct/totalAll*100):0;
              const isSel=selCat===c;
              return (
                <div key={c} onClick={()=>setSelCat(isSel?null:c)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",background:isSel?(CAT_COLOR[c]||"#ccc")+"14":"transparent",borderRadius:8,padding:"3px 6px",margin:"0 -6px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{width:8,height:8,borderRadius:2,background:CAT_COLOR[c]||"#ccc"}}/>
                    <span style={{fontSize:9,fontWeight:isSel?900:700,color:"#3a2e24"}}>{catLabel(c)}</span>
                    <span style={{fontSize:8,color:"#b0a898"}}>{pct}%</span>
                  </div>
                  <span style={{fontSize:10,fontWeight:900,color:"#1a1a1a"}}>{fmtMoney(ct)}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {showAdd&&(
        <div style={{background:"#fff",borderRadius:12,padding:"14px",marginBottom:16,boxShadow:"0 2px 10px rgba(0,0,0,0.08)"}}>
          <div style={{fontSize:9,fontWeight:800,color:"#2a2118",letterSpacing:2,marginBottom:12}}>{editId?"EDIT ENTRY":"NEW ENTRY"}</div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:7,fontWeight:700,color:"#888",letterSpacing:1.5,marginBottom:3}}>AMOUNT ($)</div>
            <input type="number" min="0" step="0.01" value={form.amount} onChange={e=>{setForm(f=>({...f,amount:e.target.value}));setAmtErr(false);}} placeholder="0.00"
              style={{width:"100%",boxSizing:"border-box",border:amtErr?"1.5px solid #ef4444":"1px solid #e0e0e0",borderRadius:8,padding:"7px 10px",fontSize:14,fontWeight:700,fontFamily:"inherit",outline:"none",background:amtErr?"#fff5f5":"#fafafa"}}/>
            {amtErr&&<div style={{fontSize:8,color:"#ef4444",marginTop:3,fontWeight:700}}>Enter an amount above 0</div>}
          </div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:7,fontWeight:700,color:"#888",letterSpacing:1.5,marginBottom:3}}>CATEGORY</div>
            <div style={{fontSize:7,fontWeight:700,color:"#c9a96e",letterSpacing:1,marginBottom:4}}>EARNED — counts toward $3,000</div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:7}}>
              {EARNED_CATS.map(c=>(
                <button key={c} onClick={()=>setForm(f=>({...f,cat:c}))} style={{padding:"5px 10px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:9,fontWeight:700,background:form.cat===c?(CAT_COLOR[c]||"#555"):"#f0f0f0",color:form.cat===c?"#fff":"#666"}}>{catLabel(c)}</button>
              ))}
            </div>
            <div style={{fontSize:7,fontWeight:700,color:"#9ca3af",letterSpacing:1,marginBottom:4}}>OTHER — tracked, not counted</div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {OTHER_CATS.map(c=>(
                <button key={c} onClick={()=>setForm(f=>({...f,cat:c}))} style={{padding:"5px 10px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:9,fontWeight:700,background:form.cat===c?(CAT_COLOR[c]||"#555"):"#f0f0f0",color:form.cat===c?"#fff":"#666"}}>{catLabel(c)}</button>
              ))}
            </div>
          </div>

// ── ATLAS EXPORTS (week · month · all) ───────────────────────────────────────
function _exGMI(m){return MONTHS_ARR.findIndex(x=>x.m===m);}
function _exReadLS(key){try{const v=localStorage.getItem(key);return v?JSON.parse(v):null;}catch(e){return null;}}
function _exWeekDays(wk){
  const days=[];let m=wk.start[0],d=wk.start[1];
  for(let i=0;i<14;i++){
    days.push({m,d});
    if(m===wk.end[0]&&d===wk.end[1]) break;
    d++;const mi=_exGMI(m);
    if(mi>=0&&d>MONTHS_ARR[mi].days){const ni=mi+1;if(ni>=MONTHS_ARR.length)break;m=MONTHS_ARR[ni].m;d=1;}
  }
  return days;
}
function buildWeekText(wk, allData){
  const M_NAME={4:"APR",5:"MAY",6:"JUN"};
  const wdays=_exWeekDays(wk);
  const tc=_exReadLS("lifeos_v8_taskChecks")||{};
  const pc=_exReadLS("lifeos_v8_priChecks")||{};
  const wa=_exReadLS("weekAssess")||{};
  let out=`LIFE OS — WEEK ${wk.n} EXPORT (${wk.sm} ${wk.start[1]}–${wk.em} ${wk.end[1]})\n`;
  out+=`Generated: ${M_NAME[TODAY_M]||TODAY_M} ${TODAY_D}\n\n`;
  out+=`TOP 3 (PW·PB·PA) — DAILY:\n`;
  let t3FullDays=0;
  wdays.forEach(({m,d})=>{
    const mi=_exGMI(m); const data=allData[mi]; if(!data) return;
    const pct=top3pct(data,d);
    const en=data.energy?.[d]||"·";
    const mood=data.mood?.[d]||"·";
    const marks=TOP3.map(h=>data.grid?.[h.code]?.[d]?"✓":"✗").join(" ");
    const allChecked=["t1","t2","t3"].every(slot=>!!tc[m+"-"+d+"-"+slot+"-c"]);
    if(allChecked) t3FullDays++;
    out+=`  ${M_NAME[m]||m} ${d}: ${marks} [${pct}%] energy:${en} mood:${mood}${allChecked?" ✓✓✓":""}\n`;
    const note=data?.notes?.[d];
    if(note?.trim()) out+=`    NOTE: ${note.trim()}\n`;
    const hl=data?.highlights?.[d];
    if(hl?.trim()) out+=`    ✨ HIGHLIGHT: ${hl.trim()}\n`;
    const wns=data?.wins?.[d];
    if(wns?.trim()){
      out+=`    WINS:\n`;
      wns.trim().split("\n").forEach(line=>{if(line.trim()) out+=`      ${line.trim()}\n`;});
    }
    const t=data.tasks?.[d]||{};
    for(let s=1;s<=10;s++){
      const slot="t"+s;
      if(!(t[slot]||"").replace(/\u200b/g,"").trim()) break;
      const chk=!!tc[m+"-"+d+"-"+slot+"-c"];
      out+=`    T${s} [${chk?"✓":"·"}]: ${t[slot].replace(/\u200b/g,"").trim()}\n`;
    }
  });
  out+=`  TOP 3 TASKS FULLY DONE: ${t3FullDays}/${wdays.length} days\n`;
  out+=`\nHAT WEEK SUMMARY:\n`;
  ALL_HATS.forEach(h=>{
    const filled=wdays.filter(({m,d})=>{
      const mi=_exGMI(m); return allData[mi]?.grid?.[h.code]?.[d];
    }).length;
    if(filled>0) out+=`  ${h.code}: ${filled}/${wdays.length} days\n`;
  });
  const wkPriChecks=pc["w"+wk.n]||[];
  const pris=(wa?.["w"+wk.n]?.priorities||[]);
  if(pris.some(p=>(p||"").trim())){
    out+=`\nWEEK PRIORITIES (W${wk.n}):\n`;
    pris.forEach((p,i)=>{
      if((p||"").trim()) out+=`  ${i+1}. [${wkPriChecks.includes(i)?"✓":"·"}] ${p}\n`;
    });
  }
  out+=`\n— end of Week ${wk.n} export —`;
  return out;
}
function buildMonthStats(mo, allData){
  const mi=_exGMI(mo.m);
  const data=allData[mi];
  const elapsed=(mo.m<TODAY_M)?mo.days:(mo.m===TODAY_M?TODAY_D:0);
  if(!data||elapsed===0) return `${mo.name.toUpperCase()} — no data yet.`;
  const tc=_exReadLS("lifeos_v8_taskChecks")||{};
  let out=`LIFE OS — ${mo.name.toUpperCase()} 2026 STATS\n`;
  out+=`Days elapsed: ${elapsed}/${mo.days}\n\n`;
  out+=`HAT COMPLETION (days marked / days elapsed):\n`;
  ALL_HATS.forEach(h=>{
    let n=0;for(let d=1;d<=elapsed;d++){if(data.grid?.[h.code]?.[d])n++;}
    if(n>0) out+=`  ${h.code}: ${n}/${elapsed} (${Math.round(n/elapsed*100)}%)\n`;
  });
  const moods=[];for(let d=1;d<=elapsed;d++){const v=data.mood?.[d];if(v)moods.push(v);}
  if(moods.length){
    const avg=(moods.reduce((a,b)=>a+b,0)/moods.length).toFixed(1);
    out+=`\nMOOD: avg ${avg} · min ${Math.min(...moods)} · max ${Math.max(...moods)} · logged ${moods.length}/${elapsed} days\n`;
  }
  const eCounts={};for(let d=1;d<=elapsed;d++){const e=data.energy?.[d];if(e)eCounts[e]=(eCounts[e]||0)+1;}
  const eKeys=Object.keys(eCounts);
  if(eKeys.length){
    out+=`ENERGY: `+eKeys.map(k=>`${k}×${eCounts[k]}`).join("  ")+`\n`;
  }
  let t3Full=0;for(let d=1;d<=elapsed;d++){if(["t1","t2","t3"].every(s=>!!tc[mo.m+"-"+d+"-"+s+"-c"]))t3Full++;}
  out+=`TOP 3 TASKS FULLY DONE: ${t3Full}/${elapsed} days\n`;
  let hlN=0,winN=0;for(let d=1;d<=elapsed;d++){if(data.highlights?.[d]?.trim())hlN++;if(data.wins?.[d]?.trim())winN++;}
  out+=`HIGHLIGHTS LOGGED: ${hlN} days · WINS LOGGED: ${winN} days\n`;
  out+=`\n(Full notes + highlights + wins text lives in the Month tab export)\n— end of ${mo.name} stats —`;
  return out;
}
function buildDayText(m,d,allData){
  const mi=_exGMI(m);
  const data=allData[mi];
  const M={4:"APR",5:"MAY",6:"JUN",7:"JUL"};
  let out=`LIFE OS — DAY EXPORT · ${weekdayShort(m,d)} ${M[m]||m} ${d}, 2026\n`;
  out+="=".repeat(40)+"\n";
  if(!data){ out+="\nNo data for this day.\n"; return out; }
  const en=data.energy?.[d], mv=data.mood?.[d];
  out+=`Energy: ${en||"—"}   Mood: ${mv?mv+"/10":"—"}\n\n`;
  const tc=_exReadLS("lifeos_v8_taskChecks")||{};
  const t=data.tasks?.[d]||{};
  out+="TOP 3 TASKS:\n";
  let any=false;
  for(let s=1;s<=10;s++){
    const slot="t"+s; const val=(t[slot]||"").replace(/\u200b/g,"").trim();
    if(!val){ if(s<=3) continue; else break; }
    const chk=!!tc[m+"-"+d+"-"+slot+"-c"];
    out+=`  ${s<=3?"T"+s:"  "} [${chk?"✓":"·"}] ${val}\n`; any=true;
  }
  if(!any) out+="  (none set)\n";
  const marks=ALL_HATS.filter(h=>data.grid?.[h.code]?.[d]).map(h=>h.code+(data.grid[h.code][d]==="box"?"⊠":"✓"));
  out+=`\nHATS MARKED: ${marks.length?marks.join("  "):"—"}\n`;
  const note=data.notes?.[d]; if(note?.trim()) out+=`\nNOTE:\n  ${note.trim().split("\n").join("\n  ")}\n`;
  const hl=data.highlights?.[d]; if(hl?.trim()) out+=`\n✨ HIGHLIGHT:\n  ${hl.trim()}\n`;
  const mn=data.moodNotes?.[d]; if(mn?.trim()) out+=`\n〰️ MOOD SHIFT:\n  ${mn.trim()}\n`;
  const wns=data.wins?.[d]; if(wns?.trim()){ out+=`\nWINS:\n`; wns.trim().split("\n").forEach(l=>{if(l.trim())out+=`  ${l.trim()}\n`;}); }
  out+=`\n— end of day export —`;
  return out;
}

                const line=raw.replace(/\u200b/g,"");

                if(t===""){ out.push(<div key={i} style={{height:10}}/>); return; }
                const letters=t.replace(/[^A-Za-zА-Яа-я]/g,"");
                const isUpper=letters.length>=2 && letters===letters.toUpperCase() && t.length<=48;
                const _cp0=t.codePointAt(0);
                const startsEmoji=(_cp0>=0x1F000&&_cp0<=0x1FAFF)||(_cp0>=0x2600&&_cp0<=0x27BF)||"✦✧★☆▲■".indexOf(t[0])>=0;
                const isHeading=isUpper||(startsEmoji&&t.length<=48)||(/[:：]$/.test(t)&&t.length<=42);
                const isBullet=/^[-•·*–—]\s+/.test(t);
                const isQuote=/^["“«].*["”»]$/.test(t);
                const isNumbered=/^\d+[.)]\s+/.test(t);
                if(isHeading){
                  out.push(<div key={i} style={{fontSize:11,fontWeight:900,color:"#b8860b",letterSpacing:1.5,textTransform:"none",marginTop:out.length?14:0,marginBottom:4,fontFamily:"inherit"}}>{t.replace(/[:：]$/,"")}</div>);

                    </div>
                  );
                } else if(isNumbered){
                  const m=t.match(/^(\d+)[.)]\s+(.*)$/);
                  out.push(
                    <div key={i} style={{display:"flex",gap:8,margin:"3px 0",paddingLeft:4}}>
                      <span style={{color:"#c9a96e",fontWeight:900,flexShrink:0,lineHeight:1.6,minWidth:16}}>{m[1]}.</span>
                      <span style={{fontSize:12.5,fontFamily:"Georgia,serif",color:"#3a2e24",lineHeight:1.6}}>{m[2]}</span>
                    </div>
                  );
                } else {
                  out.push(<div key={i} style={{fontSize:12.5,fontFamily:"Georgia,serif",color:"#3a2e24",lineHeight:1.7,margin:"2px 0",wordBreak:"break-word"}}>{t}</div>);
                }
              });
              return out;
            })()}
          </div>
          :<div style={{textAlign:"center",padding:"36px 20px",color:"#b0a898",fontSize:11,lineHeight:1.6}}>
            Your Vision lives here.<br/>Tap ✏ EDIT and paste the latest version<br/>from Notion. It saves on this device.
          </div>
      }
    </div>
  );
}

      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      [[880,0],[1100,.22],[1320,.44]].forEach(([f,t])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=f;o.type="sine";
        g.gain.setValueAtTime(.5,ctx.currentTime+t);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.3);
        o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.35);
      });
    }catch(e){}
  },[]);



  const onTS=e=>{
    const tag=(e.target.tagName||"").toLowerCase();
    if(["input","textarea","button","label","select"].includes(tag)){tsX.current=null;return;}
    // Block tab swipe if touch is inside a horizontal-scroll container
    if(e.target.closest&&e.target.closest('[data-hscroll]')){tsX.current=null;return;}
    tsX.current=e.touches[0].clientX;tsY.current=e.touches[0].clientY;wRef.current=e.currentTarget.offsetWidth||390;
  };
  const onTM=e=>{
    if(tsX.current===null)return;
    const dx=e.touches[0].clientX-tsX.current,dy=e.touches[0].clientY-tsY.current;
    if(Math.abs(dx)>Math.abs(dy)){e.preventDefault();setIsDrag(true);setDragX(dx);}
  };
  const onTE=e=>{
    if(!isDrag){tsX.current=null;return;}
    const dx=e.changedTouches[0].clientX-tsX.current;
    if(Math.abs(dx)>55){if(dx<0&&tabIdx<TABS.length-1)setTabIdx(x=>x+1);if(dx>0&&tabIdx>0)setTabIdx(x=>x-1);}
    setIsDrag(false);setDragX(0);tsX.current=null;
  };

  const getMI=m=>MONTHS_ARR.findIndex(x=>x.m===m);
  const mutData=(m,fn)=>setAllData(p=>{const c=[...p];c[getMI(m)]=fn(p[getMI(m)]);return c;});
  const cycleCell=(code,m,day)=>mutData(m,d=>({...d,grid:{...d.grid,[code]:{...d.grid[code],[day]:nextSt(d.grid[code][day])}}}));

      const cur=allData[getMI(m)]?.energy?.[day];
      const idx=cur?ENERGY.findIndex(e=>e.sym===cur):-1;
      mutData(m,d=>({...d,energy:{...d.energy,[day]:idx>=ENERGY.length-1?null:ENERGY[idx+1].sym}}));
    }
  };
  const cycleMood=(m,day,directVal)=>{

      mutData(m,d=>({...d,mood:{...(d.mood||{}),[day]:directVal===0?null:directVal}}));

      mutData(m,d=>({...d,mood:{...(d.mood||{}),[day]:next}}));
    }
  };
  const setTask=(m,day,f,v)=>mutData(m,d=>({...d,tasks:{...d.tasks,[day]:{...d.tasks[day],[f]:v}}}));
  const setNote=(m,day,v)=>mutData(m,d=>({...d,notes:{...(d.notes||{}),[day]:v}}));
  const setWins=(m,day,v)=>mutData(m,d=>({...d,wins:{...(d.wins||{}),[day]:v}}));
  // toggleExtraHat/toggleLibHat support both simple toggle (Today panel) and state strings (Extra panel)
  const toggleExtraHat=(m,day,code,stateVal)=>mutData(m,d=>{
    const cur=(d.extraHats||{})[day]||[];
    let next;
    if(stateVal!==undefined){
      // Extra panel: set state string "code:state" or remove if null
      const filtered=cur.filter(e=>e!==code&&!e.startsWith(code+":"));
      next=stateVal?[...filtered,code+":"+stateVal]:filtered;
    } else {
      // Today panel: simple toggle presence
      next=cur.some(e=>e===code||e.startsWith(code+":"))?cur.filter(e=>e!==code&&!e.startsWith(code+":")):([...cur,code]);
    }
    return {...d,extraHats:{...(d.extraHats||{}),[day]:next}};
  });
  const toggleLibHat=(m,day,code,stateVal)=>mutData(m,d=>{
    const cur=(d.libHats||{})[day]||[];
    let next;
    if(stateVal!==undefined){
      const filtered=cur.filter(e=>e!==code&&!e.startsWith(code+":"));
      next=stateVal?[...filtered,code+":"+stateVal]:filtered;
    } else {
      next=cur.some(e=>e===code||e.startsWith(code+":"))?cur.filter(e=>e!==code&&!e.startsWith(code+":")):([...cur,code]);
    }
    return {...d,libHats:{...(d.libHats||{}),[day]:next}};
  });

  const hatPlus=code=>{
    const nc=(hatCounts[code]||0)+1;
    setHatCounts(p=>({...p,[code]:nc}));
    const mi=getMI(TODAY_M);
    setAllData(prev=>{const c=[...prev];const ns=nc===1?"x":"box";c[mi]={...c[mi],grid:{...c[mi].grid,[code]:{...c[mi].grid[code],[TODAY_D]:ns}}};return c;});
  };
  const hatMinus=code=>{
    const nc=Math.max(0,(hatCounts[code]||0)-1);
    setHatCounts(p=>({...p,[code]:nc}));
    const mi=getMI(TODAY_M);
    setAllData(prev=>{const c=[...prev];const ns=nc===0?null:nc===1?"x":"box";c[mi]={...c[mi],grid:{...c[mi].grid,[code]:{...c[mi].grid[code],[TODAY_D]:ns}}};return c;});
  };

  // JSON backup/restore
  const saveJSON=()=>{
    const payload={allData,weekAssess,hatCounts,savedAt:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    const d=new Date();const ds=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    a.href=url;a.download="lifeos-backup-"+ds+".json";
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  };
  const loadJSON=(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.allData){setAllData(d.allData);lsSet("allData",d.allData);}
        if(d.weekAssess){setWeekAssess(d.weekAssess);lsSet("weekAssess",d.weekAssess);}
        if(d.hatCounts){setHatCounts(d.hatCounts);lsSet("hatCounts",d.hatCounts);}
        alert("Data restored from "+file.name);
      }catch(err){alert("Error reading file: "+err.message);}
    };
    reader.readAsText(file);
    e.target.value="";
  };

  const weekDays=()=>{
    const w=Q2_WEEKS[weekIdx];const days=[];let[cm,cd]=[...w.start];const[em,ed]=w.end;
    for(let i=0;i<7;i++){

  // Export week data for Claude
  const [showExport,setShowExport]=useState(false);
  const buildExport=()=>{
    const wk=Q2_WEEKS[weekIdx];
    const wdays=weekDays();

    out+=`Generated: ${M_NAME[TODAY_M]||TODAY_M} ${TODAY_D}\n\n`;

    // TOP 3 per day + tasks

      const mood=data.mood?.[d]||"·";
      const marks=TOP3.map(h=>data.grid[h.code]?.[d]?"✓":"✗").join(" ");
      // count days where all 3 tasks were checked
      let t3checks_legacy=[];try{const v=localStorage.getItem("lifeos_v8_taskChecks");if(v){const tc=JSON.parse(v);t3checks_legacy=tc[m+"-"+d+"-c"]||[];}}catch(e){}
      const allChecked=["t1","t2","t3"].every(slot=>{
        // New format: "m-d-slot-c" key with boolean value
        const newKey=m+"-"+d+"-"+slot+"-c";
        try{const v=localStorage.getItem("lifeos_v8_taskChecks");if(v){const tc=JSON.parse(v);return !!tc[newKey];}}catch(e){}
        return false;
      });
      if(allChecked) t3FullDays++;
      const t3marker=allChecked?" ✓✓✓":"";
      out+=`  ${M_NAME[m]||m} ${d}: ${marks} [${pct}%] energy:${en} mood:${mood}${t3marker}\n`;
      const note=data?.notes?.[d];
      if(note?.trim()) out+=`    NOTE: ${note.trim()}\n`;
      const hl=data?.highlights?.[d];
      if(hl?.trim()) out+=`    ⭐ HIGHLIGHT: ${hl.trim()}\n`;
      const wns=data?.wins?.[d];
      if(wns?.trim()){
        out+=`    WINS:\n`;
        wns.trim().split("\n").forEach(line=>{if(line.trim()) out+=`      ${line.trim()}\n`;});
      }
      const t=data.tasks?.[d]||{};
      for(let s=1;s<=10;s++){
        const slot="t"+s;
        if(!(t[slot]||"").replace(/\u200b/g,"").trim()) break;
        const newKey=m+"-"+d+"-"+slot+"-c";
        let chk=false;try{const v=localStorage.getItem("lifeos_v8_taskChecks");if(v){const tc=JSON.parse(v);chk=!!tc[newKey];}}catch(e){}
        out+=`    T${s} [${chk?"✓":"·"}]: ${t[slot].replace(/\u200b/g,"").trim()}\n`;
      }
    });
    out+=`  TOP 3 TASKS FULLY DONE: ${t3FullDays}/${wdays.length} days\n`;

    // HAT grid summary per week
    out+=`\nHAT WEEK SUMMARY:\n`;
    ALL_HATS.forEach(h=>{
      const filled=wdays.filter(({m,d})=>{
        const mi=getMI(m); return allData[mi]?.grid?.[h.code]?.[d];

      if(filled>0) out+=`  ${h.code}: ${filled}/${wdays.length} days\n`;

        if(p.trim()) out+=`  ${i+1}. [${chk}] ${p}\n`;
      });
    }

    out+=`\n— end of Week ${wk.n} export —`;

    // Photo Challenge data for this week (if any)
    try {
      const challRaw=localStorage.getItem("lifeos_chall26");
      if(challRaw){
        const challData=JSON.parse(challRaw);
        const challLines=[];
        wdays.forEach(({m,d})=>{
          if(m!==5) return;
          const entries=challData[`d${d}`]||[];
          if(entries.length){
            const labels=entries.map(e=>{
              const id=e.includes(":")?e.split(":")[0]:e;

              const item=CHALLENGE_ITEMS.find(i=>i.id===id);

            if(labels.length) challLines.push(`  MAY ${d}: ${labels.join(" | ")}`);

        if(challLines.length){
          out+=`\n\n📸 PHOTO CHALLENGE — W${wk.n}:\n${challLines.join("\n")}`;
        }
      }
    } catch(e){}

    // Extra + Library HATs for the week
    const exLines=[], lbLines=[];
    wdays.forEach(({m,d})=>{
      const mi=getMI(m); const dd=allData[mi]; if(!dd) return;
      const ex=(dd.extraHats||{})[d]||[];
      const lb=(dd.libHats||{})[d]||[];
      if(ex.length) exLines.push(`  ${M_NAME[m]||m} ${d}: ${ex.join(", ")}`);
      if(lb.length) lbLines.push(`  ${M_NAME[m]||m} ${d}: ${lb.join(", ")}`);
    });
    if(exLines.length){out=out.replace('— end of Week',`EXTRA ACTIVE HATS:\n${exLines.join('\n')}\n\n— end of Week`);}
    if(lbLines.length){out=out.replace('— end of Week',`LIBRARY TAGS:\n${lbLines.join('\n')}\n\n— end of Week`);}

    return out;

  return (
    <div style={{minHeight:"100vh",background:"#f2ede6",fontFamily:"'SF Mono','Courier New',monospace",maxWidth:430,margin:"0 auto",overflow:"hidden"}}>
      <div style={{background:"#fff",borderBottom:"1px solid #e8e0d5",padding:"12px 16px 0",position:"sticky",top:0,zIndex:30,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:20,fontWeight:900,color:"#1a1a1a",letterSpacing:-1}}>26Q2 <span style={{fontSize:9,color:"#b0a898",fontWeight:400,letterSpacing:3}}>LIFE OS</span><span style={{fontSize:7,color:"#ccc",fontWeight:400,marginLeft:4}}>v9.9</span></div>
          <div style={{fontSize:10,color:"#8a7f74",fontWeight:700}}>{["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"][TODAY_M-1]} {TODAY_D} · W{Q2_WEEKS.find(w=>TODAY_M*100+TODAY_D>=w.start[0]*100+w.start[1]&&TODAY_M*100+TODAY_D<=w.end[0]*100+w.end[1])?.n||"?"}</div>

        }}>
          {ALL_QUOTES[mantraIdx]?.hat&&(()=>{
            const cat=ALL_QUOTES[mantraIdx].hat[0]; // P, M, R, D, S, L, C
            const tagColors={
              P:{bg:"#ede7f6",color:"#5e1b8b"},
              M:{bg:"#e3f2fd",color:"#1565c0"},
              R:{bg:"#fff3e0",color:"#bf5000"},

            return <span style={{fontSize:7,fontWeight:900,color:tc.color,background:tc.bg,borderRadius:3,padding:"1px 5px",flexShrink:0,marginTop:2,fontFamily:"'SF Mono','Courier New',monospace"}}>{ALL_QUOTES[mantraIdx].hat}</span>;
          })()}
          <span style={{fontSize:8.5,color:"#5a5048",fontStyle:"italic",fontWeight:500,lineHeight:1.4,fontFamily:"Georgia,serif",flex:1}}>
            "{ALL_QUOTES[mantraIdx]?.text}"
          </span>
          <span style={{fontSize:6,color:"#ccc",flexShrink:0,marginTop:2}}>tap›</span>

            {t==="today"&&<TodayPanel allData={allData} getMI={getMI} viewDay={viewDay} viewM={viewM} setViewDay={setViewDay} setViewM={setViewM} weekIdx={weekIdx} setWeekIdx={setWeekIdx} weekDays={weekDays} cycleCell={cycleCell} cycleEnergy={cycleEnergy} cycleMood={cycleMood} setTask={setTask} setNote={setNote} setHighlight={setHighlight} setMoodNote={setMoodNote} setWins={setWins} weekAssess={weekAssess} setAssess={setAssess} setPriority={setPriority} toggleExtraHat={toggleExtraHat} toggleLibHat={toggleLibHat} winsLogged={winsLogged} toggleWinsLogged={toggleWinsLogged}/> }
            {t==="month"&&<MonthPanel monthIdx={monthIdx} setMonthIdx={setMonthIdx} allData={allData} cycleCell={cycleCell} cycleEnergy={cycleEnergy} cycleMood={cycleMood} setTabIdx={setTabIdx} setViewDay={setViewDay} setViewM={setViewM} setWeekIdx={setWeekIdx} toggleExtraHat={toggleExtraHat} toggleLibHat={toggleLibHat}/>}
            {t==="plan"&&<PlanPanel viewM={viewM} viewDay={viewDay} setViewDay={setViewDay} setViewM={setViewM} planData={planData} setPlanField={setPlanField} clearPlanDay={clearPlanDay}/>}

          </div>

          background:"#111",color:"#fff",border:"none",borderRadius:20,
          padding:"7px 12px",fontSize:8,letterSpacing:1.5,cursor:"pointer",
          fontFamily:"'SF Mono','Courier New',monospace",fontWeight:700,whiteSpace:"nowrap",

        <button onClick={saveJSON} style={{
          background:"#1b5e20",color:"#fff",border:"none",borderRadius:20,
          padding:"7px 12px",fontSize:8,letterSpacing:1.5,cursor:"pointer",

          background:"#1565c0",color:"#fff",border:"none",borderRadius:20,

                caches.keys().then(keys=>Promise.all(keys.map(k=>caches.delete(k)))).then(()=>{

          background:"#7c3aed",color:"#fff",border:"none",borderRadius:20,
          padding:"7px 12px",fontSize:8,letterSpacing:1.5,cursor:"pointer",
          fontFamily:"'SF Mono','Courier New',monospace",fontWeight:700,whiteSpace:"nowrap",
        }}>⟳ UPDATE</button>
      </div>

      {showExport&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:100,display:"flex",alignItems:"flex-end"}}>

            </div>

              readOnly
              value={buildExport()}
              style={{flex:1,border:"1px solid #e0e0e0",borderRadius:8,padding:"10px",fontSize:9,fontFamily:"'SF Mono','Courier New',monospace",color:"#333",resize:"none",lineHeight:1.6,background:"#fafafa"}}
              onFocus={e=>e.target.select()}
            />
            <button onClick={()=>{
              const txt=buildExport();
              if(navigator.clipboard){navigator.clipboard.writeText(txt);}
              else{const t=document.createElement("textarea");t.value=txt;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);}
              setShowExport(false);
            }} style={{
              marginTop:10,background:"#111",color:"#fff",border:"none",borderRadius:10,
              padding:"12px",fontSize:10,letterSpacing:2,cursor:"pointer",fontWeight:700,
              fontFamily:"'SF Mono','Courier New',monospace",
            }}>COPY TO CLIPBOARD</button>
          </div>
        </div>
      )}

      <div style={{textAlign:"center",padding:"0 0 16px",fontSize:8.5,color:"#9a7b3c",fontWeight:800,letterSpacing:3}}>BE KONSTANTIN · ONE MOVE = FULL PRESENCE</div>
    </div>
  );
}

          const msg=(this.state.err&&this.state.err.message)||String(this.state.err);
          return React.createElement("div",{style:{padding:"40px 20px",fontFamily:"-apple-system,system-ui,sans-serif",maxWidth:420,margin:"0 auto"}},
            React.createElement("div",{style:{fontSize:18,fontWeight:900,color:"#2a2118",marginBottom:8}},"App hit an error"),

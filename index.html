const M_LABEL = { 4:"APR", 5:"MAY", 6:"JUN", 7:"JUL" };
const DW = 22, EW = 14, CW = 19;

const STATES = [null, "x", "box", "back"];
function nextSt(cur) { return STATES[(STATES.indexOf(cur)+1)%STATES.length]; }
function stMark(st, col) {
  if (!st)           return { ch:"·", c:"#ddd", fw:400, fs:10 };
  if (st === "x")    return { ch:"×", c:col,    fw:900, fs:13 };
  if (st === "box")  return { ch:"⊠", c:col,    fw:900, fs:12 };
  if (st === "back") return { ch:"◀", c:col,    fw:900, fs:11 };
  return               { ch:"·", c:"#ddd", fw:400, fs:10 };
}

function initMonth(days) {
  const grid = {};
  ALL_HATS.forEach(h => { grid[h.code]={}; for(let d=1;d<=days;d++) grid[h.code][d]=null; });
  const energy={}, tasks={}, mood={}, notes={}, extraHats={}, libHats={};
  for(let d=1;d<=days;d++) { energy[d]=null; tasks[d]={t1:"",t2:"",t3:""}; mood[d]=null; notes[d]=""; extraHats[d]=[]; libHats[d]=[]; }
  return { grid, energy, tasks, mood, notes, extraHats, libHats };
}
function fmtT(s) { return `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`; }
function ecol(sym) { return ENERGY.find(e=>e.sym===sym)?.color||"#999"; }
function top3pct(data, day) {
  if(!data) return 0;
  return Math.round(TOP3.filter(h=>data.grid[h.code]?.[day]).length/TOP3.length*100);
}
function weeklyTop3(allData, wdList) {
  let total=0, done=0;
  wdList.forEach(({m,d})=>{
    const mi=MONTHS_ARR.findIndex(x=>x.m===m);
    const data=allData[mi]; if(!data) return;
    TOP3.forEach(h=>{ total++; if(data.grid[h.code]?.[d]) done++; });
  });
  return total>0?Math.round(done/total*100):0;
}

function NBtn({onClick,on,children}) {
  return <button onClick={on?onClick:undefined} style={{background:"none",border:`1px solid ${on?"#bbb":"#eee"}`,color:on?"#444":"#ddd",borderRadius:20,padding:"5px 14px",cursor:on?"pointer":"default",fontSize:15,fontFamily:"inherit"}}>{children}</button>;
}

          </div>
          <div style={{flex:1}}>
            <CompactRow h={TRK_SM[0]} state={data?.grid?.[TRK_SM[0].code]?.[viewDay]} color="#555" bg="#f0f0f0" onToggle={()=>cycleCell(TRK_SM[0].code,viewM,viewDay)}/>

        <div style={{padding:"6px 10px 4px",display:"flex",gap:5,flexWrap:"wrap"}}>
          {EXTRA_ACTIVE.map(h=>{
            const on=curExtra.includes(h.code);
            return (
              <button key={h.code} onClick={()=>toggleExtraHat(viewM,viewDay,h.code)} style={{
                padding:"4px 9px",borderRadius:20,border:`1.5px solid ${on?h.color:"#e0e0e0"}`,
                background:on?h.color+"18":"#fafafa",cursor:"pointer",fontFamily:"inherit",

        {/* Library Tags toggle */}
        <div onClick={()=>setShowLib(x=>!x)} style={{padding:"4px 12px 4px",display:"flex",alignItems:"center",gap:5,cursor:"pointer",borderTop:"1px solid #f5f5f5"}}>
          <span style={{fontSize:7,color:"#aaa",letterSpacing:1,fontWeight:700}}>LIBRARY TAGS{curLib.length>0?` · ${curLib.length} selected`:""}</span>
          <span style={{fontSize:8,color:"#ccc",marginLeft:"auto"}}>{showLib?"▲":"▼"}</span>
        </div>
        {showLib&&(
          <div style={{padding:"4px 10px 8px",display:"flex",gap:4,flexWrap:"wrap",borderTop:"1px solid #f0f0f0"}}>

              const on=curLib.includes(h.code);

                <button key={h.code} onClick={()=>toggleLibHat(viewM,viewDay,h.code)} style={{
                  padding:"3px 7px",borderRadius:20,border:`1.5px solid ${on?h.color:"#e0e0e0"}`,
                  background:on?h.color+"18":"#fafafa",cursor:"pointer",fontFamily:"inherit",

      {/* Notes / brainstorm */}
      <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",marginBottom:8,overflow:"hidden"}}>
        <div style={{padding:"4px 12px",background:"#fafafa",borderBottom:"1px solid #f0f0f0",fontSize:8,letterSpacing:3,color:"#888",fontWeight:800}}>NOTES · BRAINSTORM</div>
        <textarea
          value={curNote}
          onChange={e=>setNote(viewM,viewDay,e.target.value)}
          placeholder="One line for the day. Clears the mind before tasks start..."
          style={{
            width:"100%",minHeight:90,border:"none",outline:"none",resize:"none",
            padding:"8px 12px",fontSize:11,fontFamily:"'SF Mono','Courier New',monospace",
            color:"#333",background:"#fff",lineHeight:1.5,

      {/* TAP CYCLES legend bottom */}

        <div style={{display:"flex",gap:10}}>
          {[["·","empty","#ccc"],["×","done","#1b5e20"],["⊠","boxing","#1565c0"],["◀","back","#888"]].map(([s,l,c])=>(
            <div key={s} style={{textAlign:"center"}}>
              <div style={{fontSize:12,color:c,fontWeight:900}}>{s}</div>

        </div>
      </div>
    </div>
  );
}

// ── MONTH PANEL ─────────────────────────────────────────────────────────────
const FLAT_HATS = MONTH_SECTIONS.flatMap(s=>s.hats);
// C = cell size px (square). No margins between cols — alignment via borders only.
const C=20, COL_DAY=28, COL_EN=14, COL_MOOD=20, COL_PCT=24, COL_EX=24, COL_LB=24;
const GRID_COLS = `${COL_DAY}px ${COL_EN}px ${COL_MOOD}px ${FLAT_HATS.map(()=>`${C}px`).join(" ")} ${COL_PCT}px`;

function moodColor(v) {
  if(!v) return "#ddd";
  if(v>=9) return "#00897b";
  if(v>=7) return "#43a047";
  if(v>=5) return "#f9a825";
  if(v>=3) return "#e65100";
  return "#c62828";
}

// Tracking HATs
const TRK_ALL = [...TRK_PXRV,...TRK_PR,...TRK_RSLH,...TRK_MV,...TRK_SM];
const TRK_DEFAULT_GOALS = {PX:2,RV:1,PR:2,RS:1,LH:2,MV:1,SM:1};

// Group spans: col indices (0-based within HAT columns) for each group
// FLAT_HATS: 0=MS 1=MM 2=RJ 3=RJ2 | 4=PW 5=PB 6=PA | 7=PX 8=RV 9=PR 10=RS 11=LH 12=MV 13=SM
const GROUPS = [
  {label:"ESSENTIALS", start:0, end:3, color:"#bf5000", bg:"#fff3e0", bdr:"#ffb74d"},
  {label:"TOP 3",      start:4, end:6, color:"#1b5e20", bg:"#e8f5e9", bdr:"#66bb6a"},
  {label:"TRACKING",  start:7, end:13, color:"#555",    bg:"#f5f5f5", bdr:"#bbb"},
];

// Build flat meta for each HAT col
function buildSectionMeta() {
  let i=0; const meta=[];
  MONTH_SECTIONS.forEach((sec,si)=>{
    sec.hats.forEach((h,hi)=>{
      const grp = GROUPS.find(g=>i>=g.start&&i<=g.end);
      meta.push({
        h, sec, si,
        isFirstInSec:hi===0, isLastInSec:hi===sec.hats.length-1,
        isFirstInGrp:i===(grp?grp.start:i), isLastInGrp:i===(grp?grp.end:i),
        grp, globalIdx:i
      });
      i++;
    });
  });
  return meta;
}
const SECTION_META = buildSectionMeta();

function getWeekForDay(m,d) {
  return Q2_WEEKS.find(w=>{
    const [sm,sd]=w.start,[em,ed]=w.end;
    return m*100+d>=sm*100+sd && m*100+d<=em*100+ed;
  });
}
function isWeekEnd(month,day) {
  const w=getWeekForDay(month.m,day); if(!w) return false;
  const [em,ed]=w.end;
  return em===month.m&&ed===day;
}

function MonthPanel({monthIdx,setMonthIdx,allData,cycleCell,cycleEnergy,cycleMood,setTabIdx,setViewDay,setViewM,toggleExtraHat,toggleLibHat}) {
  const month=MONTHS_ARR[monthIdx];
  const data=allData[monthIdx];
  const DAYS=Array.from({length:month.days},(_,i)=>i+1);
  const isCur=month.m===TODAY_M;
  const totalW=COL_DAY+COL_EN+COL_MOOD+FLAT_HATS.length*C+COL_PCT+COL_EX+COL_LB+2;

  const [trkGoals,setTrkGoals]=useState(()=>({...TRK_DEFAULT_GOALS}));
  const [showGoals,setShowGoals]=useState(false);
  const [picker,setPicker]=useState(null); // {day, type:'ex'|'lb'}
  function adjustGoal(code,delta){setTrkGoals(p=>({...p,[code]:Math.max(1,Math.min(7,(p[code]||1)+delta))}));}

  // Auto-scroll to today when this month is current
  const scrollRef=useRef(null);
  useEffect(()=>{
    if(isCur&&scrollRef.current){
      const ROW_H=C; // each row is C px tall
      const HDR=32; // sticky header height
      const targetDay=TODAY_D;
      const offset=HDR+((targetDay-1)*(ROW_H+1))-80; // scroll so today is near top
      setTimeout(()=>{if(scrollRef.current)scrollRef.current.scrollTop=Math.max(0,offset);},100);
    }
  },[monthIdx]);

  function getWeekDaysInMonth(day){
    const w=getWeekForDay(month.m,day); if(!w) return [];
    const days=[]; let[cm,cd]=[...w.start]; const[em,ed]=w.end;
    for(let i=0;i<7;i++){
      if(cm===month.m) days.push(cd);
      if(cm===em&&cd===ed) break;
      const mI=MONTHS_ARR.find(x=>x.m===cm);
      if(mI&&cd>=mI.days){cm++;cd=1;}else cd++;
    }
    return days;
  }
  function trkGoalMet(code,day){
    const wdays=getWeekDaysInMonth(day);
    return wdays.filter(d=>data.grid[code]?.[d]).length>=(trkGoals[code]||1);
  }

  // Sticky header height: group row (14px) + code row (18px) = 32px
  const HDR_GRP=14, HDR_CODE=18, HDR_TOTAL=HDR_GRP+HDR_CODE;

  return (
    <div style={{position:"relative"}}>
      {/* HAT Picker bottom sheet */}
      {picker&&(()=>{
        const isEx=picker.type==='ex';
        const pool=isEx?EXTRA_ACTIVE:LIB_TAGS;
        const selected=isEx?(data.extraHats||{})[picker.day]||[]:(data.libHats||{})[picker.day]||[];
        return (
          <div style={{position:"fixed",inset:0,zIndex:200,display:"flex",alignItems:"flex-end"}} onClick={()=>setPicker(null)}>
            <div onClick={e=>e.stopPropagation()} style={{
              width:"100%",maxWidth:430,margin:"0 auto",
              background:"#fff",borderRadius:"16px 16px 0 0",
              padding:"12px 14px 28px",boxShadow:"0 -4px 24px rgba(0,0,0,.15)",
            }}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div>
                  <div style={{fontSize:10,fontWeight:900,color:"#111",letterSpacing:1}}>
                    {isEx?"EXTRA ACTIVE":"LIBRARY TAGS"} · {month.short} {picker.day}
                  </div>
                  {selected.length>0&&<div style={{fontSize:8,color:"#aaa",marginTop:2}}>{selected.join(", ")}</div>}
                </div>
                <button onClick={()=>setPicker(null)} style={{background:"none",border:"none",fontSize:20,color:"#aaa",cursor:"pointer",padding:"0 6px"}}>×</button>
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {pool.map(h=>{
                  const on=selected.includes(h.code);
                  return (
                    <button key={h.code} onClick={()=>{isEx?toggleExtraHat(month.m,picker.day,h.code):toggleLibHat(month.m,picker.day,h.code);}} style={{
                      padding:"6px 10px",borderRadius:20,
                      border:`2px solid ${on?h.color:"#e0e0e0"}`,
                      background:on?h.color+"22":"#f9f9f9",
                      cursor:"pointer",fontFamily:"inherit",
                      display:"flex",alignItems:"center",gap:5,
                    }}>
                      <span style={{fontSize:11,fontWeight:900,color:on?h.color:"#aaa"}}>{h.code}</span>
                      <span style={{fontSize:8,color:on?h.color+"bb":"#ccc"}}>{h.label}</span>
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        );
      })()}

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <NBtn onClick={()=>setMonthIdx(x=>Math.max(0,x-1))} on={monthIdx>0}>‹</NBtn>
        <span style={{fontSize:16,fontWeight:900,color:"#111"}}>{month.name} <span style={{fontSize:9,color:"#aaa",fontWeight:400,letterSpacing:2}}>2026</span></span>
        <NBtn onClick={()=>setMonthIdx(x=>Math.min(2,x+1))} on={monthIdx<2}>›</NBtn>
      </div>

      {/* Weekly goal panel */}
      <div style={{marginBottom:8}}>
        <button onClick={()=>setShowGoals(x=>!x)} style={{background:"none",border:"1px solid #ddd",borderRadius:16,padding:"4px 12px",fontSize:9,letterSpacing:2,color:"#666",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>
          {showGoals?"▲ HIDE GOALS":"▼ WEEKLY GOALS"}
        </button>
        {showGoals&&(
          <div style={{marginTop:6,background:"#fff",border:"1px solid #e0e0e0",borderRadius:8,padding:"8px 10px"}}>
            <div style={{fontSize:8,color:"#aaa",letterSpacing:2,marginBottom:6}}>TRACKING — TIMES PER WEEK</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {TRK_ALL.map(h=>(
                <div key={h.code} style={{display:"flex",alignItems:"center",gap:4,background:"#f8f8f8",borderRadius:8,padding:"3px 6px"}}>
                  <span style={{fontSize:10,fontWeight:800,color:"#444",minWidth:22}}>{h.code}</span>
                  <Cb bg="#e0e0e0" col="#444" onClick={()=>adjustGoal(h.code,-1)}>−</Cb>
                  <span style={{fontSize:12,fontWeight:900,color:"#111",minWidth:14,textAlign:"center"}}>{trkGoals[h.code]||1}</span>
                  <Cb bg="#444" col="#fff" onClick={()=>adjustGoal(h.code,1)}>+</Cb>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      <div style={{borderRadius:8,border:"1px solid #e0e0e0",overflow:"hidden"}}>
        <div ref={scrollRef} style={{overflowX:"auto",overflowY:"auto",maxHeight:"62vh",WebkitOverflowScrolling:"touch",scrollPaddingTop:"32px",overscrollBehavior:"contain"}}>
          <div style={{minWidth:totalW,position:"relative"}}>

            {/* ── STICKY HEADER WRAPPER ── */}
            <div style={{position:"sticky",top:0,zIndex:12,background:"#fff",borderBottom:"2px solid #ccc"}}>

              {/* ROW 1: Group labels */}
              <div style={{display:"flex",height:HDR_GRP}}>
                <div style={{width:COL_DAY,flexShrink:0}}/>
                <div style={{width:COL_EN,flexShrink:0}}/>
                <div style={{width:COL_MOOD,flexShrink:0,background:"#ffffff",border:"1px solid #d0d0d0",borderBottom:"none",display:"flex",alignItems:"center",justifyContent:"center",fontSize:6,fontWeight:900,color:"#666666",letterSpacing:.5}}>MOOD</div>
                {GROUPS.map((grp,gi)=>{
                  const w=(grp.end-grp.start+1)*C;
                  return (
                    <div key={gi} style={{
                      width:w,flexShrink:0,
                      background:grp.bg,
                      border:`1px solid ${grp.bdr}`,borderBottom:"none",
                      borderLeft:gi===0?`1px solid ${grp.bdr}`:`2px solid ${grp.bdr}`,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:7,fontWeight:900,color:grp.color,letterSpacing:1,
                      overflow:"hidden",
                    }}>{grp.label}</div>
                  );
                })}
                <div style={{width:COL_PCT,flexShrink:0}}/>
                <div style={{width:COL_EX,flexShrink:0,background:"#ede9fe",border:"1px solid #c4b5fd",borderBottom:"none",display:"flex",alignItems:"center",justifyContent:"center",fontSize:6,fontWeight:900,color:"#6d28d9",letterSpacing:.5}}>EX</div>
                <div style={{width:COL_LB,flexShrink:0,background:"#dcfce7",border:"1px solid #86efac",borderBottom:"none",display:"flex",alignItems:"center",justifyContent:"center",fontSize:6,fontWeight:900,color:"#15803d",letterSpacing:.5}}>LIB</div>
              </div>

              {/* ROW 2: HAT codes */}
              <div style={{display:"flex",height:HDR_CODE}}>
                <div style={{width:COL_DAY,flexShrink:0}}/>
                <div style={{width:COL_EN,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9}}>⚡</div>
                <div style={{width:COL_MOOD,flexShrink:0,height:HDR_CODE,display:"flex",alignItems:"center",justifyContent:"center",background:"#ffffff",borderLeft:"1px solid #d0d0d0",borderBottom:"1px solid #d0d0d0",fontSize:7,fontWeight:800,color:"#666666"}}>😊</div>
                {SECTION_META.map(meta=>{
                  const {h,sec,isFirstInGrp}=meta;
                  return (
                    <div key={h.code} style={{
                      width:C,flexShrink:0,height:HDR_CODE,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      background:sec.bg,
                      borderLeft:isFirstInGrp?`2px solid ${sec.bdr}`:`1px solid ${sec.bdr}88`,
                      fontSize:7,fontWeight:800,color:sec.color,
                    }}>
                      {h.code==="RJ2"?"R2":h.code}
                    </div>
                  );
                })}
                <div style={{width:COL_PCT,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:"#1b5e20",fontWeight:800,borderLeft:"2px solid #ddd"}}>%</div>
                <div style={{width:COL_EX,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:6,color:"#6d28d9",fontWeight:800,borderLeft:"2px solid #c4b5fd",background:"#f5f3ff",height:HDR_CODE}}>act</div>
                <div style={{width:COL_LB,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:6,color:"#15803d",fontWeight:800,borderLeft:"1px solid #86efac",background:"#f0fdf4",height:HDR_CODE}}>lib</div>
              </div>
            </div>

            {/* ── DATA ROWS ── */}
            {DAYS.map(day=>{
              const p=top3pct(data,day); const e=data.energy[day];
              const isT=isCur&&day===TODAY_D;
              const isPast=isCur?day<TODAY_D:month.m<TODAY_M;
              const wk=getWeekForDay(month.m,day);
              const rowBg=isT?"#dbeafe":day%2===0?"#f9f9f9":"#fff";

              // Week START banner — shown BEFORE first day of each week (that starts in this month)
              const wkStartW=(()=>{
                if(!wk) return null;
                const [sm,sd]=wk.start;
                return (sm===month.m&&sd===day)?wk:null;
              })();
              // Summary of previous week (shown in the start banner of W2+)
              const prevWkSummary=wkStartW&&wkStartW.n>1?(()=>{
                const prevDays=getWeekDaysInMonth(day-1);
                const pcts=prevDays.map(d=>top3pct(data,d));
                const avg=prevDays.length?Math.round(pcts.reduce((a,b)=>a+b,0)/prevDays.length):0;
                return {avg};
              })():null;

              return (
                <div key={day}>
                  {wkStartW&&(
                    <div style={{display:"flex",alignItems:"center",height:12,background:"#ebebeb",borderTop:"2px solid #333",borderBottom:"1px solid #aaa"}}>
                      <div style={{width:COL_DAY+COL_EN,flexShrink:0,paddingLeft:4,fontSize:7,fontWeight:900,color:"#222",letterSpacing:1}}>W{wkStartW.n}</div>
                      {prevWkSummary&&(
                        <div style={{display:"flex",gap:8,paddingLeft:2}}>
                          <span style={{fontSize:6,color:"#555"}}>prev <span style={{color:"#16a34a",fontWeight:800}}>{prevWkSummary.avg}%</span></span>
                        </div>
                      )}
                    </div>
                  )}
                  <div style={{
                    display:"flex",alignItems:"stretch",
                    background:rowBg,
                    borderLeft:isT?"3px solid #1976d2":"3px solid transparent",
                    borderBottom:"1px solid #ebebeb",
                    height:C,
                  }}>
                    {/* Day number — tap to jump to Today */}
                    <div onClick={()=>{setViewDay(day);setViewM(month.m);setTabIdx(0);}} style={{
                      width:COL_DAY-3,flexShrink:0,
                      display:"flex",alignItems:"center",justifyContent:"flex-end",
                      paddingRight:4,
                      fontSize:10,fontWeight:isT?900:500,
                      color:isT?"#1565c0":"#555",
                      cursor:"pointer",
                    }}>{day}</div>

                    {/* Energy */}
                    <div onClick={()=>cycleEnergy(month.m,day)} style={{
                      width:COL_EN,flexShrink:0,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      cursor:"pointer",fontSize:e==="▲▲"?8:e==="●"?12:10,fontWeight:800,
                      color:e?ecol(e):"#ddd",
                      letterSpacing:e==="▲▲"?-2:0,
                    }}>
                      {e||"·"}
                    </div>

                    {/* Mood 1-10 */}
                    {(()=>{
                      const mv=data.mood?.[day];
                      return (
                        <div onClick={()=>cycleMood(month.m,day)} style={{
                          width:COL_MOOD,flexShrink:0,height:C,
                          display:"flex",alignItems:"center",justifyContent:"center",
                          cursor:"pointer",background:"#ffffff",
                          borderLeft:"1px solid #d0d0d0",

        {TIMER_CONFIGS.map((cfg,i)=>{
          const t=timers[i];const pct=1-t.timeLeft/(cfg.min*60);
          const r=i===0?50:34;const sz=i===0?112:80;const sc=2*Math.PI*r;

            <div key={i} style={{background:"#fff",borderRadius:14,border:`2px solid ${t.running?cfg.color:t.timeLeft===0?"#2e7d32":"#e8e8e8"}`,padding:10,display:"flex",flexDirection:"column",alignItems:"center",gap:6,gridColumn:i===0?"1/3":"auto"}}>

                  <circle cx={sz/2} cy={sz/2} r={r} fill="none"
                    stroke={t.timeLeft===0?"#2e7d32":t.running?cfg.color:"#ddd"}
                    strokeWidth={i===0?7:5} strokeDasharray={sc} strokeDashoffset={sc*(1-pct)}

                <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>

                  <div style={{fontSize:i===0?9:7,color:t.running?cfg.color:"#bbb",fontWeight:700,marginTop:2}}>

                  </div>
                </div>
              </div>
              <div style={{fontSize:i===0?11:9,fontWeight:800,color:cfg.color,letterSpacing:1}}>{cfg.label.toUpperCase()}</div>
              <div style={{fontSize:9,color:"#888",fontWeight:600}}>×{t.sessions} sessions</div>
              <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap",justifyContent:"center"}}>
                <Cb bg="#e8e8e8" col="#555" onClick={()=>prevIv(i)}>−</Cb>
                {i===0&&[[-5,"−5"],[- 1,"−1"],[1,"+1"],[5,"+5"]].map(([d,l])=>(
                  <button key={l} onClick={()=>adjustT(0,d*60)} style={{background:"#f5f5f5",border:"1px solid #ddd",color:"#333",borderRadius:16,padding:"3px 7px",cursor:"pointer",fontSize:10,fontFamily:"inherit",fontWeight:700}}>{l}m</button>
                ))}
                <Cb bg={cfg.color} col="#fff" onClick={()=>nextIv(i)}>+</Cb>
                <Cb bg="#e8e8e8" col="#888" onClick={()=>resetTimer(i)}>↺</Cb>
              </div>
            </div>
          );
        })}
      </div>

      {/* Sessions summary */}
      <div style={{background:"#fff",borderRadius:10,border:"1px solid #e0e0e0",padding:"12px",marginBottom:12}}>
        <div style={{fontSize:9,color:"#888",letterSpacing:3,marginBottom:8,fontWeight:700}}>TODAY SESSIONS</div>
        <div style={{display:"flex",gap:6}}>
          {TIMER_CONFIGS.map((cfg,i)=>(
            <div key={i} style={{flex:1,textAlign:"center",background:"#f8f8f8",borderRadius:8,padding:"8px 4px",border:`1px solid ${timers[i].sessions>0?cfg.color+"44":"#e8e8e8"}`}}>
              <div style={{fontSize:22,fontWeight:900,color:timers[i].sessions>0?cfg.color:"#ddd"}}>{timers[i].sessions}</div>
              <div style={{fontSize:8,color:"#888",fontWeight:700,letterSpacing:1}}>{cfg.label}</div>

      <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:"6px 12px",marginBottom:8}}>
        <div style={{fontSize:8,color:"#bbb",letterSpacing:2}}>HABIT COUNTER → syncs to APR {TODAY_D}</div>
      </div>
      {HAT_GROUPS.map((grp,gi)=>(
        <div key={gi} style={{background:"#fff",borderRadius:10,border:"1px solid #e0e0e0",marginBottom:10,overflow:"hidden"}}>
          <div style={{padding:"6px 12px",background:"#f8f8f8",borderBottom:"1px solid #e8e8e8",fontSize:9,letterSpacing:3,color:grp.color,fontWeight:800}}>{grp.label}</div>
          {grp.hats.map(h=><HatCounter key={h.code} h={h} count={hatCounts[h.code]||0} color={grp.color} onPlus={()=>hatPlus(h.code)} onMinus={()=>hatMinus(h.code)}/>)}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [tabIdx,setTabIdx]=useState(0);
  const [dragX,setDragX]=useState(0);
  const [isDrag,setIsDrag]=useState(false);
  const tsX=useRef(null),tsY=useRef(null),wRef=useRef(390);

  // Rotating mantra
  const [mantraIdx,setMantraIdx]=useState(()=>Math.floor(Math.random()*ALL_QUOTES.length));
  const nextMantra=()=>setMantraIdx(i=>(i+1)%ALL_QUOTES.length);

  const [monthIdx,setMonthIdx]=useState(0);
  const [weekIdx,setWeekIdx]=useState(()=>{
    const i=Q2_WEEKS.findIndex(w=>TODAY_M*100+TODAY_D>=w.start[0]*100+w.start[1]&&TODAY_M*100+TODAY_D<=w.end[0]*100+w.end[1]);
    return i>=0?i:0;
  });
  const [viewDay,setViewDay]=useState(TODAY_D);
  const [viewM,setViewM]=useState(TODAY_M);

  // localStorage helpers
  const LS_VERSION = "lifeos_v8";
  function lsGet(key, fallback) {
    try { const v=localStorage.getItem(LS_VERSION+"_"+key); return v?JSON.parse(v):fallback; } catch(e){ return fallback; }
  }
  function lsSet(key, val) {
    try { localStorage.setItem(LS_VERSION+"_"+key, JSON.stringify(val)); } catch(e){}
  }

  // Persisted state: allData, hatCounts, weekAssess
  const [allData,setAllData]=useState(()=>lsGet("allData", MONTHS_ARR.map(m=>initMonth(m.days))));
  const [hatCounts,setHatCounts]=useState(()=>lsGet("hatCounts", (()=>{const o={};ALL_HATS.forEach(h=>{o[h.code]=0;});return o;})()));
  const [weekAssess,setWeekAssess]=useState(()=>lsGet("weekAssess",{priorities:["","","","",""]}));
  const [timers,setTimers]=useState(()=>TIMER_CONFIGS.map(c=>({timeLeft:c.min*60,running:false,sessions:0})));
  const ivsRef=useRef([null,null,null,null]);

  // Auto-save to localStorage whenever data changes
  useEffect(()=>lsSet("allData",allData),[allData]);
  useEffect(()=>lsSet("hatCounts",hatCounts),[hatCounts]);
  useEffect(()=>lsSet("weekAssess",weekAssess),[weekAssess]);

  const setAssess=(field,val)=>setWeekAssess(p=>({...p,[field]:val}));
  const setPriority=(i,val)=>setWeekAssess(p=>({...p,priorities:p.priorities.map((x,j)=>j===i?val:x)}));

  const beep=useCallback(()=>{
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      [[880,0],[1100,.22],[1320,.44]].forEach(([f,t])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=f;o.type="sine";
        g.gain.setValueAtTime(.5,ctx.currentTime+t);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.3);
        o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.35);
      });
    }catch(e){}
  },[]);

  const runKey=timers.map(t=>t.running?"1":"0").join("");
  useEffect(()=>{
    timers.forEach((t,i)=>{
      clearInterval(ivsRef.current[i]);
      if(t.running&&t.timeLeft>0){
        ivsRef.current[i]=setInterval(()=>{
          setTimers(prev=>{
            const nx=[...prev];
            if(nx[i].timeLeft<=1){clearInterval(ivsRef.current[i]);beep();nx[i]={...nx[i],timeLeft:0,running:false,sessions:nx[i].sessions+1};}
            else nx[i]={...nx[i],timeLeft:nx[i].timeLeft-1};
            return nx;
          });
        },1000);
      }
    });
    return()=>ivsRef.current.forEach(iv=>clearInterval(iv));
  },[runKey,beep]);

  const toggleTimer=i=>setTimers(p=>{const n=[...p];n[i]={...n[i],running:!n[i].running};return n;});
  const resetTimer=i=>{clearInterval(ivsRef.current[i]);setTimers(p=>{const n=[...p];n[i]={timeLeft:TIMER_CONFIGS[i].min*60,running:false,sessions:n[i].sessions};return n;});};
  const nextIv=i=>{clearInterval(ivsRef.current[i]);beep();setTimers(p=>{const n=[...p];n[i]={timeLeft:TIMER_CONFIGS[i].min*60,running:false,sessions:n[i].sessions+1};return n;});};
  const prevIv=i=>setTimers(p=>{const n=[...p];n[i]={...n[i],sessions:Math.max(0,n[i].sessions-1)};return n;});
  const adjustT=(i,ds)=>setTimers(p=>{const n=[...p];n[i]={...n[i],timeLeft:Math.max(0,n[i].timeLeft+ds)};return n;});

  const onTS=e=>{
    const tag=(e.target.tagName||"").toLowerCase();
    if(["input","textarea","button","label","select"].includes(tag)){tsX.current=null;return;}
    tsX.current=e.touches[0].clientX;tsY.current=e.touches[0].clientY;wRef.current=e.currentTarget.offsetWidth||390;
  };
  const onTM=e=>{
    if(tsX.current===null)return;
    const dx=e.touches[0].clientX-tsX.current,dy=e.touches[0].clientY-tsY.current;
    if(Math.abs(dx)>Math.abs(dy)){e.preventDefault();setIsDrag(true);setDragX(dx);}
  };
  const onTE=e=>{
    if(!isDrag){tsX.current=null;return;}
    const dx=e.changedTouches[0].clientX-tsX.current;
    if(Math.abs(dx)>55){if(dx<0&&tabIdx<1)setTabIdx(x=>x+1);if(dx>0&&tabIdx>0)setTabIdx(x=>x-1);}
    setIsDrag(false);setDragX(0);tsX.current=null;
  };
  const slideX=i=>(i-tabIdx)*100+(isDrag?(dragX/wRef.current)*100:0);

  const getMI=m=>MONTHS_ARR.findIndex(x=>x.m===m);
  const mutData=(m,fn)=>setAllData(p=>{const c=[...p];c[getMI(m)]=fn(p[getMI(m)]);return c;});
  const cycleCell=(code,m,day)=>mutData(m,d=>({...d,grid:{...d.grid,[code]:{...d.grid[code],[day]:nextSt(d.grid[code][day])}}}));
  const cycleEnergy=(m,day,directVal)=>{
    if(directVal!==undefined){
      mutData(m,d=>({...d,energy:{...d.energy,[day]:directVal}}));
    } else {
      const cur=allData[getMI(m)]?.energy?.[day];
      const idx=cur?ENERGY.findIndex(e=>e.sym===cur):-1;
      mutData(m,d=>({...d,energy:{...d.energy,[day]:idx>=ENERGY.length-1?null:ENERGY[idx+1].sym}}));
    }
  };
  const cycleMood=(m,day,directVal)=>{
    if(directVal!==undefined){
      mutData(m,d=>({...d,mood:{...(d.mood||{}),[day]:directVal===0?null:directVal}}));
    } else {
      const cur=allData[getMI(m)]?.mood?.[day];
      const next=cur===null||cur===undefined?1:cur>=10?null:cur+1;
      mutData(m,d=>({...d,mood:{...(d.mood||{}),[day]:next}}));
    }
  };
  const setTask=(m,day,f,v)=>mutData(m,d=>({...d,tasks:{...d.tasks,[day]:{...d.tasks[day],[f]:v}}}));
  const setNote=(m,day,v)=>mutData(m,d=>({...d,notes:{...(d.notes||{}),[day]:v}}));
  const toggleExtraHat=(m,day,code)=>mutData(m,d=>{const cur=(d.extraHats||{})[day]||[];const next=cur.includes(code)?cur.filter(c=>c!==code):[...cur,code];return {...d,extraHats:{...(d.extraHats||{}),[day]:next}};});
  const toggleLibHat=(m,day,code)=>mutData(m,d=>{const cur=(d.libHats||{})[day]||[];const next=cur.includes(code)?cur.filter(c=>c!==code):[...cur,code];return {...d,libHats:{...(d.libHats||{}),[day]:next}};});

  const hatPlus=code=>{
    const nc=(hatCounts[code]||0)+1;
    setHatCounts(p=>({...p,[code]:nc}));
    const mi=getMI(TODAY_M);
    setAllData(prev=>{const c=[...prev];const ns=nc===1?"x":"box";c[mi]={...c[mi],grid:{...c[mi].grid,[code]:{...c[mi].grid[code],[TODAY_D]:ns}}};return c;});
  };
  const hatMinus=code=>{
    const nc=Math.max(0,(hatCounts[code]||0)-1);
    setHatCounts(p=>({...p,[code]:nc}));
    const mi=getMI(TODAY_M);
    setAllData(prev=>{const c=[...prev];const ns=nc===0?null:nc===1?"x":"box";c[mi]={...c[mi],grid:{...c[mi].grid,[code]:{...c[mi].grid[code],[TODAY_D]:ns}}};return c;});
  };

  // JSON backup/restore
  const saveJSON=()=>{
    const payload={allData,weekAssess,hatCounts,savedAt:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    const d=new Date();const ds=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    a.href=url;a.download="lifeos-backup-"+ds+".json";
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  };
  const loadJSON=(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.allData){setAllData(d.allData);lsSet("allData",d.allData);}
        if(d.weekAssess){setWeekAssess(d.weekAssess);lsSet("weekAssess",d.weekAssess);}
        if(d.hatCounts){setHatCounts(d.hatCounts);lsSet("hatCounts",d.hatCounts);}
        alert("Data restored from "+file.name);
      }catch(err){alert("Error reading file: "+err.message);}
    };
    reader.readAsText(file);
    e.target.value="";
  };

  const weekDays=()=>{
    const w=Q2_WEEKS[weekIdx];const days=[];let[cm,cd]=[...w.start];const[em,ed]=w.end;
    for(let i=0;i<7;i++){
      days.push({m:cm,d:cd});
      if(cm===em&&cd===ed)break;
      const mI=MONTHS_ARR.find(x=>x.m===cm);
      if(mI&&cd>=mI.days){cm++;cd=1;}else cd++;
    }
    return days;
  };

  // Export week data for Claude
  const [showExport,setShowExport]=useState(false);
  const buildExport=()=>{
    const wk=Q2_WEEKS[weekIdx];
    const wdays=weekDays();
    const M_NAME={4:"APR",5:"MAY",6:"JUN"};
    let out=`LIFE OS — WEEK ${wk.n} EXPORT (${wk.sm} ${wk.start[1]}–${wk.em} ${wk.end[1]})\n`;
    out+=`Generated: ${M_NAME[TODAY_M]||TODAY_M} ${TODAY_D}\n\n`;

    // TOP 3 per day + tasks
    out+=`TOP 3 (PW·PB·PA) — DAILY:\n`;
    wdays.forEach(({m,d})=>{
      const mi=getMI(m); const data=allData[mi]; if(!data) return;
      const pct=top3pct(data,d);
      const en=data.energy?.[d]||"·";
      const mood=data.mood?.[d]||"·";
      const marks=TOP3.map(h=>data.grid[h.code]?.[d]?"✓":"✗").join(" ");
      out+=`  ${M_NAME[m]||m} ${d}: ${marks} [${pct}%] energy:${en} mood:${mood}\n`;
      // Daily tasks
      const t=data.tasks?.[d];
      if(t){["t1","t2","t3"].forEach((f,i)=>{if(t[f]?.trim()) out+=`    T${i+1}: ${t[f]}\n`;});}
    });

    // HAT grid summary per week
    out+=`\nHAT WEEK SUMMARY:\n`;
    ALL_HATS.forEach(h=>{
      const filled=wdays.filter(({m,d})=>{
        const mi=getMI(m); return allData[mi]?.grid?.[h.code]?.[d];
      }).length;
      if(filled>0) out+=`  ${h.code}: ${filled}/${wdays.length} days\n`;
    });

    // Week priorities
    const pris=(weekAssess?.priorities||[]).filter(p=>p.trim());
    if(pris.length){
      out+=`\nWEEK PRIORITIES:\n`;
      pris.forEach((p,i)=>{ out+=`  ${i+1}. ${p}\n`; });
    }

    out+=`\n— end of Week ${wk.n} export —`;

    // Extra + Library HATs for the week
    const exLines=[], lbLines=[];
    wdays.forEach(({m,d})=>{
      const mi=getMI(m); const dd=allData[mi]; if(!dd) return;
      const ex=(dd.extraHats||{})[d]||[];
      const lb=(dd.libHats||{})[d]||[];
      if(ex.length) exLines.push(`  ${M_NAME[m]||m} ${d}: ${ex.join(", ")}`);
      if(lb.length) lbLines.push(`  ${M_NAME[m]||m} ${d}: ${lb.join(", ")}`);
    });
    if(exLines.length){out=out.replace('— end of Week',`EXTRA ACTIVE HATS:\n${exLines.join('\n')}\n\n— end of Week`);}
    if(lbLines.length){out=out.replace('— end of Week',`LIBRARY TAGS:\n${lbLines.join('\n')}\n\n— end of Week`);}

    return out;
  };

  return (
    <div style={{minHeight:"100vh",background:"#f4f4f2",fontFamily:"'SF Mono','Courier New',monospace",maxWidth:430,margin:"0 auto",overflow:"hidden"}}>
      <div style={{background:"#fff",borderBottom:"2px solid #111",padding:"12px 16px 0",position:"sticky",top:0,zIndex:30}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:20,fontWeight:900,color:"#111",letterSpacing:-1}}>26Q2 <span style={{fontSize:9,color:"#aaa",fontWeight:400,letterSpacing:3}}>LIFE OS</span></div>
          <div style={{fontSize:10,color:"#777",fontWeight:700}}>{["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"][TODAY_M-1]} {TODAY_D} · W{Q2_WEEKS.find(w=>TODAY_M*100+TODAY_D>=w.start[0]*100+w.start[1]&&TODAY_M*100+TODAY_D<=w.end[0]*100+w.end[1])?.n||"?"}</div>
        </div>
        {/* Rotating mantra — tap for next */}
        <div onClick={nextMantra} style={{
          margin:"7px 0 0",padding:"5px 8px",
          background:"#f8f8f8",borderRadius:6,cursor:"pointer",
          borderLeft:"2px solid #111",
          display:"flex",alignItems:"flex-start",gap:6,
        }}>
          {ALL_QUOTES[mantraIdx]?.hat&&(()=>{
            const cat=ALL_QUOTES[mantraIdx].hat[0]; // P, M, R, D, S, L, C
            const tagColors={
              P:{bg:"#ede7f6",color:"#5e1b8b"},
              M:{bg:"#e3f2fd",color:"#1565c0"},
              R:{bg:"#fff3e0",color:"#bf5000"},
              D:{bg:"#efebe9",color:"#4e342e"},
              S:{bg:"#fffde7",color:"#f57f17"},
              L:{bg:"#f5f5f5",color:"#546e7a"},
              C:{bg:"#e8f5e9",color:"#2e7d32"},
            };
            const tc=tagColors[cat]||{bg:"#f0f0f0",color:"#555"};
            return <span style={{fontSize:7,fontWeight:900,color:tc.color,background:tc.bg,borderRadius:3,padding:"1px 5px",flexShrink:0,marginTop:2,fontFamily:"'SF Mono','Courier New',monospace"}}>{ALL_QUOTES[mantraIdx].hat}</span>;
          })()}
          <span style={{fontSize:8.5,color:"#444",fontStyle:"italic",fontWeight:500,lineHeight:1.4,fontFamily:"Georgia,serif",flex:1}}>
            "{ALL_QUOTES[mantraIdx]?.text}"
          </span>
          <span style={{fontSize:6,color:"#ccc",flexShrink:0,marginTop:2}}>tap›</span>
        </div>
        <div style={{display:"flex",marginTop:8}}>
          {TABS.map((t,i)=>(
            <button key={t} onClick={()=>setTabIdx(i)} style={{flex:1,background:"none",border:"none",borderBottom:tabIdx===i?"3px solid #111":"3px solid transparent",color:tabIdx===i?"#111":"#aaa",fontSize:10,letterSpacing:1.5,padding:"7px 0 9px",cursor:"pointer",fontFamily:"inherit",fontWeight:tabIdx===i?800:400,textTransform:"uppercase"}}>{t}</button>
          ))}
        </div>
      </div>

      <div style={{position:"relative",overflow:"hidden"}} onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}>
        {TABS.map((t,i)=>(
          <div key={t} style={{position:i===tabIdx?"relative":"absolute",top:0,left:0,width:"100%",transform:`translateX(${slideX(i)}%)`,transition:isDrag?"none":"transform .28s cubic-bezier(.4,0,.2,1)",willChange:"transform",padding:"14px 12px 40px",boxSizing:"border-box",minHeight:"80vh"}}>
            {t==="today"&&<TodayPanel allData={allData} getMI={getMI} viewDay={viewDay} viewM={viewM} setViewDay={setViewDay} setViewM={setViewM} weekIdx={weekIdx} setWeekIdx={setWeekIdx} weekDays={weekDays} cycleCell={cycleCell} cycleEnergy={cycleEnergy} cycleMood={cycleMood} setTask={setTask} setNote={setNote} weekAssess={weekAssess} setAssess={setAssess} setPriority={setPriority} toggleExtraHat={toggleExtraHat} toggleLibHat={toggleLibHat}/>}
            {t==="month"&&<MonthPanel monthIdx={monthIdx} setMonthIdx={setMonthIdx} allData={allData} cycleCell={cycleCell} cycleEnergy={cycleEnergy} cycleMood={cycleMood} setTabIdx={setTabIdx} setViewDay={setViewDay} setViewM={setViewM} toggleExtraHat={toggleExtraHat} toggleLibHat={toggleLibHat}/>}

          </div>
        ))}
      </div>

      <div style={{padding:"8px 12px 16px",display:"flex",gap:5,justifyContent:"center",flexWrap:"nowrap",alignItems:"center"}}>
        <button onClick={()=>setShowExport(x=>!x)} style={{
          background:"#111",color:"#fff",border:"none",borderRadius:20,
          padding:"7px 12px",fontSize:8,letterSpacing:1.5,cursor:"pointer",
          fontFamily:"'SF Mono','Courier New',monospace",fontWeight:700,whiteSpace:"nowrap",
        }}>↗ EXPORT W{Q2_WEEKS[weekIdx]?.n}</button>
        <button onClick={saveJSON} style={{
          background:"#1b5e20",color:"#fff",border:"none",borderRadius:20,
          padding:"7px 12px",fontSize:8,letterSpacing:1.5,cursor:"pointer",
          fontFamily:"'SF Mono','Courier New',monospace",fontWeight:700,whiteSpace:"nowrap",
        }}>⬇ SAVE</button>
        <label style={{
          background:"#1565c0",color:"#fff",border:"none",borderRadius:20,
          padding:"7px 12px",fontSize:8,letterSpacing:1.5,cursor:"pointer",
          fontFamily:"'SF Mono','Courier New',monospace",fontWeight:700,display:"inline-block",whiteSpace:"nowrap",
        }}>
          ⬆ LOAD
          <input type="file" accept=".json" onChange={loadJSON} style={{display:"none"}}/>
        </label>
        <button onClick={()=>{
          if('serviceWorker' in navigator){
            navigator.serviceWorker.getRegistrations().then(regs=>{
              regs.forEach(r=>r.update());
              setTimeout(()=>window.location.reload(true),800);
            });
          } else { window.location.reload(true); }
        }} style={{
          background:"#7c3aed",color:"#fff",border:"none",borderRadius:20,
          padding:"7px 12px",fontSize:8,letterSpacing:1.5,cursor:"pointer",
          fontFamily:"'SF Mono','Courier New',monospace",fontWeight:700,whiteSpace:"nowrap",
        }}>⟳ UPDATE</button>
      </div>

      {showExport&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:100,display:"flex",alignItems:"flex-end"}}>
          <div style={{width:"100%",background:"#fff",borderRadius:"16px 16px 0 0",padding:"16px",maxHeight:"70vh",display:"flex",flexDirection:"column"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontSize:11,fontWeight:900,letterSpacing:2}}>EXPORT — PASTE INTO CLAUDE</span>
              <button onClick={()=>setShowExport(false)} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#999"}}>×</button>
            </div>
            <textarea
              readOnly
              value={buildExport()}
              style={{flex:1,border:"1px solid #e0e0e0",borderRadius:8,padding:"10px",fontSize:9,fontFamily:"'SF Mono','Courier New',monospace",color:"#333",resize:"none",lineHeight:1.6,background:"#fafafa"}}
              onFocus={e=>e.target.select()}
            />
            <button onClick={()=>{
              const txt=buildExport();
              if(navigator.clipboard){navigator.clipboard.writeText(txt);}
              else{const t=document.createElement("textarea");t.value=txt;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);}
              setShowExport(false);
            }} style={{
              marginTop:10,background:"#111",color:"#fff",border:"none",borderRadius:10,
              padding:"12px",fontSize:10,letterSpacing:2,cursor:"pointer",fontWeight:700,
              fontFamily:"'SF Mono','Courier New',monospace",
            }}>COPY TO CLIPBOARD</button>
          </div>
        </div>
      )}

      <div style={{textAlign:"center",padding:"0 0 16px",fontSize:8,color:"#ccc",letterSpacing:3}}>BE KONSTANTIN · ONE MOVE = FULL PRESENCE</div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

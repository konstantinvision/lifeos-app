  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>{
        navigator.serviceWorker.register('./sw.js',{updateViaCache:'none'})
          .then(reg=>{
            // Force check for new SW immediately and every 30s
            reg.update();
            setInterval(()=>reg.update(),30000);
            reg.addEventListener('updatefound',()=>{
              const nw=reg.installing;
              if(!nw) return;
              nw.addEventListener('statechange',()=>{
                if(nw.state==='installed'){
                  // Always activate immediately — whether or not there's a controller
                  nw.postMessage({type:'SKIP_WAITING'});
                }
              });
            });
          })
          .catch(e=>console.warn('SW reg failed:',e));
        // When new SW takes control, reload to get fresh content
        navigator.serviceWorker.addEventListener('controllerchange',()=>{
          window.location.reload(true);
        });
      });
    }
  </script>

    (function(){
      var LIBS=[
        {name:"React",urls:[
          "https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js",
          "https://unpkg.com/react@18.3.1/umd/react.production.min.js",

          "https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js",
          "https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js",
          "https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"
        ],check:function(){return window.ReactDOM;}},
        {name:"Babel",urls:[
          "https://cdn.jsdelivr.net/npm/@babel/standalone@7.25.6/babel.min.js",
          "https://unpkg.com/@babel/standalone@7.25.6/babel.min.js",
          "https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"
        ],check:function(){return window.Babel;}}
      ];
      function loadOne(lib,done){
        var i=0;
        function attempt(){
          if(lib.check()){done(true);return;}
          if(i>=lib.urls.length){done(false);return;}
          var s=document.createElement("script");
          s.src=lib.urls[i++];
          s.onload=function(){lib.check()?done(true):attempt();};
          s.onerror=attempt;
          document.head.appendChild(s);
        }
        attempt();
      }
      function chain(idx){
        if(idx>=LIBS.length){
          // All loaded. Run the babel script block.
          try{ window.Babel.transformScriptTags(); }
          catch(e){ showFail("Babel failed to process the app: "+e.message); }
          return;
        }
        loadOne(LIBS[idx],function(ok){
          if(!ok){ showFail("Could not load "+LIBS[idx].name+" from any source. Check your internet connection and reload."); return; }
          chain(idx+1);
        });
      }
      function showFail(msg){
        document.getElementById("root").innerHTML=
          '<div style="padding:40px 24px;font-family:-apple-system,system-ui,sans-serif;max-width:420px;margin:0 auto">'+
          '<div style="font-size:18px;font-weight:900;color:#2a2118;margin-bottom:8px">Could not start</div>'+

          '<div style="font-size:11px;color:#b45309;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:10px;margin-bottom:16px">'+msg+'</div>'+
          '<button onclick="location.reload()" style="width:100%;background:#2a2118;color:#fff;border:none;border-radius:10px;padding:14px;font-size:12px;font-weight:800">Reload</button></div>';
      }
      chain(0);
    })();

// Resolve which Q2_WEEKS index contains a given month/day. Returns -1 if none.
function weekIdxForDay(m,d){  const key=m*100+d;
  return Q2_WEEKS.findIndex(w=>key>=w.start[0]*100+w.start[1]&&key<=w.end[0]*100+w.end[1]);
}

}

// Copy text to clipboard without visibly selecting on-screen text (no blue highlight).
function copyText(txt){  try{ if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt); return true; } }catch(e){}
  try{
    const t=document.createElement("textarea");
    t.value=txt; t.style.position="fixed"; t.style.top="-9999px"; t.style.opacity="0";
    document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t);
    return true;
  }catch(e){ return false; }
}

// Download text as a .txt file. Falls back to clipboard copy if download is blocked.
function downloadText(filename,text){
  try{
    const blob=new Blob([text],{type:"text/plain;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=filename; document.body.appendChild(a); a.click();
    document.body.removeChild(a); setTimeout(()=>{try{URL.revokeObjectURL(url);}catch(e){}},1000);
    return true;
  }catch(e){ return copyText(text); }
}

function stMark(st, col) {
  if (!st)           return { ch:"·", c:"#ddd", fw:400, fs:10 };
  if (st === "x")    return { ch:"×", c:col,    fw:900, fs:13 };
  if (st === "box")  return { ch:"⊠", c:col,    fw:900, fs:12 };

  return               { ch:"·", c:"#ddd", fw:400, fs:10 };
}

function fmtT(s) { return `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`; }

function top3pct(data, day) {
  if(!data) return 0;

function weeklyTop3(allData, wdList) {
  let total=0, done=0;
  wdList.forEach(({m,d})=>{

  return total>0?Math.round(done/total*100):0;
}

// Deliberate-tap cell — fires on release, but only if the finger didn't slide (scrolls/grazes won't toggle).
// Feels like a normal tap, just a touch more intentional so accidental marks don't happen.
function HoldCell({onHold,minMs=40,style,title,children}){
  const st=React.useRef(0);const sx=React.useRef(0);const sy=React.useRef(0);const moved=React.useRef(false);
  const begin=(x,y)=>{st.current=Date.now();sx.current=x;sy.current=y;moved.current=false;};
  const fire=()=>{if(!moved.current&&(Date.now()-st.current)>=minMs){onHold();}};
  return (
    <div style={{...style,userSelect:"none",WebkitUserSelect:"none",WebkitTouchCallout:"none"}} title={title}
      onTouchStart={e=>{const c=e.touches[0];begin(c.clientX,c.clientY);}}
      onTouchMove={e=>{const c=e.touches[0];if(Math.abs(c.clientX-sx.current)>16||Math.abs(c.clientY-sy.current)>16)moved.current=true;}}
      onTouchEnd={fire} onTouchCancel={()=>{moved.current=true;}}
      onMouseDown={e=>begin(e.clientX,e.clientY)}
      onMouseUp={e=>{if(Math.abs(e.clientX-sx.current)>16||Math.abs(e.clientY-sy.current)>16)moved.current=true;fire();}}
      onContextMenu={e=>e.preventDefault()}>
      {children}
    </div>
  );
}

            next[m+"-"+d+"-"+slot+"-c"]=true;
          });
          delete next[key];
          migrated=true;
        }
        // Old carry key pattern: "m-d-r" with array value
        const carryMatch=key.match(/^(\d+)-(\d+)-r$/);
        if(carryMatch&&Array.isArray(old[key])){
          const [,m,d]=carryMatch;
          old[key].forEach(idx=>{
            const slot="t"+(idx+1);
            next[m+"-"+d+"-"+slot+"-r"]=true;
          });
          delete next[key];
          migrated=true;
        }
      });
      if(migrated){
        localStorage.setItem("lifeos_v8_taskChecks",JSON.stringify(next));
      }
      return next;
    }catch(e){return {};}
  });
  const saveTaskChecks=(next)=>{setTaskChecks(next);try{localStorage.setItem("lifeos_v8_taskChecks",JSON.stringify(next));}catch(e){}};
  // Key format: "m-d-slot-c" for check, "m-d-slot-r" for carry
  // slot = "t1","t2","t3"... — stays with the slot, not the visual position
  // 🐝 BEE CELEBRATION — canvas overlay when all 3 tasks done
  const beeCanvasRef=useRef(null);
  const beeAnimRef=useRef(null);
  const launchBees=()=>{
    const canvas=beeCanvasRef.current;
    if(!canvas) return;
    canvas.style.display="block";
    const ctx=canvas.getContext("2d");
    const DPR=Math.min(window.devicePixelRatio||1,2);
    const W=window.innerWidth, H=window.innerHeight;
    canvas.width=W*DPR; canvas.height=H*DPR;
    canvas.style.width=W+"px"; canvas.style.height=H+"px";
    ctx.scale(DPR,DPR);
    const DURATION=2800; // ms — same speed on every screen
    const easeOutCubic=t=>1-Math.pow(1-t,3);
    const easeOutBack=t=>{const c=1.70158;return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2);};
    const CONFETTI_COLORS=["#c9a96e","#f4c430","#ffd966","#e07b54","#7c6aad","#4a9d6f","#ff8fab","#fff1a8"];
    const BEES=Array.from({length:22},()=>({
      x:Math.random()*W,
      y:H+30+Math.random()*90,
      vx:(Math.random()-0.5)*2.6,
      vy:-(3.6+Math.random()*3.4),
      size:18+Math.random()*16,
      wobble:Math.random()*Math.PI*2,
      wobbleSpeed:0.055+Math.random()*0.05,
      born:Math.random()*350, // staggered entrance, ms
    }));
    const origins=[{x:W*0.5,y:H*0.62},{x:W*0.18,y:H*0.72},{x:W*0.82,y:H*0.72}];
    const CONFETTI=[];
    origins.forEach((o,oi)=>{
      for(let i=0;i<30;i++){
        const ang=-Math.PI/2+(Math.random()-0.5)*2.0;
        const spd=5.5+Math.random()*7.5;
        CONFETTI.push({
          x:o.x,y:o.y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
          w:5+Math.random()*6,h:8+Math.random()*7,
          color:CONFETTI_COLORS[(Math.random()*CONFETTI_COLORS.length)|0],
          rot:Math.random()*Math.PI*2, vr:(Math.random()-0.5)*0.28,
          born:oi*90, // bursts cascade left to right
        });
      }
    });
    const SPARKLES=Array.from({length:18},()=>({
      x:Math.random()*W, y:H*0.18+Math.random()*H*0.6,
      size:9+Math.random()*14,
      phase:Math.random()*Math.PI*2, speed:0.0045+Math.random()*0.004,
    }));
    const t0=performance.now();
    let last=t0;
    const draw=(now)=>{
      const elapsed=now-t0;
      const dt=Math.min((now-last)/16.667,3); last=now; // 60fps-normalized, capped
      const prog=Math.min(elapsed/DURATION,1);
      ctx.clearRect(0,0,W,H);
      // Confetti — physics scaled by dt, gentle fade in last third
      CONFETTI.forEach(c=>{
        if(elapsed<c.born) return;
        c.x+=c.vx*dt; c.y+=c.vy*dt; c.vy+=0.18*dt; c.vx*=Math.pow(0.995,dt); c.rot+=c.vr*dt;
        const a=prog<0.6?1:Math.max(0,1-easeOutCubic((prog-0.6)/0.4));
        ctx.save();ctx.globalAlpha=a;ctx.translate(c.x,c.y);ctx.rotate(c.rot);
        ctx.fillStyle=c.color;ctx.fillRect(-c.w/2,-c.h/2,c.w,c.h);ctx.restore();
      });
      // Sparkles — time-based twinkle
      SPARKLES.forEach(s=>{
        const tw=(Math.sin(s.phase+elapsed*s.speed)+1)/2;
        let a=tw*0.9; if(prog>0.55)a*=Math.max(0,1-(prog-0.55)/0.45);
        ctx.globalAlpha=a;ctx.font=`${s.size}px serif`;ctx.textAlign="center";
        ctx.fillText("✨",s.x,s.y);
      });
      // Bees — staggered entrance, smooth sway, soft fade
      BEES.forEach(b=>{
        if(elapsed<b.born) return;
        b.x+=(b.vx+Math.sin(b.wobble)*1.25)*dt;
        b.y+=b.vy*dt;
        b.wobble+=b.wobbleSpeed*dt;
        b.vy+=0.03*dt;
        const a=prog<0.55?1:Math.max(0,1-easeOutCubic((prog-0.55)/0.45));
        ctx.save();ctx.globalAlpha=a;ctx.translate(b.x,b.y);
        ctx.rotate(Math.sin(b.wobble*0.7)*0.28);
        ctx.font=`${b.size}px serif`;ctx.textAlign="center";
        ctx.fillText("🐝",0,0);ctx.restore();
      });
      // ALL DONE — soft gold glow, ease-out-back pop, gentle float, smooth fade
      if(prog<0.62){
        const inP=Math.min(1,elapsed/420);
        const scale=0.7+easeOutBack(inP)*0.4;
        const floatY=Math.sin(elapsed*0.0022)*5;
        const ta=prog<0.42?1:Math.max(0,1-easeOutCubic((prog-0.42)/0.2));
        const cx=W/2, cy=H*0.4+floatY;
        ctx.save();ctx.globalAlpha=ta;
        const glow=ctx.createRadialGradient(cx,cy,0,cx,cy,150);
        glow.addColorStop(0,"rgba(201,169,110,0.32)");
        glow.addColorStop(1,"rgba(201,169,110,0)");
        ctx.fillStyle=glow;ctx.fillRect(cx-160,cy-160,320,320);
        ctx.translate(cx,cy);ctx.scale(scale,scale);ctx.textAlign="center";
        ctx.font="900 34px -apple-system,system-ui,sans-serif";
        ctx.shadowColor="rgba(201,169,110,0.5)";ctx.shadowBlur=18;
        ctx.fillStyle="#c9a96e";ctx.fillText("ALL DONE",0,0);
        ctx.shadowBlur=0;
        ctx.font="22px serif";ctx.fillText("🎉",0,34);
        ctx.restore();
      }
      ctx.globalAlpha=1;
      if(elapsed<DURATION) beeAnimRef.current=requestAnimationFrame(draw);
      else { ctx.clearRect(0,0,W,H); canvas.style.display="none"; }
    };
    if(beeAnimRef.current) cancelAnimationFrame(beeAnimRef.current);
    beeAnimRef.current=requestAnimationFrame(draw);
  };

  const toggleTaskCheck=(m,d,slot)=>{
    const key=m+"-"+d+"-"+slot+"-c";
    const cur=taskChecks[key]||false;
    const next={...taskChecks,[key]:!cur};
    saveTaskChecks(next);
    // Fire bees if this completes all 3 top tasks for today
    if(!cur&&m===viewM&&d===viewDay){
      const allNowDone=["t1","t2","t3"].every(s=>s===slot?true:!!(next[m+"-"+d+"-"+s+"-c"]));
      if(allNowDone) setTimeout(launchBees,120);
    }
  };
  const isTaskChecked=(m,d,slot)=>!!(taskChecks[m+"-"+d+"-"+slot+"-c"]);
  const isCarried=(m,d,slot)=>!!(taskChecks[m+"-"+d+"-"+slot+"-r"]);
  const toggleCarry=(m,d,slot)=>{
    const key=m+"-"+d+"-"+slot+"-r";
    const carrying=!taskChecks[key];

    const task=(allData[getMI(m)]?.tasks?.[d]?.[slot]||"").replace(/\u200b/g,"").trim();
    const mI=MONTHS_ARR.find(x=>x.m===m);
    let nm=m,nd=d+1;
    if(mI&&nd>mI.days){nm=m+1;nd=1;}

    if(carrying){
      if(!task) return;
      const destTasks=allData[getMI(nm)]?.tasks?.[nd]||{};
      let freeSlot=null;
      for(let s=1;s<=10;s++){if(!(destTasks["t"+s]||"").replace(/\u200b/g,"").trim()){freeSlot="t"+s;break;}}
      if(freeSlot) setTask(nm,nd,freeSlot,task);
    } else {
      if(!task) return;
      const destTasks=allData[getMI(nm)]?.tasks?.[nd]||{};
      for(let s=1;s<=10;s++){
        const v=(destTasks["t"+s]||"").replace(/\u200b/g,"").trim();
        if(v===task){setTask(nm,nd,"t"+s,"");break;}
      }
    }
  };
  const allTasksDone=(m,d)=>{
    return ["t1","t2","t3"].every(slot=>isTaskChecked(m,d,slot));
  };
  // TRACKING weekly goal met — mirrors Month tab. Boxing already shows as a mark on its day.
  const TRK_CODES=TRK_ALL.map(h=>h.code);
  const trkWeekMet=(code,m,d)=>{
    if(!TRK_CODES.includes(code)) return false;
    const wk=Q2_WEEKS.find(w=>m*100+d>=w.start[0]*100+w.start[1]&&m*100+d<=w.end[0]*100+w.end[1]);
    if(!wk) return false;
    let cm=wk.start[0],cd=wk.start[1],count=0;
    for(let i=0;i<14;i++){
      const st=allData[getMI(cm)]?.grid?.[code]?.[cd];
      if(st==="box") count+=2; else if(st) count+=1; // boxing = 2 sessions
      if(cm===wk.end[0]&&cd===wk.end[1]) break;
      cd++;const mi=getMI(cm);
      if(mi>=0&&cd>MONTHS_ARR[mi].days){const ni=mi+1;if(ni>=MONTHS_ARR.length)break;cm=MONTHS_ARR[ni].m;cd=1;}
    }
    return count>=(TRK_DEFAULT_GOALS[code]||1);
  };
  const carryStreak=(m,d,text)=>{
    const t=(text||"").replace(/\u200b/g,"").trim();
    if(!t) return 0;
    let count=0,cm=m,cd=d;
    for(let back=0;back<14;back++){
      cd--;
      if(cd<1){const pi=MONTHS_ARR.findIndex(x=>x.m===cm)-1;if(pi<0)break;cm=MONTHS_ARR[pi].m;cd=MONTHS_ARR[pi].days;}
      const dayTasks=allData[getMI(cm)]?.tasks?.[cd]||{};
      const found=Object.keys(dayTasks).some(k=>(dayTasks[k]||"").replace(/\u200b/g,"").trim()===t);
      if(found) count++; else break;
    }
    return count;
  };

  return (
    <div style={{position:"relative"}}>
      {/* 🐝 BEE CANVAS — fullscreen overlay */}
      <canvas ref={beeCanvasRef} style={{display:"none",position:"fixed",top:0,left:0,width:"100%",height:"100%",zIndex:999,pointerEvents:"none"}}/>

      {/* Daily progress — hero (dark like Plan/Month/Atlas, green accents when done) */}
      <div style={{position:"relative",overflow:"hidden",background:"linear-gradient(135deg,#332817,#241c12)",borderRadius:16,marginBottom:12,padding:"13px 16px",boxShadow:dayPct===100?"0 5px 18px rgba(20,83,45,0.22)":"0 5px 16px rgba(42,33,24,0.2)",border:dayPct===100?"1px solid rgba(74,222,128,0.45)":"1px solid rgba(201,169,110,0.14)"}}>
        <div style={{display:"flex",alignItems:"center",gap:13}}>
          <span style={{fontSize:30,fontWeight:900,letterSpacing:-1,color:dayPct===100?"#4ade80":"#fff",lineHeight:1,flexShrink:0}}>{dayPct}<span style={{fontSize:14,color:dayPct===100?"#bbf7d0":"#c9a96e"}}>%</span></span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6,gap:6}}>
              <span style={{fontSize:13,fontWeight:900,letterSpacing:0.4,color:"#fff",whiteSpace:"nowrap"}}>{weekdayShort(viewM,viewDay)} {M_LABEL[viewM]} {viewDay}</span>
              <span style={{fontSize:7.5,color:dayPct===100?"#86efac":"#c9a96e",fontWeight:800,letterSpacing:1.5,whiteSpace:"nowrap"}}>{dayPct===100?"✓ ALL DONE":"TOP 3"}</span>
            </div>
            <div style={{background:"rgba(255,255,255,0.10)",borderRadius:20,height:6,overflow:"hidden",marginBottom:5}}>
              <div style={{background:dayPct===100?"linear-gradient(90deg,#4ade80,#bbf7d0)":"linear-gradient(90deg,#c9a96e,#e8c98f)",height:"100%",width:dayPct+"%",borderRadius:20,transition:"width .45s cubic-bezier(.4,0,.2,1)",boxShadow:dayPct>0?"0 0 8px rgba(201,169,110,0.4)":"none"}}/>
            </div>
            <div style={{fontSize:7,color:"#a89e8c",fontWeight:700,letterSpacing:1,whiteSpace:"nowrap"}}>W{w.n} · {wkPct}% week · {TOP3.filter(h=>data?.grid?.[h.code]?.[viewDay]).length}/{TOP3.length} HATs</div>
          </div>
        </div>
      </div>
      {/* Week nav + 5-4-3-2-1 */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4,gap:4}}>
        <NBtn onClick={()=>setWeekIdx(x=>Math.max(0,x-1))} on={weekIdx>0}>‹</NBtn>
        <div style={{textAlign:"center",flex:1}}>
          <div style={{fontSize:10,fontWeight:700,color:"#555",letterSpacing:0.5}}>W{w.n} · {w.sm} {w.start[1]}–{w.em} {w.end[1]}</div>
        </div>
        <NBtn onClick={()=>setWeekIdx(x=>Math.min(12,x+1))} on={weekIdx<12}>›</NBtn>
      </div>
      {/* 5-4-3-2-1 + speed mantra */}
      <div style={{textAlign:"center",marginBottom:8}}>
        <span style={{display:"inline-block",background:"#f3ece0",color:"#8a6d3b",border:"1px solid #e6d8c0",borderRadius:20,padding:"4px 16px",fontSize:9,fontWeight:900,letterSpacing:4,fontFamily:"'SF Mono','Courier New',monospace"}}>5 · 4 · 3 · 2 · 1 GO</span>
        <div style={{marginTop:4,fontSize:8,fontWeight:700,color:"#b3a894",letterSpacing:2}}>⚡ LIGHT SPEED · WHAT'S NEXT?</div>
      </div>

      {/* Day strip — full width, equal cells */}
      <div style={{display:"flex",gap:4,marginBottom:10}}>
        {wd.map(({m,d})=>{
          const dd=allData[getMI(m)];const de=dd?.energy?.[d];const dp=top3pct(dd,d);

          const isT=m===TODAY_M&&d===TODAY_D,isV=m===viewM&&d===viewDay;
          // Streak: consecutive days where t1+t2+t3 all checked by slot key
          const taskStreak=(()=>{

              const allDone=["t1","t2","t3"].every(slot=>isTaskChecked(cm,cd,slot));
              if(allDone) s++;
              else break;
              cd--;
              if(cd<1){const pi=MONTHS_ARR.findIndex(x=>x.m===cm)-1;if(pi<0)break;cm=MONTHS_ARR[pi].m;cd=MONTHS_ARR[pi].days;}

              <div style={{fontSize:6,fontWeight:800,color:isV?"#c9a96e":isT?"#9a7b3c":"#b0a898",letterSpacing:.5}}>{weekdayShort(m,d)}</div>
              <div style={{fontSize:16,fontWeight:isT?900:600,color:isV?"#fff":isT?"#9a7b3c":"#1a1a1a",lineHeight:1.1}}>{d}</div>
              <div style={{fontSize:9,color:isV?"#999":de?ecol(de):"#ddd",marginTop:2}}>{de||"·"}</div>
              <div style={{fontSize:8,fontWeight:800,color:isV?"#aaa":dp===100?"#14532d":dp>0?"#555":"#e0e0e0"}}>{dp>0?dp+"%":""}</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",minHeight:13,marginTop:1,paddingLeft:1,paddingRight:1}}>
                <span style={{fontSize:7,fontWeight:900,color:isV?"#a09080":mv?moodColor(mv):"transparent",lineHeight:1}}>{mv||"·"}</span>
                {taskStreak>=2?<span style={{fontSize:6,fontWeight:900,color:isV?"#93c5fd":"#1d4ed8",lineHeight:1}}>⚡{taskStreak}</span>:<span/>}

      </div>

        style={{width:"100%",marginBottom:12,background:dayCopied?"#16a34a":"#fff",color:dayCopied?"#fff":"#8a7f6d",border:"1px solid "+(dayCopied?"#16a34a":"#ece6dc"),borderRadius:12,padding:"8px 0",fontSize:9,fontWeight:800,letterSpacing:1,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 1px 5px rgba(42,33,24,0.05)",touchAction:"manipulation"}}>

        </div>
        {/* Code row */}
        <div style={{display:"flex"}}>
          <div style={{width:36,flexShrink:0,background:"#fafafa",borderRight:"1px solid #e0e0e0",borderBottom:"2px solid #ccc",height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:6,color:"#bbb"}}>HAT</div>
          <div style={{width:18,flexShrink:0,height:16,background:"#f0f0f0",borderLeft:"1px solid #ddd",borderBottom:"2px solid #ccc",display:"flex",alignItems:"center",justifyContent:"center",fontSize:6,fontWeight:800,color:"#888"}}>⚡</div>
          <div style={{width:18,flexShrink:0,height:16,background:"#f0f0f0",borderLeft:"1px solid #ddd",borderBottom:"2px solid #ccc",display:"flex",alignItems:"center",justifyContent:"center",fontSize:6,fontWeight:800,color:"#888"}}>😊</div>
          {FLAT_HATS.map((h,hi)=>{
            const sec=MONTH_SECTIONS.find(s=>s.hats.some(x=>x.code===h.code));
            const grp=GROUPS.find(g=>hi>=g.start&&hi<=g.end);
            const isFirstInGrp=hi===(grp?grp.start:hi);
            return (
              <div key={h.code} style={{width:18,height:16,flexShrink:0,boxSizing:"border-box",display:"flex",alignItems:"center",justifyContent:"center",background:sec?.bg||"#fff",borderLeft:isFirstInGrp?`2px solid ${sec?.bdr||"#ccc"}`:`1px solid ${(sec?.bdr||"#ccc")+"88"}`,borderBottom:"2px solid #ccc",fontSize:6,fontWeight:800,color:sec?.color||"#555"}}>{h.code==="RJ2"?"R2":h.code}</div>
            );
          })}
          <div style={{width:24,flexShrink:0,height:16,background:"#f0f0f0",borderLeft:"2px solid #ccc",borderBottom:"2px solid #ccc",display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:900,color:"#1b5e20",boxSizing:"border-box"}}>%</div>
        </div>
        {/* Data rows — full current week (7 days, crosses month boundaries) */}
        {(()=>{
          const rowDays=wd;
          return rowDays.map((rday,ri)=>{
            const rData=allData[getMI(rday.m)];
            const isSel=rday.m===viewM&&rday.d===viewDay;
            const isToday=rday.m===TODAY_M&&rday.d===TODAY_D;
            return (

// ── MONTH PANEL ─────────────────────────────────────────────────────────────
const FLAT_HATS = MONTH_SECTIONS.flatMap(s=>s.hats);
// C = cell size px (square). No margins between cols — alignment via borders only.
const C=18, COL_DAY=36, COL_EN=18, COL_MOOD=18, COL_PCT=24, COL_EX=24, COL_LB=24;
const GRID_COLS = `${COL_DAY}px ${COL_EN}px ${COL_MOOD}px ${FLAT_HATS.map(()=>`${C}px`).join(" ")} ${COL_PCT}px`;

function moodColor(v) {
  if(!v) return "#ddd";
  if(v>=9) return "#00897b";
  if(v>=7) return "#43a047";
  if(v>=5) return "#f9a825";
  if(v>=3) return "#e65100";
  return "#c62828";
}

// Tracking HATs
const TRK_ALL = [...TRK_PXRV,...TRK_PR,...TRK_RSLH,...TRK_MV,...TRK_SM];
const TRK_DEFAULT_GOALS = {PX:2,RV:1,PR:2,RS:1,LH:2,MV:1,SM:1};

// Group spans: col indices (0-based within HAT columns) for each group
// FLAT_HATS: 0=MS 1=MM 2=RJ 3=RJ2 | 4=PW 5=PB 6=PA | 7=PX 8=RV 9=PR 10=RS 11=LH 12=MV 13=SM
const GROUPS = [
  {label:"ESSENTIALS", start:0, end:3, color:"#bf5000", bg:"#fff3e0", bdr:"#ffb74d"},
  {label:"TOP 3",      start:4, end:6, color:"#1b5e20", bg:"#e8f5e9", bdr:"#66bb6a"},
  {label:"TRACKING",  start:7, end:13, color:"#555",    bg:"#f5f5f5", bdr:"#bbb"},
];

// Build flat meta for each HAT col
function buildSectionMeta() {
  let i=0; const meta=[];
  MONTH_SECTIONS.forEach((sec,si)=>{
    sec.hats.forEach((h,hi)=>{
      const grp = GROUPS.find(g=>i>=g.start&&i<=g.end);
      meta.push({
        h, sec, si,
        isFirstInSec:hi===0, isLastInSec:hi===sec.hats.length-1,
        isFirstInGrp:i===(grp?grp.start:i), isLastInGrp:i===(grp?grp.end:i),
        grp, globalIdx:i
      });
      i++;
    });
  });
  return meta;
}
const SECTION_META = buildSectionMeta();

function getWeekForDay(m,d) {
  return Q2_WEEKS.find(w=>{
    const [sm,sd]=w.start,[em,ed]=w.end;
    return m*100+d>=sm*100+sd && m*100+d<=em*100+ed;
  });
}
function isWeekEnd(month,day) {
  const w=getWeekForDay(month.m,day); if(!w) return false;
  const [em,ed]=w.end;
  return em===month.m&&ed===day;
}

function MonthPanel({monthIdx,setMonthIdx,allData,cycleCell,cycleEnergy,cycleMood,setTabIdx,setViewDay,setViewM,setWeekIdx,toggleExtraHat,toggleLibHat}) {
  const month=MONTHS_ARR[monthIdx];
  const data=allData[monthIdx];
  const DAYS=Array.from({length:month.days},(_,i)=>i+1);
  // Extended day list: append spillover days when the month's last week continues into the next month
  const DAYS_EXT=(()=>{
    const arr=DAYS.map(d=>({m:month.m,d}));
    const lastW=getWeekForDay(month.m,month.days);
    if(lastW&&lastW.end[0]!==month.m){
      getWeekDaysAll(month.days).forEach(p=>{ if(p.m!==month.m) arr.push(p); });
    }
    return arr;
  })();
  const isCur=month.m===TODAY_M;
  const totalW=COL_DAY+COL_EN+COL_MOOD+FLAT_HATS.length*C+COL_PCT+2;

  const [trkGoals,setTrkGoals]=useState(()=>({...TRK_DEFAULT_GOALS}));
  const [showGoals,setShowGoals]=useState(false);
  const [picker,setPicker]=useState(null); // {day, type:'ex'|'lb'}
  const [showExp,setShowExp]=useState(false);
  function adjustGoal(code,delta){setTrkGoals(p=>({...p,[code]:Math.max(1,Math.min(7,(p[code]||1)+delta))}));}

  // Auto-scroll to today when this month is current
  const scrollRef=useRef(null);
  useEffect(()=>{
    if(isCur&&scrollRef.current){
      const ROW_H=C; // each row is C px tall
      const HDR=32; // sticky header height
      const targetDay=TODAY_D;
      const offset=HDR+((targetDay-1)*(ROW_H+1))-80; // scroll so today is near top
      
    }
  },[monthIdx]);

  function getWeekDaysAll(day){
    // Returns {m,d} for ALL days in the week, across months
    const w=getWeekForDay(month.m,day); if(!w) return [];
    const pairs=[]; let[cm,cd]=[...w.start]; const[em,ed]=w.end;
    for(let i=0;i<7;i++){
      pairs.push({m:cm,d:cd});
      if(cm===em&&cd===ed) break;
      const mI=MONTHS_ARR.find(x=>x.m===cm);
      if(mI&&cd>=mI.days){cm++;cd=1;}else cd++;
    }
    return pairs;
  }
  function getWeekDaysInMonth(day){
    return getWeekDaysAll(day).filter(p=>p.m===month.m).map(p=>p.d);
  }
  function trkGoalMet(code,day){
    // Check across all months in the week. Boxing = 2 sessions.
    const wdays=getWeekDaysAll(day);
    let count=0;
    wdays.forEach(({m:wm,d:wd})=>{
      const mi=MONTHS_ARR.findIndex(x=>x.m===wm);
      const st=allData[mi]?.grid?.[code]?.[wd];
      if(st==="box") count+=2; else if(st) count+=1;
    });
    return count>=(trkGoals[code]||1);
  }

  // Sticky header height: group row (14px) + code row (18px) = 32px

  return (
    <div style={{position:"relative"}}>
      <div style={{background:"linear-gradient(135deg,#332817,#241c12)",borderRadius:18,padding:"12px 14px",marginBottom:10,boxShadow:"0 5px 18px rgba(42,33,24,0.2)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={()=>monthIdx>0&&setMonthIdx(x=>Math.max(0,x-1))} style={{background:"rgba(255,255,255,0.08)",border:"none",color:monthIdx>0?"#c9a96e":"#5a5145",borderRadius:16,width:30,height:30,fontSize:16,cursor:monthIdx>0?"pointer":"default",fontFamily:"inherit"}}>‹</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:8,fontWeight:800,letterSpacing:3,color:"#c9a96e",textTransform:"uppercase"}}>Month</div>
          <div style={{fontSize:18,fontWeight:900,color:"#fff",letterSpacing:-0.3,lineHeight:1.15}}>{month.name} <span style={{fontSize:9,color:"#a89e8c",fontWeight:400,letterSpacing:2}}>2026</span></div>
          <div style={{fontSize:6.5,color:"#8a7f6d",fontWeight:700,letterSpacing:1,marginTop:2}}>👆 TAP TO MARK</div>
        </div>
        <button onClick={()=>monthIdx<MONTHS_ARR.length-1&&setMonthIdx(x=>Math.min(MONTHS_ARR.length-1,x+1))} style={{background:"rgba(255,255,255,0.08)",border:"none",color:monthIdx<MONTHS_ARR.length-1?"#c9a96e":"#5a5145",borderRadius:16,width:30,height:30,fontSize:16,cursor:monthIdx<MONTHS_ARR.length-1?"pointer":"default",fontFamily:"inherit"}}>›</button>
      </div>

      {/* ALL MONTHS EXPORT */}
      <div style={{marginBottom:8}}>
        <button onClick={()=>setShowExp(x=>!x)} style={{background:"none",border:"1px solid #ddd",borderRadius:16,padding:"4px 12px",fontSize:9,letterSpacing:2,color:"#666",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>

          const buildAllExport=()=>{

              if(maxDay===0) return;
              out+="\n"+"=".repeat(40)+"\n"+mo.name.toUpperCase()+" 2026\n"+"=".repeat(40)+"\n";

              <div style={{padding:"4px 12px",fontSize:7,color:"#aaa",borderTop:"1px solid #f0f0f0"}}>Tap textarea to select &amp; copy</div>

  });
  const saveChall=(next)=>{setChallData(next);try{localStorage.setItem("lifeos_chall26",JSON.stringify(next));}catch(e){}};

  const scrollRef = useRef(null);
  useEffect(()=>{

    }

    const key=`d${day}`;
    const cur=challData[key]||[];
    const entry=cur.find(e=>e===itemId||e.startsWith(itemId+":"));
    if(!entry) return null;
    if(entry===itemId) return "x";
    return entry.split(":")[1]||"x";
  }
  function cycleChallCell(day, itemId){
    const key=`d${day}`;
    const cur=challData[key]||[];
    const st=getChallState(day,itemId);
    // cycle: null → x → back → null
    const nextSt=st===null?"x":st==="x"?"back":null;
    const filtered=cur.filter(e=>e!==itemId&&!e.startsWith(itemId+":"));
    const next=nextSt?[...filtered,itemId+":"+nextSt]:filtered;
    saveChall({...challData,[key]:next});
  }
  function challMark(st){
    if(st==="x") return {ch:"×",color:null}; // color from tc

// ── EXTRA PANEL ───────────────────────────────────────────────────────────────
const EXTRA_ALL_HATS = [...EXTRA_ACTIVE, ...LIB_TAGS];
const EX_C = 22;
const EX_COL_DAY = 28;

// Grey palette for Extra panel
const EX_ACTIVE_GRP = {label:"ACTIVE", color:"#555", bg:"#f5f5f5", bdr:"#bbb"};
const EX_LIB_GRP    = {label:"LIBRARY", color:"#888", bg:"#fafafa", bdr:"#ccc"};

function ExtraPanel({monthIdx, setMonthIdx, allData, toggleExtraHat, toggleLibHat}) {
  const month = MONTHS_ARR[monthIdx];
  const data = allData[monthIdx];
  const DAYS = Array.from({length:month.days},(_,i)=>i+1);
  const isCur = month.m === TODAY_M;
  const scrollRef = useRef(null);

  useEffect(()=>{
    if(isCur&&scrollRef.current){
      const offset = (EX_C+EX_C)+((TODAY_D-1)*(EX_C+1))-80;
      
    }
  },[monthIdx]);

  function getWeekDaysAll(day){
    const w=getWeekForDay(month.m,day); if(!w) return [];
    const pairs=[]; let[cm,cd]=[...w.start]; const[em,ed]=w.end;
    for(let i=0;i<7;i++){
      pairs.push({m:cm,d:cd});
      if(cm===em&&cd===ed) break;
      const mI=MONTHS_ARR.find(x=>x.m===cm);
      if(mI&&cd>=mI.days){cm++;cd=1;}else cd++;
    }
    return pairs;
  }
  function getWeekDaysInMonth(day){
    return getWeekDaysAll(day).filter(p=>p.m===month.m).map(p=>p.d);
  }

  function goalMet(code, day){
    const wdays=getWeekDaysAll(day);
    const isExtraA=EXTRA_ACTIVE.some(h=>h.code===code);
    return wdays.some(({m:wm,d:wd})=>{
      const mi=MONTHS_ARR.findIndex(x=>x.m===wm);
      const wdata=allData[mi];
      const ex=(wdata?.extraHats||{})[wd]||[];
      const lb=(wdata?.libHats||{})[wd]||[];
      const arr=isExtraA?ex:lb;
      return arr.some(e=>e===code||e.startsWith(code+":"));
    });
  }

  function getState(code, day){
    // We repurpose extraHats to store the state string for extra panel
    // Format stored: code+":" + state
    const ex=(data.extraHats||{})[day]||[];
    const lb=(data.libHats||{})[day]||[];
    const isExtraA=EXTRA_ACTIVE.some(h=>h.code===code);
    const arr=isExtraA?ex:lb;
    // Check if arr has state entry like "PM:box" or just "PM" (legacy = "x")
    const entry=arr.find(e=>e===code||e.startsWith(code+":"));
    if(!entry) return null;
    if(entry===code) return "x"; // legacy
    return entry.split(":")[1]||"x";
  }

  function cycleExtraState(code, day){
    const isExtraA=EXTRA_ACTIVE.some(h=>h.code===code);
    const cur=getState(code,day);
    const next=nextSt(cur); // null → x → box → back → null
    // Store as "code:state" or remove if null
    const mutFn=(arr)=>{
      const filtered=arr.filter(e=>e!==code&&!e.startsWith(code+":"));
      return next?[...filtered,code+":"+next]:filtered;
    };
    if(isExtraA){
      // use toggleExtraHat logic but we need direct mutation — call parent
      // Since we can't mutData directly, we rebuild using toggleExtraHat trick:
      // Remove old entry first by toggling off if on, then set new
      // Simplest: just call toggleExtraHat which does includes check
      // We need a smarter approach — store state in the code string
      toggleExtraHat(month.m, day, code, next);
    } else {
      toggleLibHat(month.m, day, code, next);
    }
  }

  const totalW = EX_COL_DAY + EXTRA_ALL_HATS.length*EX_C + 2;
  const HDR_GRP=14, HDR_CODE=20;

  return (
    <div style={{position:"relative"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <NBtn onClick={()=>setMonthIdx(x=>Math.max(0,x-1))} on={monthIdx>0}>‹</NBtn>
        <span style={{fontSize:16,fontWeight:900,color:"#111"}}>{month.name} <span style={{fontSize:9,color:"#aaa",fontWeight:400,letterSpacing:2}}>EXTRA</span></span>
        <NBtn onClick={()=>setMonthIdx(x=>Math.min(MONTHS_ARR.length-1,x+1))} on={monthIdx<MONTHS_ARR.length-1}>›</NBtn>
      </div>

      <div style={{borderRadius:8,border:"1px solid #ddd",overflow:"hidden"}}>
        <div data-hscroll="true" ref={scrollRef} style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          <div style={{minWidth:totalW,position:"relative"}}>

            {/* STICKY HEADER */}
            <div style={{position:"sticky",top:0,zIndex:12,background:"#fff",borderBottom:"2px solid #ccc"}}>
              {/* ROW 1: group labels */}
              <div style={{display:"flex",height:HDR_GRP}}>
                <div style={{width:EX_COL_DAY,flexShrink:0}}/>
                <div style={{width:EXTRA_ACTIVE.length*EX_C,flexShrink:0,background:EX_ACTIVE_GRP.bg,borderTop:`1px solid ${EX_ACTIVE_GRP.bdr}`,borderLeft:`2px solid ${EX_ACTIVE_GRP.bdr}`,borderRight:`1px solid ${EX_ACTIVE_GRP.bdr}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:900,color:EX_ACTIVE_GRP.color,letterSpacing:1}}>ACTIVE</div>
                <div style={{width:LIB_TAGS.length*EX_C,flexShrink:0,background:EX_LIB_GRP.bg,borderTop:`1px solid ${EX_LIB_GRP.bdr}`,borderLeft:`2px solid ${EX_LIB_GRP.bdr}`,borderRight:`1px solid ${EX_LIB_GRP.bdr}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:900,color:EX_LIB_GRP.color,letterSpacing:1}}>LIBRARY</div>
              </div>
              {/* ROW 2: emoji + code */}
              <div style={{display:"flex",height:HDR_CODE}}>
                <div style={{width:EX_COL_DAY,flexShrink:0}}/>
                {EXTRA_ALL_HATS.map((h,hi)=>{
                  const isFirstLib=hi===EXTRA_ACTIVE.length;
                  const isFirst=hi===0||isFirstLib;
                  const grp=hi<EXTRA_ACTIVE.length?EX_ACTIVE_GRP:EX_LIB_GRP;
                  return (
                    <div key={h.code} style={{
                      width:EX_C,flexShrink:0,height:HDR_CODE,
                      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                      background:grp.bg,
                      borderLeft:`${isFirst?"2":"1"}px solid ${grp.bdr}${isFirst?"":"88"}`,
                      borderBottom:`1px solid ${grp.bdr}`,
                      gap:1,
                    }}>
                      <span style={{fontSize:8,lineHeight:1}}>{h.emoji}</span>
                      <span style={{fontSize:5.5,fontWeight:800,color:grp.color,lineHeight:1}}>{h.code}</span>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* DATA ROWS */}
            {DAYS.map(day=>{
              const isT=isCur&&day===TODAY_D;
              const wk=getWeekForDay(month.m,day);
              const wkStartW=(()=>{
                if(!wk) return null;
                const[sm,sd]=wk.start;
                return (sm===month.m&&sd===day)?wk:null;
              })();
              const rowBg=isT?"#dbeafe":day%2===0?"#f9f9f9":"#fff";
              return (
                <div key={day}>
                  {wkStartW&&(
                    <div style={{display:"flex",alignItems:"center",height:14,background:"#ebebeb",borderTop:"2px solid #333",borderBottom:"1px solid #aaa"}}>
                      <div style={{paddingLeft:4,fontSize:7,fontWeight:900,color:"#222",letterSpacing:1}}>W{wkStartW.n}</div>
                    </div>
                  )}
                  <div style={{display:"flex",alignItems:"stretch",background:rowBg,borderLeft:isT?"3px solid #1976d2":"3px solid transparent",borderBottom:"1px solid #ebebeb",height:EX_C}}>
                    <div style={{width:EX_COL_DAY-3,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:4,fontSize:10,fontWeight:isT?900:500,color:isT?"#1565c0":"#555"}}>{day}</div>
                    {EXTRA_ALL_HATS.map((h,hi)=>{
                      const isFirstLib=hi===EXTRA_ACTIVE.length;
                      const isFirst=hi===0||isFirstLib;
                      const grp=hi<EXTRA_ACTIVE.length?EX_ACTIVE_GRP:EX_LIB_GRP;
                      const st=getState(h.code,day);
                      const gm=!st&&goalMet(h.code,day);
                      const mk=stMark(st,grp.color);
                      let bg=gm?"#e0e0e0":st?grp.bg:"transparent";
                      return (
                        <div key={h.code} onClick={()=>cycleExtraState(h.code,day)} style={{
                          width:EX_C,height:EX_C,flexShrink:0,
                          display:"flex",alignItems:"center",justifyContent:"center",
                          cursor:"pointer",background:bg,
                          borderLeft:`${isFirst?"2":"1"}px solid ${gm?"#b0b0b0":isFirst?grp.bdr:"#ccc"}`,
                          borderRight:"1px solid #ccc",
                          borderTop:"1px solid #ccc",
                          borderBottom:"1px solid #ccc",
                          boxSizing:"border-box",
                        }}>
                          <span style={{fontSize:mk.fs,fontWeight:mk.fw,lineHeight:1,color:st?grp.color:gm?"#aaa":"#e0e0e0"}}>{mk.ch}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Legend */}
      <div style={{marginTop:6,background:"#f9f9f9",borderRadius:8,border:"1px solid #e8e8e8",padding:"5px 10px"}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          {[["·","empty","#ccc"],["×","done","#555"],["⊠","boxing","#555"],["◀","back","#888"]].map(([s,l,c])=>(
            <div key={s} style={{textAlign:"center"}}>
              <div style={{fontSize:11,color:c,fontWeight:900}}>{s}</div>
              <div style={{fontSize:6,color:"#bbb"}}>{l}</div>
            </div>
          ))}
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:9,height:9,borderRadius:2,background:"#e0e0e0",border:"1px solid #bbb"}}/>
            <span style={{fontSize:6,color:"#bbb"}}>week goal met</span>
          </div>
          <span style={{fontSize:6,color:"#ccc",marginLeft:"auto"}}>ACTIVE 5 + LIBRARY 19 · 1x/week</span>
        </div>
      </div>
    </div>
  );
}

// ── ATLAS SUB-SECTIONS ────────────────────────────────────────────────────────
function AtlasHighlights({allData, cycleEnergy, cycleMood, setHighlight, setMoodNote, goToDay, onBack}) {
  const [showExp,setShowExp]=useState(false);
  const [editIdx,setEditIdx]=useState(null);
  const [editVal,setEditVal]=useState("");
  const [editMood,setEditMood]=useState("");
  const entries=[];
  MONTHS_ARR.forEach((mo,mi)=>{
    const mdata=allData[mi];
    const maxDay=(mo.m<TODAY_M)?mo.days:(mo.m===TODAY_M?TODAY_D:0);
    if(maxDay===0) return;
    for(let d=1;d<=maxDay;d++){
      const hl=mdata?.highlights?.[d];
      const mv=mdata?.mood?.[d];
      const ev=mdata?.energy?.[d];
      const mn=mdata?.moodNotes?.[d];
      if(hl?.trim()||mn?.trim()||mv||ev) entries.push({mo,mi,d,hl:hl?.trim()||"",mn:mn?.trim()||"",mv,ev});
    }
  });
  const buildExp=()=>{
    let out="✨ HIGHLIGHTS & MOOD — Q2 2026\n"+"=".repeat(36)+"\n\n";
    entries.forEach(({mo,d,hl,mn,mv,ev})=>{
      out+=`${mo.short} ${d}`;
      if(mv) out+=`  mood:${mv}`;
      if(ev) out+=`  energy:${ev}`;
      out+="\n";
      if(hl) out+=`  "${hl}"\n`;
      if(mn) out+=`  mood shift: ${mn}\n`;
      out+="\n";
    });
    return out.trim()||"No entries yet.";
  };
  const startEdit=(i,entry)=>{setEditIdx(i);setEditVal(entry.hl);setEditMood(entry.mn);};
  const saveEdit=(entry)=>{setHighlight(entry.mo.m,entry.d,editVal);setMoodNote(entry.mo.m,entry.d,editMood);setEditIdx(null);};
  return (
    <div>
      <button onClick={onBack} style={{display:"flex",alignItems:"center",gap:8,background:"#f2ede6",border:"none",borderRadius:20,padding:"8px 16px 8px 12px",cursor:"pointer",fontFamily:"inherit",marginBottom:16,boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}}>
        <span style={{fontSize:18,color:"#c9a96e",fontWeight:900,lineHeight:1}}>‹</span>
        <span style={{fontSize:10,fontWeight:800,color:"#2a2118",letterSpacing:2}}>ATLAS</span>
      </button>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:16}}>
        <div>
          <div style={{fontSize:18,fontWeight:900,color:"#b8860b",letterSpacing:-0.5}}>✨ Highlights</div>
          <div style={{fontSize:8,color:"#b0a898",letterSpacing:2,marginTop:2}}>{entries.length} DAYS LOGGED</div>
        </div>
        <button onClick={()=>{copyText(buildExp());setShowExp(true);setTimeout(()=>setShowExp(false),1800);}} style={{background:showExp?"#16a34a":"#2a2118",color:showExp?"#fff":"#c9a96e",border:"none",borderRadius:20,padding:"7px 14px",fontSize:8.5,letterSpacing:1,cursor:"pointer",fontFamily:"inherit",fontWeight:800,boxShadow:"0 2px 8px rgba(42,33,24,0.18)",whiteSpace:"nowrap"}}>
          {showExp?"✓ COPIED":"⧉ EXPORT HIGHLIGHTS"}
        </button>
      </div>
      {(()=>{
        const moodBand=v=>v>=9?"#7c3aed":v>=7?"#16a34a":v>=5?"#eab308":"#ef4444";
        const ECOL={"▲▲":"#6d28d9","▲":"#8b5cf6","■":"#16a34a","▼":"#d97706","●":"#9ca3af"};
        const EH={"▲▲":5,"▲":4,"■":3,"▼":2,"●":1};
        const ELAB={"▲▲":"PEAK","▲":"EXC","■":"OK","▼":"UND","●":"REST"};
        const moodAll=entries.filter(e=>e.mv).map(e=>({v:e.mv,m:e.mo.m,key:e.mo.m+"-"+e.d,label:e.mo.short+" "+e.d}));
        const enAll=entries.filter(e=>e.ev).map(e=>({sym:e.ev,m:e.mo.m,key:e.mo.m+"-"+e.d,label:e.mo.short+" "+e.d}));
        const monthAvgs=MONTHS_ARR.map(mo=>{
          const mp=moodAll.filter(p=>p.m===mo.m);
          return mp.length?{short:mo.short,avg:(mp.reduce((s,p)=>s+p.v,0)/mp.length)}:null;
        }).filter(Boolean);
        // ---- MOOD CHART (area + line + dots) ----
        const moodChart=(()=>{
          if(moodAll.length<2) return null;
          const W=320,H=104,padX=20,padTop=10,padBot=14;
          const n=moodAll.length;
          const xOf=i=>padX+(n===1?0:i*(W-padX-8)/(n-1));
          const yOf=v=>padTop+(10-v)/9*(H-padTop-padBot);
          const pts=moodAll.map((p,i)=>({x:xOf(i),y:yOf(p.v),v:p.v,key:p.key}));
          const lineD=pts.map((p,i)=>(i?"L":"M")+p.x.toFixed(1)+" "+p.y.toFixed(1)).join(" ");
          const areaD=lineD+" L "+pts[n-1].x.toFixed(1)+" "+(H-padBot)+" L "+pts[0].x.toFixed(1)+" "+(H-padBot)+" Z";
          return (
            <div style={{background:"#fff",borderRadius:14,padding:"12px 12px 10px",marginBottom:12,boxShadow:"0 2px 10px rgba(0,0,0,0.06)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:8,fontWeight:800,color:"#7c3aed",letterSpacing:1.5}}>● MOOD</span>
                <span style={{fontSize:7,color:"#b0a898",fontWeight:700}}>1–10 daily</span>
              </div>
              <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"auto",display:"block"}}>

                  <linearGradient id="moodFill" x1="0" y1="0" x2="0" y2="1">

                  </linearGradient>
                </defs>
                {[2,4,6,8,10].map(g=>(

                    <line x1={padX} y1={yOf(g)} x2={W-8} y2={yOf(g)} stroke="#f2efe9" strokeWidth="1"/>

                <path d={lineD} fill="none" stroke="#7c3aed" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" opacity="0.55"/>

                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })();
        // ---- ENERGY CHART (color bars per level) ----
        const energyChart=(()=>{
          if(enAll.length<1) return null;
          const W=320,H=92,padX=8,padTop=8,padBot=16;
          const n=enAll.length;
          const slot=(W-padX*2)/n;
          const bw=Math.min(slot*0.66,16);
          const maxH=H-padTop-padBot;
          return (
            <div style={{background:"#fff",borderRadius:14,padding:"12px 12px 10px",marginBottom:14,boxShadow:"0 2px 10px rgba(0,0,0,0.06)"}}>

                <span style={{fontSize:7,color:"#b0a898",fontWeight:700}}>{n} days</span>
              </div>
              <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"auto",display:"block"}}>
                <line x1={padX} y1={H-padBot} x2={W-padX} y2={H-padBot} stroke="#ece8e2" strokeWidth="1"/>
                {enAll.map((p,i)=>{
                  const h=EH[p.sym]/5*maxH;
                  const x=padX+slot*i+(slot-bw)/2;
                  const y=(H-padBot)-h;
                  return <rect key={p.key} x={x.toFixed(1)} y={y.toFixed(1)} width={bw.toFixed(1)} height={h.toFixed(1)} rx="2" fill={ECOL[p.sym]||"#ccc"}/>;
                })}

              <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:6,flexWrap:"wrap"}}>
                {["▲▲","▲","■","▼","●"].map(s=>(

                    <span style={{width:8,height:8,borderRadius:2,background:ECOL[s]}}/>{ELAB[s]}
                  </span>
                ))}
              </div>
            </div>
          );
        })();
        if(!moodChart&&!energyChart) return null;
        return <React.Fragment>{moodChart}{energyChart}</React.Fragment>;
      })()}
      {entries.length===0
        ?<EmptyState icon="✨" line="One line a day: your mood, energy, and the moment that mattered. It becomes your emotional arc each quarter."/>
        :<div style={{display:"flex",flexDirection:"column",gap:8}}>

            const isEditing=editIdx===i;

            const wkN=(()=>{const wi=weekIdxForDay(mo.m,d);return wi>=0?Q2_WEEKS[wi].n:null;})();
            const prevWkN=i>0?(()=>{const wi=weekIdxForDay(dispEntries[i-1].mo.m,dispEntries[i-1].d);return wi>=0?Q2_WEEKS[wi].n:null;})():null;
            const showWeek=!showDivider&&i>0&&wkN!==prevWkN;
            return (
              <React.Fragment key={i}>

                  {wkN&&<span style={{fontSize:7,fontWeight:800,color:"#cbb896",letterSpacing:1}}>W{wkN}</span>}
                  <span style={{flex:1,height:1,background:"linear-gradient(90deg,#e8dcc8,transparent)"}}/>

              {showWeek&&(
                <div style={{display:"flex",alignItems:"center",gap:6,margin:"8px 0 3px"}}>
                  <span style={{fontSize:7,fontWeight:800,color:"#cbb896",letterSpacing:1.5}}>W{wkN}</span>
                  <span style={{flex:1,height:1,background:"repeating-linear-gradient(90deg,#ece4d6 0 5px,transparent 5px 10px)"}}/>
                </div>
              )}
              <div style={{background:"#fff",borderRadius:12,padding:"10px 14px",boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
                <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  {/* Date + mood + energy controls */}
                  <div style={{flexShrink:0,textAlign:"center",minWidth:36}}>
                    <div onClick={()=>goToDay&&goToDay(mo.m,d)} style={{cursor:"pointer"}} title="open this day">

                  <div style={{flex:1,borderLeft:"2px solid #f5ede0",paddingLeft:10}}>

                      ?<div>

                        <div style={{display:"flex",gap:6,marginTop:6}}>

                          <button onClick={()=>setEditIdx(null)} style={{background:"#eee",color:"#666",border:"none",borderRadius:12,padding:"4px 10px",fontSize:8,cursor:"pointer",fontFamily:"inherit"}}>CANCEL</button>

                      :<div onClick={()=>startEdit(i,entry)} style={{cursor:"pointer"}}>

function fmtMoney(n,dec){
  const v=parseFloat(n)||0;
  return "$"+v.toLocaleString("en-US",{minimumFractionDigits:dec===0?0:2,maximumFractionDigits:dec===0?0:2});
}

// Timebox slots: 6:00 AM → 2:00 AM next day, 30-min steps
const TIMEBOX_SLOTS=(()=>{const a=[];for(let t=6*60;t<=26*60;t+=30){const hr=Math.floor(t/60);const mm=t%60;const h24=hr%24;const ap=h24<12?"AM":"PM";let h12=h24%12;if(h12===0)h12=12;a.push({key:String(hr).padStart(2,"0")+":"+String(mm).padStart(2,"0"),label:h12+":"+String(mm).padStart(2,"0")+" "+ap,hour:mm===0});}return a;})();

// Auto-growing textarea — expands to fit content, never scrolls internally
function AutoTextarea({value,onChange,placeholder,style,onKeyDown}){
  const ref=React.useRef(null);
  const resize=()=>{const el=ref.current;if(el){el.style.height="auto";el.style.height=(el.scrollHeight)+"px";}};
  React.useLayoutEffect(()=>{resize();},[value]);
  return <textarea ref={ref} value={value} onChange={onChange} onInput={resize} onKeyDown={onKeyDown} placeholder={placeholder} rows={1} style={{...style,overflow:"hidden",resize:"none"}}/>;
}

function buildPlanText(m,d,planData){
  const dk=m+"-"+d; const day=planData[dk]||{};
  const M={4:"APR",5:"MAY",6:"JUN",7:"JUL"};
  let out="DAY PLAN — "+weekdayShort(m,d)+" "+(M[m]||m)+" "+d+", 2026\n"+"=".repeat(36)+"\n\n";
  const items=day.brainstormItems||(day.brainstorm?[{text:day.brainstorm,done:false}]:[]);
  const filledItems=items.filter(it=>(it.text||"").trim());
  if(filledItems.length){ out+="BRAINSTORM:\n"; filledItems.forEach(it=>{out+="  ["+(it.done?"x":" ")+"] "+it.text.trim()+"\n";}); out+="\n"; }
  const slots=TIMEBOX_SLOTS.filter(s=>(day[s.key]||"").trim());
  if(slots.length){ out+="TIMEBOX:\n"; slots.forEach(s=>{out+="  "+s.label+"  "+day[s.key].trim()+"\n";}); }
  if(!filledItems.length&&!slots.length) out+="(empty)";
  return out.trim();
}

function PlanPanel({viewM,viewDay,setViewDay,setViewM,planData,setPlanField,clearPlanDay}){
  const dk=viewM+"-"+viewDay;
  const day=planData[dk]||{};
  const gotoDay=(delta)=>{
    const m=MONTHS_ARR.find(x=>x.m===viewM); if(!m) return;
    let nd=viewDay+delta, nm=viewM;
    if(nd<1){ const pm=MONTHS_ARR.find(x=>x.m===viewM-1); if(pm){nm=pm.m; nd=pm.days;} else nd=1; }
    else if(nd>m.days){ const nx=MONTHS_ARR.find(x=>x.m===viewM+1); if(nx){nm=nx.m; nd=1;} else nd=m.days; }
    setViewM(nm); setViewDay(nd);
  };
  const filled=TIMEBOX_SLOTS.filter(s=>(day[s.key]||"").trim()).length;
  const items=day.brainstormItems||(day.brainstorm&&day.brainstorm.trim()?[{id:1,text:day.brainstorm,done:false}]:[]);
  const setItems=(next)=>setPlanField(viewM,viewDay,"brainstormItems",next);
  const addItem=()=>setItems([...items,{id:Date.now()+Math.random(),text:"",done:false}]);
  const updItem=(id,patch)=>setItems(items.map(it=>it.id===id?{...it,...patch}:it));
  const delItem=(id)=>setItems(items.filter(it=>it.id!==id));
  const moveItem=(id,dir)=>{const i=items.findIndex(it=>it.id===id);if(i<0)return;const j=i+dir;if(j<0||j>=items.length)return;const a=items.slice();const tmp=a[i];a[i]=a[j];a[j]=tmp;setItems(a);};
  const pinItem=(id)=>{const it=items.find(x=>x.id===id);if(!it)return;if(it.pin){setItems(items.map(x=>x.id===id?{...x,pin:false}:x));}else{setItems([{...it,pin:true},...items.filter(x=>x.id!==id)]);}};
  const doneCount=items.filter(it=>it.done).length;
  const [copied,setCopied]=useState(false);
  const isTodayView=viewM===TODAY_M&&viewDay===TODAY_D;
  const moveToToday=(id)=>{
    if(isTodayView)return;
    const it=items.find(x=>x.id===id); if(!it)return;
    const tdk=TODAY_M+"-"+TODAY_D;
    const tday=planData[tdk]||{};
    const tItems=tday.brainstormItems||(tday.brainstorm&&tday.brainstorm.trim()?[{id:1,text:tday.brainstorm,done:false}]:[]);
    setPlanField(TODAY_M,TODAY_D,"brainstormItems",[...tItems,{id:Date.now()+Math.random(),text:it.text,done:it.done||false,pin:false}]);
    setPlanField(viewM,viewDay,"brainstormItems",items.filter(x=>x.id!==id));
  };
  // Drag-to-reorder (same interaction as Top 3 tasks in Today)
  const bDragIdx=useRef(null), bOverIdx=useRef(null), bRowRefs=useRef([]);
  const [bDragging,setBDragging]=useState(null);
  const reorderItems=(from,to)=>{if(from===to||from==null||to==null)return;const a=items.slice();const[m]=a.splice(from,1);a.splice(to,0,m);setItems(a);};
  const bStart=(i)=>{bDragIdx.current=i;bOverIdx.current=i;setBDragging(i);};
  const bMove=(e)=>{if(bDragIdx.current===null)return;e.preventDefault();const y=e.touches[0].clientY;let closest=bDragIdx.current,md=Infinity;bRowRefs.current.forEach((ref,ri)=>{if(!ref)return;const r=ref.getBoundingClientRect();const d=Math.abs(y-(r.top+r.height/2));if(d<md){md=d;closest=ri;}});bOverIdx.current=closest;};
  const bEnd=()=>{if(bDragIdx.current!==null&&bOverIdx.current!==null)reorderItems(bDragIdx.current,bOverIdx.current);bDragIdx.current=null;bOverIdx.current=null;setBDragging(null);};
  return (
    <div>
      <div style={{background:"linear-gradient(135deg,#332817,#241c12)",borderRadius:18,padding:"14px 16px",marginBottom:14,boxShadow:"0 5px 18px rgba(42,33,24,0.2)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <button onClick={()=>gotoDay(-1)} style={{background:"rgba(255,255,255,0.08)",border:"none",color:"#c9a96e",borderRadius:14,width:28,height:28,fontSize:15,cursor:"pointer",fontFamily:"inherit"}}>‹</button>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:8,fontWeight:800,letterSpacing:3,color:"#c9a96e",textTransform:"uppercase"}}>Day Plan</div>
            <div style={{fontSize:17,fontWeight:900,color:"#fff",lineHeight:1.2}}>{weekdayShort(viewM,viewDay)} {M_LABEL[viewM]} {viewDay}</div>
          </div>
          <button onClick={()=>gotoDay(1)} style={{background:"rgba(255,255,255,0.08)",border:"none",color:"#c9a96e",borderRadius:14,width:28,height:28,fontSize:15,cursor:"pointer",fontFamily:"inherit"}}>›</button>
        </div>
        <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:8,alignItems:"center",flexWrap:"wrap"}}>
          <button onClick={()=>{setViewM(TODAY_M);setViewDay(TODAY_D);}} style={{background:"none",border:"1px solid rgba(201,169,110,0.4)",color:"#c9a96e",borderRadius:12,padding:"3px 12px",fontSize:8,fontWeight:800,letterSpacing:1,cursor:"pointer",fontFamily:"inherit"}}>TODAY</button>
          <button onClick={()=>{copyText(buildPlanText(viewM,viewDay,planData));setCopied(true);setTimeout(()=>setCopied(false),1800);}} style={{background:copied?"#16a34a":"rgba(201,169,110,0.15)",border:"1px solid rgba(201,169,110,0.4)",color:copied?"#fff":"#c9a96e",borderRadius:12,padding:"3px 12px",fontSize:8,fontWeight:800,letterSpacing:1,cursor:"pointer",fontFamily:"inherit"}}>{copied?"✓ COPIED":"⧉ COPY PLAN"}</button>
          <span style={{fontSize:8,color:"#a89e8c",fontWeight:700}}>{doneCount}/{items.length} ideas · {filled} slots</span>
        </div>
      </div>

      <div style={{background:"#fff",borderRadius:16,border:"1px solid #f0ebe2",marginBottom:12,overflow:"hidden",boxShadow:"0 3px 16px rgba(42,33,24,0.06)"}}>
        <div style={{padding:"8px 14px",background:"#fffdf8",borderBottom:"1px solid #f0e9da",display:"flex",alignItems:"center",gap:8}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:"#c9a96e"}}/>
          <span style={{fontSize:8,fontWeight:800,letterSpacing:2,color:"#8a6d3b"}}>BRAINSTORM — ONE IDEA PER LINE</span>
        </div>
        {items.length===0&&(
          <div style={{padding:"16px 14px",fontSize:11,color:"#b0a594",lineHeight:1.5}}>Dump everything on your mind, one idea per line. Check them off, then pull the timebox + Top 3 out of them.</div>
        )}
        {items.map((it,idx)=>{
          const dragging=bDragging===idx;
          return (
          <div key={it.id} ref={el=>bRowRefs.current[idx]=el}
            draggable onDragStart={()=>bStart(idx)} onDragEnter={()=>{bOverIdx.current=idx;}} onDragOver={e=>e.preventDefault()} onDragEnd={bEnd}
            style={{display:"flex",alignItems:"flex-start",gap:7,padding:"9px 12px 9px 8px",borderTop:"1px solid #f3efe7",borderLeft:it.pin?"3px solid #c9a96e":"3px solid transparent",background:dragging?"#f0f4ff":it.pin?"#fffdf6":"transparent",opacity:dragging?0.6:1}}>
            <div onTouchStart={()=>bStart(idx)} onTouchMove={bMove} onTouchEnd={bEnd}
              style={{flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",width:22,alignSelf:"stretch",cursor:"grab",touchAction:"none",userSelect:"none",WebkitUserSelect:"none",color:"#cfc6b6",fontSize:15,lineHeight:1}} title="Drag to reorder">⠿</div>
            <button onClick={()=>updItem(it.id,{done:!it.done})} style={{flexShrink:0,marginTop:1,width:18,height:18,borderRadius:"50%",border:"2px solid "+(it.done?"#16a34a":"#d8cdb8"),background:it.done?"#16a34a":"#fff",cursor:"pointer",padding:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",lineHeight:1,touchAction:"manipulation"}}>{it.done?"✓":""}</button>
            <AutoTextarea value={it.text} onChange={e=>updItem(it.id,{text:e.target.value})} placeholder="Idea..." style={{flex:1,border:"none",outline:"none",background:"none",fontSize:12,fontFamily:"'SF Mono','Courier New',monospace",color:it.done?"#4a4234":"#3a2e24",lineHeight:1.55,textDecoration:"none",padding:0,minWidth:0}}/>
            {!isTodayView&&<button onClick={()=>moveToToday(it.id)} title={"Move to today ("+M_LABEL[TODAY_M]+" "+TODAY_D+")"} style={{flexShrink:0,marginTop:0,width:22,height:22,borderRadius:6,border:"none",background:"#2563eb",color:"#fff",cursor:"pointer",padding:0,fontSize:13,fontWeight:900,lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center",touchAction:"manipulation"}}>→</button>}
            <button onClick={()=>pinItem(it.id)} title="Pin to top" style={{flexShrink:0,marginTop:0,width:22,height:22,borderRadius:6,border:"none",background:it.pin?"#c9a96e":"#f3efe7",cursor:"pointer",padding:0,fontSize:10,lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center",touchAction:"manipulation"}}><span style={{opacity:it.pin?1:0.4}}>🔝</span></button>
            <button onClick={()=>delItem(it.id)} title="Delete" style={{flexShrink:0,marginTop:0,width:22,height:22,borderRadius:6,background:"none",border:"none",color:"#cfc6b6",fontSize:12,cursor:"pointer",padding:0,touchAction:"manipulation"}}>✕</button>
          </div>
          );
        })}
        <button onClick={addItem} style={{width:"100%",padding:"10px 0",background:"#fffdf8",border:"none",borderTop:"1px solid #f3efe7",color:"#8a6d3b",fontSize:9,fontWeight:800,letterSpacing:1.5,cursor:"pointer",fontFamily:"inherit",touchAction:"manipulation"}}>+ NEW IDEA</button>
      </div>

      <div style={{background:"#fff",borderRadius:16,border:"1px solid #f0ebe2",overflow:"hidden",boxShadow:"0 3px 16px rgba(42,33,24,0.06)"}}>
        <div style={{padding:"9px 14px",background:"linear-gradient(135deg,#332817,#241c12)",display:"flex",alignItems:"center",gap:8}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:"#c9a96e",boxShadow:"0 0 8px rgba(201,169,110,0.6)"}}/>
          <span style={{fontSize:9,letterSpacing:2,color:"#fff",fontWeight:800}}>TIMEBOX · 6AM → 2AM</span>
        </div>
        <div>
          {TIMEBOX_SLOTS.map((s,i)=>{
            const val=day[s.key]||"";
            const fr=val.trim();
            return (
              <div key={s.key} style={{display:"flex",alignItems:"flex-start",borderTop:i>0?"1px solid #f3f0ea":"none",background:fr?"#fbf7ef":(s.hour?"#fff":"#fcfbf9")}}>

                </div>
                <AutoTextarea value={val} onChange={e=>setPlanField(viewM,viewDay,s.key,e.target.value)}

              </div>
            );

        </div>
        <div style={{padding:"8px 12px",background:"#faf9f7",borderTop:"1px solid #f0ece4",display:"flex",justifyContent:"flex-end"}}>
          <button onClick={()=>{if(confirm("Clear this day's plan?"))clearPlanDay(viewM,viewDay);}} style={{background:"none",border:"1px solid #e8ddd0",color:"#b0a594",borderRadius:10,padding:"4px 12px",fontSize:8,fontWeight:700,letterSpacing:1,cursor:"pointer",fontFamily:"inherit"}}>CLEAR DAY</button>
        </div>
      </div>
    </div>
  );
}
